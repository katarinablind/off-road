          // larger patches of rock vs. moss; veinN adds finer veins. Lerp
          // from the existing mossy color toward a warm gray-brown rock.
          if(depth<-0.20){
            const macroN=fbm(nx*1.4+22,sY*0.9+22);
            const veinN=fbm(nx*5+11,sY*4+11);
            const tn=Math.min(1,(-depth-0.20)*0.6)*act2Tune.canyonColorVar*(0.40+0.60*macroN)*(0.55+0.45*veinN);
            const rR=0.50,rG=0.46,rB=0.40;
            _waterCol[0]=_waterCol[0]*(1-tn)+rR*tn;
            _waterCol[1]=_waterCol[1]*(1-tn)+rG*tn;
            _waterCol[2]=_waterCol[2]*(1-tn)+rB*tn;
          }
          col.setXYZ(vIdx,_waterCol[0],_waterCol[1],_waterCol[2]);
        }
      }
      pos.needsUpdate=true;
      col.needsUpdate=true;
      // Normal recompute is throttled — every-frame normals make adjacent
      // triangles flicker as the streaming mesh resamples slightly different
      // (nx, sY) each frame. With waterNormalEvery=3, the lighting on cliff
      // faces is computed against ~50ms-stale normals, which is below the
      // perceptual threshold for almost all motion but eliminates the
      // per-frame "moving faces" wobble.
      _waterNormFrame++;
      const everyN=Math.max(1,Math.round(act2Tune.waterNormalEvery||1));
      if((_waterNormFrame%everyN)===0)waterGeo.computeVertexNormals();
    }
    let _waterNormFrame=0;

    // ─── Act 2: Depth contour lines ─────────────────────────
    // Bathymetry contours on the water surface. Reuses marchingSquares with
    // the wCache depth field as input; emits 3D LineSegments floating just
    // above the water (Y = 0.15). The radial bubble around the kayak is
    // the Puget-Sound visual idiom — contour vertices near the kayak bow
    // outward so lines never cross the avatar. Phase 5 adds paddle ripples
    // on top of the bubble; Phase 6 adds extra warp when kayak touches a
    // rock.
    const ACT2_CONTOUR_LEVELS=[.05,.12,.19,.26,.33,.40];
    const ACT2_MAX_CSEGS=12000;
    const act2CPos=new Float32Array(ACT2_MAX_CSEGS*6);
    const act2CCol=new Float32Array(ACT2_MAX_CSEGS*6);
    const act2ContourGeo=new THREE.BufferGeometry();
    act2ContourGeo.setAttribute('position',new THREE.BufferAttribute(act2CPos,3));
    act2ContourGeo.setAttribute('color',new THREE.BufferAttribute(act2CCol,3));
    act2ContourGeo.setDrawRange(0,0);
    const act2ContourMat=new THREE.LineBasicMaterial({
      vertexColors:true,linewidth:1.6,fog:true,transparent:true,opacity:.78
    });
    const act2ContourLines3d=new THREE.LineSegments(act2ContourGeo,act2ContourMat);
    act2ContourLines3d.frustumCulled=false;
    act2ContourLines3d.renderOrder=1;
    act2ContourLines3d.visible=false;
    scene3d.add(act2ContourLines3d);

    // Warp bubble around the kayak — same smoothstep-radial push the
    // minimap uses, but in world XZ around the kayak's world position.
    const ACT2_WARP_R=2.6;                  // world units (kayak is ~2 wide)
    const ACT2_WARP_AMP=ACT2_WARP_R;        // push inner vertices to edge
    const ACT2_WARP_R2=ACT2_WARP_R*ACT2_WARP_R;
    const _act2LevelSpan=ACT2_CONTOUR_LEVELS[ACT2_CONTOUR_LEVELS.length-1]
                        -ACT2_CONTOUR_LEVELS[0];

    function updateAct2Contours(scroll,kayakWx,warpAmt,t){
      const kayakSY=0.7-scroll*5;
      const sYMin=kayakSY-SY_VISIBLE*TERRAIN_AHEAD;
      const sYMax=kayakSY+SY_VISIBLE*(1-TERRAIN_AHEAD);
      const S=TERRAIN_SEGS;
      let segIdx=0;
      warpAmt=warpAmt||0;

      // Convert a grid-space edge crossing (xg,yg) at a known iso-depth
      // into 3D world coords, applying two stacked distortions:
      //   1. Off-channel noise warp — same idiom as Act 1's off-road
      //      contour distortion. Kicks in when kayak is outside the
      //      channel; makes the map visibly wobble until you recover.
      //   2. Radial bubble around the kayak — always on. Pushes nearby
      //      contour vertices outward so lines bow around the avatar.
      function edgeToWorld(xg,yg,out){
        const nx=xg/S;
        const sY=sYMin+(yg/S)*(sYMax-sYMin);
        let wx=(nx-0.5)*WORLD_SCALE;
        let wz=(sY-kayakSY)*WORLD_SCALE;
        // Off-channel noise distortion (same formula shape as Act 1)
        if(warpAmt>0.02){
          const nX=noise2d(nx*12+t*.3,sY*8+t*.2)*.5-.25;
          const nZ=noise2d(nx*9+t*.2,sY*11-t*.3)*.5-.25;
          wx+=nX*warpAmt*3.2;               // world-unit amplitude
          wz+=nZ*warpAmt*3.2;
        }
        // Bubble warp around the kayak (smoothstep radial push)
        const dx=wx-kayakWx,dz=wz;
        const d2=dx*dx+dz*dz;
        if(d2<ACT2_WARP_R2&&d2>1e-6){
          const d=Math.sqrt(d2);
          const fall=1-d/ACT2_WARP_R;
          const ease=fall*fall*(3-2*fall);
          const push=ease*ACT2_WARP_AMP;
          wx+=(dx/d)*push;
          wz+=(dz/d)*push;
        }
        // Paddle-stroke ripples — concentric Gaussian band that pushes
        // contour vertices outward from the wave front. Stacks on top of
        // the bubble warp, so a kayak in the middle of a stroke shows the
        // bubble + a ring expanding outward from the dipped blade.
        if(ripples.length){
          const amp=act2Tune.rippleAmp,speed=act2Tune.rippleSpeed,life=act2Tune.rippleLife;
          const bandSq=Math.max(0.01,act2Tune.rippleBandWidth*act2Tune.rippleBandWidth);
          for(let i=0;i<ripples.length;i++){
            const rip=ripples[i];
            const rdx=wx-rip.wx,rdz=wz-rip.wz;
            const rd2=rdx*rdx+rdz*rdz;
            if(rd2<1e-6)continue;
            const rd=Math.sqrt(rd2);
            const waveR=rip.age*speed;
            const front=rd-waveR;
            const decay=Math.max(0,1-rip.age/life);
            const weight=Math.exp(-front*front/bandSq);
            const push=weight*decay*decay*amp;
            if(push>0.005){
              wx+=(rdx/rd)*push;
              wz+=(rdz/rd)*push;
            }
          }
        }
        out[0]=wx;
        out[1]=0.15;                      // just above water surface
        out[2]=wz;
      }

      // Skip cells that are entirely on land (all four corners negative).
      function waterMask(c,r){
        if(segIdx>=ACT2_MAX_CSEGS-4)return false;
        const stride=S+1;
        const i=r*stride+c;
        const v00=wCache[i],v10=wCache[i+1];
        const v01=wCache[i+stride],v11=wCache[i+stride+1];
        return !(v00<0&&v10<0&&v01<0&&v11<0);
      }

      const p0=[0,0,0],p1=[0,0,0];
      for(let li=0;li<ACT2_CONTOUR_LEVELS.length;li++){
        if(segIdx>=ACT2_MAX_CSEGS-4)break;
        const level=ACT2_CONTOUR_LEVELS[li];
        // Shallow = near-white, deep = faintly blue. Keeps all contours
        // reading as water-ripple lines rather than drawn ink.
        const levelT=(level-ACT2_CONTOUR_LEVELS[0])/_act2LevelSpan;
        const cr=0.88-levelT*0.25;
        const cg=0.94-levelT*0.12;
        const cb=1.00-levelT*0.05;
        marchingSquares(wCache,S,S,level,(x0,y0,x1,y1)=>{
          if(segIdx>=ACT2_MAX_CSEGS-2)return;
          edgeToWorld(x0,y0,p0);
          edgeToWorld(x1,y1,p1);
          const base=segIdx*6;
          act2CPos[base]=p0[0];act2CPos[base+1]=p0[1];act2CPos[base+2]=p0[2];
          act2CPos[base+3]=p1[0];act2CPos[base+4]=p1[1];act2CPos[base+5]=p1[2];
          act2CCol[base]=cr;act2CCol[base+1]=cg;act2CCol[base+2]=cb;
          act2CCol[base+3]=cr;act2CCol[base+4]=cg;act2CCol[base+5]=cb;
          segIdx++;
        },waterMask);
      }

      act2ContourGeo.setDrawRange(0,segIdx*2);
      act2ContourGeo.attributes.position.needsUpdate=true;
      act2ContourGeo.attributes.color.needsUpdate=true;
    }
    let _lastAct2ContourTime=0;

    // ─── Act 2: Kayak wake ──────────────────────────────────
    // Two diverging trails forming a V behind the kayak. Each spawn drops
    // ONE entry shared by both sides — the L line renders with sign=-1
    // (drifts to the kayak's left at spawn time), R line with sign=+1.
    // Spread grows with age, producing the classic boat-wake silhouette.
    // Stored in scroll-space (scrollAtSpawn) so the wake stays anchored
    // in the world as the streaming mesh slides past.
    const ACT2_WAKE_LIFE=3.5;
    const ACT2_WAKE_SPAWN_INTERVAL=0.06;
    const ACT2_WAKE_MAX=64;
    const _wakeEntries=[];
    let _wakeSpawnTimer=0;

    function makeWakeLine(){
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(ACT2_WAKE_MAX*3),3));
      geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(ACT2_WAKE_MAX*3),3));
      geo.setDrawRange(0,0);
      const mat=new THREE.LineBasicMaterial({
        vertexColors:true,transparent:true,depthWrite:false,
        blending:THREE.AdditiveBlending,fog:true
      });
      const line=new THREE.Line(geo,mat);
      line.frustumCulled=false;
      line.visible=false;
      return line;
    }
    const act2WakeLineL=makeWakeLine();
    const act2WakeLineR=makeWakeLine();
    scene3d.add(act2WakeLineL);
    scene3d.add(act2WakeLineR);

    function updateAct2Wake(dt,k){
      if(!k||act2Tune.wakeOpacity<=0){
        act2WakeLineL.geometry.setDrawRange(0,0);
        act2WakeLineR.geometry.setDrawRange(0,0);
        return;
      }
      // Age + cull
      for(let i=_wakeEntries.length-1;i>=0;i--){
        _wakeEntries[i].age+=dt;
        if(_wakeEntries[i].age>ACT2_WAKE_LIFE)_wakeEntries.splice(i,1);
      }
      _wakeSpawnTimer+=dt;
      while(_wakeSpawnTimer>=ACT2_WAKE_SPAWN_INTERVAL){
        _wakeSpawnTimer-=ACT2_WAKE_SPAWN_INTERVAL;
        if(_wakeEntries.length>=ACT2_WAKE_MAX)_wakeEntries.shift();
        const kayakWx=(k.px-0.5)*WORLD_SCALE;
        const h=k.heading;
        const sternBack=1.5;
        // Stern position in world: kayak at (kayakWx,0,0), back from
        // forward direction by sternBack. Forward = (sin(h),0,-cos(h)),
        // so stern offset = -forward*sternBack = (-sin(h),0,cos(h))*back.
        const sternX=kayakWx-Math.sin(h)*sternBack;
        const sternZ=Math.cos(h)*sternBack;
        // Right-vector in world (perpendicular to forward, in the +X side
        // of the kayak's body frame): rotated forward by -π/2 around Y.
        const rightX=Math.cos(h);
        const rightZ=Math.sin(h);
        _wakeEntries.push({
          scrollAtSpawn:k.scroll,
          sternX,sternZ,rightX,rightZ,age:0
        });
      }
      buildWakeLine(act2WakeLineL,-1,k);
      buildWakeLine(act2WakeLineR,+1,k);
    }
    function buildWakeLine(line,sign,k){
      const posBuf=line.geometry.attributes.position.array;
      const colBuf=line.geometry.attributes.color.array;
      const initialSpread=0.45;
      const divergeRate=0.55*act2Tune.wakeSpread;
      const baseY=0.06;
      const opacity=Math.max(0,act2Tune.wakeOpacity);
      const n=_wakeEntries.length;
      for(let i=0;i<n;i++){
        const e=_wakeEntries[i];
        const totalSpread=initialSpread+e.age*divergeRate;
        const wx=e.sternX+sign*totalSpread*e.rightX;
        const wz=e.sternZ+sign*totalSpread*e.rightZ
                +(k.scroll-e.scrollAtSpawn)*5*WORLD_SCALE;
        posBuf[i*3]=wx;
        posBuf[i*3+1]=baseY;
        posBuf[i*3+2]=wz;
        const t=e.age/ACT2_WAKE_LIFE;
        const fade=Math.max(0,(1-t)*(1-t))*opacity;
        colBuf[i*3]  =0.85*fade;
        colBuf[i*3+1]=0.92*fade;
        colBuf[i*3+2]=1.00*fade;
      }
      line.geometry.setDrawRange(0,n);
      line.geometry.attributes.position.needsUpdate=true;
      line.geometry.attributes.color.needsUpdate=true;
    }

    // ─── Act 2: time-of-day sky keyframes ───────────────────
    // Sky/fog color over the journey. Morning gray-blue → midday lighter
    // → golden hour → dusk peach. Lerp by progress*act2DayShift.
    const ACT2_SKY_KEYS=[
      [0.00, 0.486, 0.588, 0.659],     // #7c96a8 morning gray-blue (matches setAct(2) base)
      [0.35, 0.682, 0.745, 0.816],     // #aebed0 midday lighter
      [0.70, 0.855, 0.722, 0.588],     // #dab896 golden hour
      [1.00, 0.910, 0.596, 0.471],     // #e89878 dusk peach
    ];
    const _act2SkyCol=new THREE.Color();
    function getAct2SkyAt(progress,out){
      for(let i=0;i<ACT2_SKY_KEYS.length-1;i++){
        const a=ACT2_SKY_KEYS[i],b=ACT2_SKY_KEYS[i+1];
        if(progress<=b[0]){
          const t=(progress-a[0])/(b[0]-a[0]);
          out.setRGB(a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t,a[3]+(b[3]-a[3])*t);
          return out;
        }
      }
      const last=ACT2_SKY_KEYS[ACT2_SKY_KEYS.length-1];
      out.setRGB(last[1],last[2],last[3]);
      return out;
    }

    // ─── Paddle-stroke ripples ──────────────────────────────
    // Each entry = {wx, wz, age, sign}. Sign records which blade side it
    // came from (purely for debug; ripple expansion is symmetric). The
    // ripple distorts depth contour lines outward in a Gaussian band
    // centered on the wave front; aged in renderAct2, consumed in
    // updateAct2Contours.edgeToWorld. Cooldown between spawns lives on
    // the kayak (k._rippleTimer) so each player has their own cadence.
    const ripples=[];
    const MAX_RIPPLES=12;
    function spawnPaddleRipple(k){
      // Direction sign: positive paddleRot = LEFT blade dipped → ripple on
      // kayak's LEFT side. Negative paddleRot = right side. Zero (paddle
      // centered) → skip; nothing's hitting water.
      const r=k.paddleRot||0;
      if(Math.abs(r)<0.05)return;
      const sign=r>0?-1:1;                       // -1 = left, +1 = right
      const off=act2Tune.rippleSpawnSide||1.6;
      const sideX=Math.cos(k.heading)*sign*off;
      const sideZ=Math.sin(k.heading)*sign*off;
      const wx=(k.px-0.5)*WORLD_SCALE+sideX;
      const wz=sideZ;                            // kayak pinned at world Z=0
      ripples.push({wx,wz,age:0,sign});
      while(ripples.length>MAX_RIPPLES)ripples.shift();
    }

    // Bow tip in kayak visuals space (+Z forward); used for bow-led yaw and
    // bow splash anchor (handles sit near ±kL*0.46 on Z).
    const KAYAK_BOW_Z_IN_VISUALS=2.14;

    // ─── Kayak mesh ─────────────────────────────────────────
    // Orange hull (same palette family as the kayak that sits on the car's
    // roof in Act 1) with a deck line, round cockpit, and the whitewater
    // paddle from kayak-studio so the in-game boat matches the approved preset.
    function buildKayakMesh(){
      // Outer group: this is what gets positioned + rotated by the physics.
      // Inner `visuals` group holds the geometry shifted backward so the
      // rotation pivot sits forward of the hull's geometric center. Kayaks
      // physically pivot near the paddler's cockpit (slightly ahead of
      // midship), so when you steer, the bow sweeps visibly while the stern
      // barely moves — matches intuition.
      const g=new THREE.Group();
      const visuals=new THREE.Group();
      visuals.position.z=-0.8;           // pivot shifts forward of center
      g.add(visuals);
      g.userData.visuals=visuals;

      const kayakMat=new THREE.MeshStandardMaterial({color:0xd4601a,roughness:.45,metalness:.05,flatShading:false});
      const deckMat=new THREE.MeshStandardMaterial({color:0xb8500e,roughness:.5});
      const cockpitMat=new THREE.MeshStandardMaterial({color:0x1a0c04,roughness:.85});
      const bladeMat=new THREE.MeshStandardMaterial({color:0xc84620,roughness:.45});
      const shaftMat=new THREE.MeshStandardMaterial({color:0x1a1a20,roughness:.5,metalness:.25});
      const handleMat=new THREE.MeshStandardMaterial({color:0x222222,roughness:.8});

      // Hull — extruded pointed-oval shape, laid flat. rotation.x=+π/2
      // maps the shape's +Y axis to world +Z (so the length runs along Z)
      // and the extruded depth (0→+0.28 in local Z) to world -Y (so depth
      // extends DOWNWARD from hull.position.y). That means hull.position.y
      // IS the top of the deck — every deck feature below references that
      // 0.05 deck-top, NOT a fictitious 0.42 (the source of the old gap).
      const kL=4.4,kW=.85;
      const shape=new THREE.Shape();
      shape.moveTo(0,-kL/2);
      shape.bezierCurveTo( kW,-kL*.3,  kW, kL*.3, 0, kL/2);
      shape.bezierCurveTo(-kW, kL*.3, -kW,-kL*.3, 0,-kL/2);
      const hullGeo=new THREE.ExtrudeGeometry(shape,{depth:.28,bevelEnabled:true,bevelThickness:.07,bevelSize:.05,bevelSegments:3});
      const hull=new THREE.Mesh(hullGeo,kayakMat);
      hull.rotation.x=Math.PI/2;        // length → world Z, depth → world -Y
      hull.position.y=0.05;
      visuals.add(hull);
      // The bevel adds bevelThickness=0.07 BEYOND the base depth on each
      // end, so the hull's actual visible top sits at hull.position.y +
      // 0.07 = 0.12, not at 0.05. DECK has to clear that or every deck
      // feature ends up buried inside the hull mesh.
      const DECK=0.14;

      // Deck line — flush along the top of the deck.
      const deckLine=new THREE.Mesh(new THREE.BoxGeometry(.06,.04,3.8),deckMat);
      deckLine.position.set(0,DECK,0);
      visuals.add(deckLine);

      // Cockpit rim sits ON the deck. The "hole" is a short dark cylinder
      // sized to fit just inside the rim's inner edge. Its top cap sits at
      // the rim's center plane (y=DECK), so from above the cap reads as
      // the cockpit opening; the side walls dip into the hull where they
      // hide naturally. (The earlier CircleGeometry attempt was z-fighting
      // the deck line that crosses the same plane and never showed up.)
      const rim=new THREE.Mesh(new THREE.TorusGeometry(.26,.035,6,16),cockpitMat);
      rim.position.set(0,DECK,0.3);
      rim.rotation.x=Math.PI/2;
      visuals.add(rim);
      const hole=new THREE.Mesh(new THREE.CylinderGeometry(.22,.22,.06,16),cockpitMat);
      hole.position.set(0,DECK-0.03,0.3);
      visuals.add(hole);

      // Bow/stern grab handles — half-torus arcs flush on the deck.
      for(const z of [-kL*.46,kL*.46]){
        const h=new THREE.Mesh(new THREE.TorusGeometry(.07,.018,4,8,Math.PI),handleMat);
        h.position.set(0,DECK,z);
        h.rotation.x=-Math.PI/2;
        visuals.add(h);
      }

      // Paddle — whitewater style (shorter shaft + wide chunky blades).
      // Pivot ~38cm above the deck = paddler grip height.
      const paddlePivot=new THREE.Group();
      paddlePivot.position.set(0,DECK+0.38,0.3);
      visuals.add(paddlePivot);
      const shaft=new THREE.Mesh(new THREE.CylinderGeometry(.040,.040,3.0,8),shaftMat);
      shaft.rotation.z=Math.PI/2;       // lay shaft along world X
      paddlePivot.add(shaft);
      const bladeShape=new THREE.Shape();
      bladeShape.moveTo(0,-0.11);
      bladeShape.lineTo(0.20,-0.15);
      bladeShape.lineTo(0.42,-0.13);
      bladeShape.bezierCurveTo(0.52,-0.05,0.52,0.05,0.42,0.13);
      bladeShape.lineTo(0.20,0.15);
      bladeShape.lineTo(0,0.11);
      bladeShape.closePath();
      const bladeGeo=new THREE.ExtrudeGeometry(bladeShape,{
        depth:.022,
        bevelEnabled:true,
        bevelThickness:.004,
        bevelSize:.006,
        bevelSegments:2
      });
      bladeGeo.translate(0,0,-.011);
      for(const sign of [-1,1]){
        const blade=new THREE.Mesh(bladeGeo,bladeMat);
        blade.position.set(sign*1.50,0,0);
        if(sign<0)blade.scale.x=-1;
        paddlePivot.add(blade);
      }
      const bowSprayMount=new THREE.Group();
      bowSprayMount.position.set(0,0.1,KAYAK_BOW_Z_IN_VISUALS);
      visuals.add(bowSprayMount);
      g.userData.bowSprayMount=bowSprayMount;
      const bladeSprayMount=new THREE.Group();
      bladeSprayMount.position.set(0,-0.62,0);
      paddlePivot.add(bladeSprayMount);
      g.userData.bladeSprayMount=bladeSprayMount;
      g.userData.paddlePivot=paddlePivot;
      g.userData.hullMat=kayakMat;

      return g;
    }
    const kayakGroup=buildKayakMesh();
    kayakGroup.visible=false;           // setAct(2) flips this on
    scene3d.add(kayakGroup);

    // Whitewater spray — bow mount sits at bow waterline (not cockpit deck).
    // Blade mount follows paddle pivot near the water. Intensity uses rapids.
    // Light particle counts so the effect reads as scattered specks instead
    // of a dense additive glow blob (the previous incarnation).
    const ACT2_SPRAY_N=22;
    const _act2SprayPos=new Float32Array(ACT2_SPRAY_N*3);
    const act2SprayGeo=new THREE.BufferGeometry();
    act2SprayGeo.setAttribute('position',new THREE.BufferAttribute(_act2SprayPos,3));
    const act2SprayMat=new THREE.PointsMaterial({
      color:0xe8f4ff,transparent:true,opacity:0.18,depthWrite:false,depthTest:true,
      blending:THREE.AdditiveBlending,fog:true,size:0.1,sizeAttenuation:true
    });
    const act2SprayPoints=new THREE.Points(act2SprayGeo,act2SprayMat);
    act2SprayPoints.frustumCulled=false;
    const bowMount=kayakGroup.userData.bowSprayMount||kayakGroup.userData.visuals;
    bowMount.add(act2SprayPoints);
    act2SprayPoints.position.set(0,act2Tune.sprayUp,act2Tune.sprayForward);
    kayakGroup.userData.act2Spray=act2SprayPoints;

    const ACT2_BLADE_SPRAY_N=14;
    const _act2BladeSprayPos=new Float32Array(ACT2_BLADE_SPRAY_N*3);
    const act2BladeSprayGeo=new THREE.BufferGeometry();
    act2BladeSprayGeo.setAttribute('position',new THREE.BufferAttribute(_act2BladeSprayPos,3));
    const act2BladeSprayMat=new THREE.PointsMaterial({
      color:0xd8f0ff,transparent:true,opacity:0.14,depthWrite:false,depthTest:true,
      blending:THREE.AdditiveBlending,fog:true,size:0.08,sizeAttenuation:true
    });
    const act2BladeSprayPoints=new THREE.Points(act2BladeSprayGeo,act2BladeSprayMat);
    act2BladeSprayPoints.frustumCulled=false;
    const bladeMount=kayakGroup.userData.bladeSprayMount||kayakGroup.userData.paddlePivot;
    if(bladeMount)bladeMount.add(act2BladeSprayPoints);
    kayakGroup.userData.act2BladeSpray=act2BladeSprayPoints;
    let _act2SprayPhase=0;
    let _act2BladeSprayPhase=0;
    // Hard-hide both spray clouds — current direction never read right (looked
    // like paint smudges on the hull). Keep the geometry/material around so
    // toggling visible=true via the tune panel still works for experiments.
    act2SprayPoints.visible=false;
    act2BladeSprayPoints.visible=false;
    function updateAct2Spray(dt,rapids,k){
      if(!act2SprayPoints.visible&&!act2BladeSprayPoints.visible)return;
      const gain=Math.max(0,act2Tune.sprayGain);
      const str=Math.max(0,Math.min(1,rapids*gain));
      act2SprayPoints.position.set(0,act2Tune.sprayUp,act2Tune.sprayForward);
      act2SprayPoints.visible=str>0.02;
      if(act2SprayPoints.visible){
        _act2SprayPhase+=dt*act2Tune.sprayAnimSpeed;
        const sp=act2Tune.spraySpread;
        const arr=_act2SprayPos;
        for(let i=0;i<ACT2_SPRAY_N;i++){
          const i3=i*3;
          const ph=_act2SprayPhase+i*0.41;
          const j=i/ACT2_SPRAY_N;
          const w=(0.22+str*0.75)*sp*(0.38+Math.sin(ph)*0.22);
          arr[i3]=Math.sin(ph*2.2+j*5.1)*w;
          arr[i3+1]=0.02+str*(0.28+0.28*Math.sin(ph*1.9))*(0.12+j*0.5);
          arr[i3+2]=0.02+str*0.35+Math.cos(ph*1.4)*0.18*str;
        }
        act2SprayGeo.attributes.position.needsUpdate=true;
        const opMax=act2Tune.sprayOpacityMax;
        const szMax=act2Tune.spraySizeMax;
        act2SprayMat.opacity=0.02+str*opMax;
        act2SprayMat.size=0.05+str*szMax;
      }
      const bg=Math.max(0,act2Tune.paddleBladeSpray||0);
      const stroke=0.22+0.78*Math.abs(Math.sin(k.paddleAngle||0));
      const bStr=Math.max(0,Math.min(1,rapids*bg*stroke));
      act2BladeSprayPoints.visible=bStr>0.03;
      if(act2BladeSprayPoints.visible){
        _act2BladeSprayPhase+=dt*(act2Tune.sprayAnimSpeed*1.15);
        const arrB=_act2BladeSprayPos;
        const spB=act2Tune.spraySpread*0.85;
        for(let i=0;i<ACT2_BLADE_SPRAY_N;i++){
          const i3=i*3;
          const ph=_act2BladeSprayPhase+i*0.52;
          const j=i/ACT2_BLADE_SPRAY_N;
          const w=(0.12+bStr*0.55)*spB*(0.35+Math.sin(ph)*0.25);
          arrB[i3]=(Math.sin(ph*2.4)-0.35*j)*w;
          arrB[i3+1]=-0.02+bStr*(0.18+0.22*Math.sin(ph*2.1))*(0.2+j*0.4);
          arrB[i3+2]=(Math.cos(ph*1.5)+0.15*j)*w*0.65;
        }
        act2BladeSprayGeo.attributes.position.needsUpdate=true;
        act2BladeSprayMat.opacity=0.02+bStr*act2Tune.sprayOpacityMax*0.85;
        act2BladeSprayMat.size=0.04+bStr*act2Tune.spraySizeMax*0.9;
      }
    }

    function updateAct2WaterAudio(k){
      if(!audioCtx||!waterGain||!waterSrc)return;
      const r=Math.max(0,Math.min(1,(k._rapidsSmooth||0)*Math.max(0,act2Tune.sprayAudio)));
      const t=audioCtx.currentTime;
      waterGain.gain.setTargetAtTime(0.032+r*0.28,t,0.14);
      waterSrc.playbackRate.setTargetAtTime(0.75+r*0.72,t,0.11);
    }

    // Paddle stroke sound — short band-passed noise burst, like a blade
    // cutting into water. Procedural so we don't need an external sample;
    // each stroke gets a slightly randomized filter frequency for variety.
    function playPaddleStrokeSound(intensity){
      if(!audioCtx||!masterGain||act2Tune.paddleStrokeVol<=0)return;
      const now=audioCtx.currentTime;
      const dur=0.18;
      const bufLen=Math.max(1,Math.floor(audioCtx.sampleRate*dur));
      const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<bufLen;i++)data[i]=(Math.random()-0.5);
      const src=audioCtx.createBufferSource();src.buffer=buf;
      const filter=audioCtx.createBiquadFilter();
      filter.type='bandpass';
      filter.frequency.value=850+Math.random()*450;
      filter.Q.value=1.6;
      const gain=audioCtx.createGain();
      const peak=0.34*intensity*act2Tune.paddleStrokeVol;
      gain.gain.setValueAtTime(0,now);
      gain.gain.linearRampToValueAtTime(peak,now+0.006);
      gain.gain.exponentialRampToValueAtTime(0.0005,now+dur);
      src.connect(filter);filter.connect(gain);gain.connect(masterGain);
      src.start(now);src.stop(now+dur);
    }

    // Rock impact sound — low-frequency thud (sine sweep) + high-pass
    // splash noise on top. Volume scales with collision overlap.
    function playRockImpactSound(intensity){
      if(!audioCtx||!masterGain||act2Tune.rockImpactVol<=0)return;
      const now=audioCtx.currentTime;
      const vol=Math.min(1,intensity)*act2Tune.rockImpactVol;
      // Layer 1: low-frequency thud (sine sweep down)
      const osc=audioCtx.createOscillator();
      osc.type='sine';
      osc.frequency.setValueAtTime(120,now);
      osc.frequency.exponentialRampToValueAtTime(55,now+0.13);
      const oscGain=audioCtx.createGain();
      oscGain.gain.setValueAtTime(0.45*vol,now);
      oscGain.gain.exponentialRampToValueAtTime(0.005,now+0.2);
      osc.connect(oscGain);oscGain.connect(masterGain);
      osc.start(now);osc.stop(now+0.22);
      // Layer 2: splash — high-pass filtered noise burst
      const dur=0.28;
      const bufLen=Math.floor(audioCtx.sampleRate*dur);
      const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<bufLen;i++)data[i]=(Math.random()-0.5);
      const src=audioCtx.createBufferSource();src.buffer=buf;
      const filter=audioCtx.createBiquadFilter();
      filter.type='highpass';
      filter.frequency.value=550;
      const gain=audioCtx.createGain();
      gain.gain.setValueAtTime(0,now);
      gain.gain.linearRampToValueAtTime(0.18*vol,now+0.008);
      gain.gain.exponentialRampToValueAtTime(0.0005,now+dur);
      src.connect(filter);filter.connect(gain);gain.connect(masterGain);
      src.start(now);src.stop(now+dur);
    }

    // Act-2 ambient layer — birds + wind set to the tunable levels.
    // Called per-frame so the slider updates apply live.
    function updateAct2Ambient(){
      if(!audioCtx)return;
      const t=audioCtx.currentTime;
      if(birdGain)birdGain.gain.setTargetAtTime(Math.max(0,act2Tune.act2AmbientBirds),t,0.5);
      if(windGain)windGain.gain.setTargetAtTime(Math.max(0,act2Tune.act2AmbientWind),t,0.5);
    }

    // ─── Rocks (instanced, streamed like trees) ─────────────
    // Three visual types mirror rock.type (0/1/2): tall jagged boulder,
    // round boulder, flat slab. Each type gets its own InstancedMesh so the
    // three geometries + materials stay contiguous on the GPU. Positions
    // are streamed per frame the same way Act 1's trees are — (rock.sY -
    // kayakSY) * WORLD_SCALE gives rock world-Z.
    const rockSlotsByType=[[],[],[]];
    for(const r of ROCK_SLOTS)rockSlotsByType[r.type].push(r);

    const rockMats=[
      new THREE.MeshStandardMaterial({color:0x6a6860,roughness:.88,flatShading:true}), // granite
      new THREE.MeshStandardMaterial({color:0x4a4840,roughness:.90,flatShading:true}), // basalt
      new THREE.MeshStandardMaterial({color:0x8a7550,roughness:.85,flatShading:true}), // sandstone
    ];
    function makeRockGeo(type){
      if(type===0)return new THREE.CylinderGeometry(0.35,0.55,1.0,5);  // tall jagged
      if(type===1)return new THREE.SphereGeometry(0.5,6,5);             // round boulder
      return new THREE.CylinderGeometry(0.60,0.55,0.40,6);              // flat slab
    }
    const rockInsts=[];
    const _rockInstCol=new THREE.Color();
    for(let t=0;t<3;t++){
      const slots=rockSlotsByType[t];
      const count=Math.max(1,slots.length);
      const inst=new THREE.InstancedMesh(makeRockGeo(t),rockMats[t],count);
      inst.visible=false;
      // Apply per-instance color jitter so the cluster reads as varied
      // stone, not a clone army. Three.js multiplies instanceColor with
      // the material's base color, so we just push the offset into RGB.
      const baseCol=rockMats[t].color;
      for(let i=0;i<slots.length;i++){
        const j=slots[i].colorJitter;
        _rockInstCol.setRGB(
          Math.max(0,Math.min(1,baseCol.r+j.r)),
          Math.max(0,Math.min(1,baseCol.g+j.g)),
          Math.max(0,Math.min(1,baseCol.b+j.b))
        );
        // setColorAt expects a color in NORMALIZED RGB; we'll let the
        // shader divide back out the base color implicitly. The most
        // reliable approach is to set the material color to white and
        // store full color per instance, but to avoid touching every
        // existing reference we instead set instance colors to the
        // already-jittered absolute color and white-out the material.
        inst.setColorAt(i,_rockInstCol);
      }
      // Setting instance colors requires the material to NOT pre-multiply
      // them with its base color. Easiest: make the base material white,
      // and let setColorAt drive the actual hue.
      rockMats[t].color.setRGB(1,1,1);
      if(inst.instanceColor)inst.instanceColor.needsUpdate=true;
      scene3d.add(inst);
      rockInsts.push(inst);
    }

    // Streaming update — runs every frame in Act 2. Rocks outside the water
    // mesh window get scaled to 0 (invisible), same trick Act 1 uses for
    // trees behind the far horizon.
    const _rockDummy=new THREE.Object3D();
    function updateRocks(scroll){
      const kayakSY=0.7-scroll*5;
      const sYMin=kayakSY-SY_VISIBLE*TERRAIN_AHEAD-0.1;
      const sYMax=kayakSY+SY_VISIBLE*(1-TERRAIN_AHEAD)+0.1;
      for(let t=0;t<3;t++){
        const slots=rockSlotsByType[t];
        const inst=rockInsts[t];
        for(let i=0;i<slots.length;i++){
          const rock=slots[i];
          const wx=(rock.nx-0.5)*WORLD_SCALE;
          const wz=(rock.sY-kayakSY)*WORLD_SCALE;
          if(rock.sY<sYMin||rock.sY>sYMax){
            _rockDummy.position.set(wx,-50,wz);           // shove offscreen
            _rockDummy.scale.setScalar(0);
            _rockDummy.rotation.set(0,0,0);
          }else{
            // Partially submerged: base ~0.15 below water, peak proportional
            // to size. Per-rock tilt + non-uniform scale break up the
            // visual uniformity so the cluster reads as weathered stone.
            _rockDummy.position.set(wx,rock.size*0.3-0.10,wz);
            _rockDummy.rotation.set(rock.tiltX,rock.rotY,rock.tiltZ);
            _rockDummy.scale.set(
              rock.size*rock.scaleX,
              rock.size*rock.scaleY,
              rock.size*rock.scaleZ
            );
          }
          _rockDummy.updateMatrix();
          inst.setMatrixAt(i,_rockDummy.matrix);
        }
        inst.instanceMatrix.needsUpdate=true;
      }
    }

    // Transition from Act 1 finish screen into Act 2. Carries the car's
    // final stability over to the kayak so damage persists across the swap.
    async function launchAct2(){
      const car=cars[0];
      const startStab=Math.max(0,car.stability);
      // Snapshot Act-1 stats BEFORE we reset finishTime + clear fallenTrees
      // etc. The combined finish screen will fold these in alongside the
      // paddle stats.
      act1Stats={
        time:finishTime||gameTime,
        stability:startStab,
        treesHit:fallenTrees.size,
        hazardsHit:car._hitHazards?car._hitHazards.size:0,
        distance:sharedScrollOffset*100,
      };
      finishScreen.classList.remove('visible');
      await crossfade(async ()=>{
        kayaks=[makeKayak(0,startStab)];
        anyFinished=false;finishTime=0;
        kayakHighlightActive=false;
        // Snap camera X to the kayak's spawn (otherwise the smoothing lerp
        // starts from the old Act-1 camera pos and the first second shows
        // the kayak off-center).
        const startWx=(kayaks[0].px-0.5)*WORLD_SCALE;
        cam3d.position.set(startWx,3.2,8.5);
        setAct(2);
      });
    }

    document.getElementById('kayak-btn').addEventListener('click',launchAct2);

    // ─── Level/Bubble Indicator ─────────────────────────
    const levelCanvas=document.getElementById('level-canvas');
    const levelCtx=levelCanvas.getContext('2d');
    const levelEl=document.getElementById('level-indicator');
    function drawLevelIndicator(roll,hitFlash){
      const w=levelCanvas.width,h=levelCanvas.height;
      levelCtx.clearRect(0,0,w,h);
      const flash=hitFlash||0;
      // Outer tube — matches the deep forest-green used elsewhere in the HUD.
      // Flashes red on tree hit.
      const tubeR=Math.round(40+flash*160);
      const tubeG=Math.round(60-flash*35);
      const tubeB=Math.round(40-flash*15);
      levelCtx.strokeStyle=`rgba(${tubeR},${tubeG},${tubeB},${.95})`;
      levelCtx.lineWidth=2.2+flash*2;
      levelCtx.beginPath();
      const r=15;
      levelCtx.roundRect(4,4,w-8,h-8,r);
      levelCtx.stroke();
      // Red bottom line on tree hit
      if(flash>.01){
        levelCtx.strokeStyle=`rgba(200,50,40,${flash*.8})`;
        levelCtx.lineWidth=2+flash*2;
        levelCtx.beginPath();
        levelCtx.moveTo(10,h-5);levelCtx.lineTo(w-10,h-5);
        levelCtx.stroke();
      }
      // Center tick marks
      levelCtx.strokeStyle=`rgba(${tubeR},${tubeG},${tubeB},.25)`;
      levelCtx.lineWidth=1;
      levelCtx.beginPath();
      levelCtx.moveTo(w/2,6);levelCtx.lineTo(w/2,12);
      levelCtx.moveTo(w/2,h-12);levelCtx.lineTo(w/2,h-6);
      levelCtx.stroke();
      // Bubble — clamp roll to [-1,1]. Drawn as a true circle (not an ellipse)
      // so it reads as a spirit-level bubble rolling inside the tube.
      const clampedRoll=Math.max(-1,Math.min(1,roll*3));
      const bubbleR=Math.round(h*.21);
      const bubbleX=w/2+clampedRoll*(w/2-bubbleR-6);
      // Green when centered, yellow/red when tilted
      const tiltAmount=Math.abs(clampedRoll);
      const gr=Math.round(80+tiltAmount*120);
      const gg=Math.round(180-tiltAmount*120);
      levelCtx.fillStyle=`rgba(${gr},${gg},80,.85)`;
      levelCtx.beginPath();
      levelCtx.arc(bubbleX,h/2,bubbleR,0,Math.PI*2);
      levelCtx.fill();
      // Bubble outline — red when hitting a tree, otherwise a subtle dark rim
      const strokeR=flash>.01?Math.round(180+flash*60):Math.round(gr*.45);
      const strokeG=flash>.01?Math.round(50-flash*20):Math.round(gg*.45);
      levelCtx.strokeStyle=`rgba(${strokeR},${strokeG},${flash>.01?40:60},${flash>.01?.7+flash*.3:.55})`;
      levelCtx.lineWidth=flash>.01?2+flash*2:1.2;
      levelCtx.stroke();
    }

    // ─── Kayak Highlight (pulsing glow after finish) ──
    let kayakHighlightActive=false;
    let kayakHighlightStart=0;
    function highlightKayak(){
      kayakHighlightActive=true;
      kayakHighlightStart=performance.now()*.001;
      const kayakMesh=carGroups[0].userData.kayakMesh;
      if(kayakMesh&&kayakMesh.material){
        kayakMesh.material.emissive=new THREE.Color(0xff6600);
        kayakMesh.material.emissiveIntensity=.5;
      }
      // Reset CSS animation to sync with 3D
      const btn=document.getElementById('kayak-btn');
      if(btn){btn.style.animation='none';btn.offsetHeight;btn.style.animation='';}
    }
    function updateKayakHighlight(t){
      if(!kayakHighlightActive)return;
      const kayakMesh=carGroups[0].userData.kayakMesh;
      if(kayakMesh&&kayakMesh.material){
        // 2s period, cosine starts at bright (1) matching CSS bright→dim→bright
        const elapsed=t-kayakHighlightStart;
        const phase=Math.cos(elapsed*Math.PI); // 1→-1→1 over 2s
        kayakMesh.material.emissiveIntensity=.3+.2*phase; // .5 bright → .1 dim → .5
      }
    }

    // ─── Minimap (smooth 2D topology — same approach as Act 2 river) ──────
    const mmCanvas=document.getElementById('minimap-canvas');
    const mmCtx=mmCanvas.getContext('2d');
    const MM_W=240,MM_H=240;
    // DPR-aware backing store so the arrow paths stay crisp on retina screens.
    // Logical drawing coordinates remain MM_W × MM_H thanks to the ctx.scale.
    const _mmDpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
    mmCanvas.width=MM_W*_mmDpr;
    mmCanvas.height=MM_H*_mmDpr;
    mmCanvas.style.width=MM_W+'px';
    mmCanvas.style.height=MM_H+'px';
    mmCtx.scale(_mmDpr,_mmDpr);
    // Square grid resolution — keeps cell aspect 1:1 with the square viewport
    const MM_COLS=90,MM_ROWS=90;
    // Offscreen canvas for bilinear upscaling
    const mmOff=new OffscreenCanvas(MM_COLS,MM_ROWS);
    const mmOffCtx=mmOff.getContext('2d');
    // Number of elevation bands
    const MM_NUM_BANDS=14;
    let mmFrame=0;
    function updateMinimap(agent,scroll){
      mmFrame++;
      if(mmFrame%3!==0)return;
      const ctx=mmCtx;
      const isAct2=currentAct===2;

      // View window in normalized coords — square aspect (TR-8.8). Same
      // geometry in both acts; just the underlying scalar field + palette
      // swap.
      const agentSY=0.7-scroll*5;
      const viewH=0.55;
      const viewW=0.55;
      const carFrac=0.72;
      const syTop=agentSY-carFrac*viewH;
      const sxCenter=0.5;

      // Act-specific config: sampler, iso range, palette, centerline, bank
      // overlay color. Everything else in this function (DPR backing store,
      // offscreen bilinear upscale, warp bubble) is act-agnostic.
      const sampler=isAct2?sampleRiverDepth:sampleTerrainHeightFast;
      const hMinS=isAct2?-0.25:0.0;
      const hMaxS=isAct2? 0.45:0.9;
      const centerlineFn=isAct2?getRiverX:getRoadX;
      const halfWidthFn=isAct2?getRiverHW:(()=>ROAD_HALF_W);
      let pal,roadCol,bankStroke,contourStroke;
      if(isAct2){
        pal=WATER_PAL;
        roadCol=null;                                      // no road overlay
        bankStroke='rgba(255,255,255,.55)';                // waterline
        contourStroke={major:'rgba(220,245,255,.42)',minor:'rgba(220,245,255,.20)'};
      }else{
        const progress=Math.min(1,scroll/FINISH_DIST);
        const theme=getTimeOfDayTheme(progress);
        pal=theme.pal;
        roadCol=theme.roadCol;
        bankStroke='rgba(80,65,45,.35)';
        contourStroke={major:'rgba(40,30,20,.3)',minor:'rgba(40,30,20,.15)'};
      }

      // Sample scalar field at grid resolution (+1 for marching-squares corners)
      const field=new Float32Array((MM_COLS+1)*(MM_ROWS+1));
      let hMin=Infinity,hMax=-Infinity;
      for(let r=0;r<=MM_ROWS;r++){
        const sy=syTop+(r/MM_ROWS)*viewH;
        for(let c=0;c<=MM_COLS;c++){
          const nx=sxCenter-viewW/2+(c/MM_COLS)*viewW;
          const h=sampler(nx,sy);
          field[r*(MM_COLS+1)+c]=h;
          if(h<hMin)hMin=h;if(h>hMax)hMax=h;
        }
      }
      // Fixed reference range per act — see Phase 0 notes on why an adaptive
      // range caused the topology to "breathe" between frames.
      const hRange=hMaxS-hMinS;
      dbg.hMin=hMin;dbg.hMax=hMax;

      const mmLevels=[];
      for(let i=1;i<=MM_NUM_BANDS;i++) mmLevels.push(hMinS+i/(MM_NUM_BANDS+1)*hRange);

      const bandRGB=[];
      for(let i=0;i<=MM_NUM_BANDS;i++){
        const pi=Math.floor(i/MM_NUM_BANDS*(pal.length-1));
        bandRGB.push(pal[pi]);
      }

      // Arrow position — kayak uses .px, car uses .nx. Arrow's Y is pinned
      // at carFrac; the world scrolls past under it.
      const agentNx=isAct2?agent.px:agent.nx;
      let carPx=(agentNx-sxCenter+viewW/2)/viewW*MM_W;
      const carPy=carFrac*MM_H;
      // Keep the arrow well inside the minimap frame — at extreme river
      // bends the kayak's nx can be close to the mesh edge, which used
      // to push the arrow up against the minimap border.
      carPx=Math.max(22,Math.min(MM_W-22,carPx));
      // Flash source differs by act: car flashes on tree-chop, kayak flashes
      // on rock hit. Same idiom — a spike of red halo around the arrow.
      const agentFlash=Math.min(1,(isAct2?(agent._hitFlash||0):(agent._treeHitFlash||0)));
      const WARP_R=22;
      const baseDeflect=WARP_R;
      const deflectAmp=baseDeflect+agentFlash*6;
      const WARP_R2=WARP_R*WARP_R;
      const showRedHalo=agentFlash>0.05;
      const redBatch=showRedHalo?[]:null;

      // ── Color bands with bilinear upscaling (Act 2 approach) ──
      // Inside the deflection bubble the sample position gets pulled inward
      // toward the arrow (clamped so it never overshoots). Pixels at the
      // inner half of the bubble collapse onto the arrow's own terrain value,
      // so the disc appears as a uniform "avatar cell" — matching the
      // contour-line behavior where lines bow out of this same radius.
      const bandImg=mmOffCtx.createImageData(MM_COLS,MM_ROWS);
      const bd=bandImg.data;
      const bandCellW=MM_W/MM_COLS,bandCellH=MM_H/MM_ROWS;
      const _bandOut=[0,0];
      for(let r=0;r<MM_ROWS;r++){
        for(let c=0;c<MM_COLS;c++){
          const cpx=(c+0.5)*bandCellW;
          const cpy=(r+0.5)*bandCellH;
          // Inward pull (negative amp): samples inside the bubble collapse
          // toward the agent, rendering as a uniform "avatar cell". Matches
          // the outward-push idiom applied to contour lines below.
          applyRadialWarp(cpx,cpy,carPx,carPy,WARP_R,-deflectAmp,_bandOut);
          const sampleCpx=_bandOut[0],sampleCpy=_bandOut[1];
          const nx=sxCenter-viewW/2+(sampleCpx/MM_W)*viewW;
          const sy=syTop+(sampleCpy/MM_H)*viewH;
          const h=sampler(nx,sy);
          let bi=0;
          for(let l=mmLevels.length-1;l>=0;l--){
            if(h>=mmLevels[l]){bi=l+1;break;}
          }
          let rgb=bandRGB[bi];
          let ro=rgb[0],go=rgb[1],bo=rgb[2];
          // Act-1: blend toward road color when near road centerline. Act 2
          // skips this — the shore/shoreline is implied by the WATER_PAL
          // band transition at depth=0 rather than a drawn road strip.
          if(roadCol){
            const roadX=getRoadX(sy);
            const roadDist=Math.abs(nx-roadX);
            if(roadDist<ROAD_HALF_W*.8){
              const rf=1-roadDist/(ROAD_HALF_W*.8);
              ro=ro+(roadCol[0]*255-ro)*rf*.6;
              go=go+(roadCol[1]*255-go)*rf*.6;
              bo=bo+(roadCol[2]*255-bo)*rf*.6;
            }
          }
          const off=(r*MM_COLS+c)*4;
          bd[off]=ro;bd[off+1]=go;bd[off+2]=bo;bd[off+3]=255;
        }
      }
      // Bilinear upscale for smooth appearance
      mmOffCtx.putImageData(bandImg,0,0);
      ctx.imageSmoothingEnabled=true;
      ctx.imageSmoothingQuality='high';
      ctx.drawImage(mmOff,0,0,MM_W,MM_H);

      // ── Contour lines via marching squares ──
      // Static radial deflection around the arrow: vertices inside the bubble
      // get pushed radially outward (via applyRadialWarp), so contour lines
      // bow around the arrow instead of crossing through it. Time-independent
      // — the topology never animates on its own.
      const cellW=MM_W/MM_COLS,cellH=MM_H/MM_ROWS;
      ctx.lineWidth=0.8;
      const _mmA=[0,0],_mmB=[0,0];
      for(let li=0;li<mmLevels.length;li++){
        const iso=mmLevels[li];
        ctx.strokeStyle=li%3===0?contourStroke.major:contourStroke.minor;
        ctx.beginPath();
        marchingSquares(field,MM_COLS,MM_ROWS,iso,(x0g,y0g,x1g,y1g)=>{
          // Grid-space → canvas pixels → warped
          applyRadialWarp(x0g*cellW,y0g*cellH,carPx,carPy,WARP_R,deflectAmp,_mmA);
          applyRadialWarp(x1g*cellW,y1g*cellH,carPx,carPy,WARP_R,deflectAmp,_mmB);
          ctx.moveTo(_mmA[0],_mmA[1]);
          ctx.lineTo(_mmB[0],_mmB[1]);
          if(redBatch){
            const dxa=_mmA[0]-carPx,dya=_mmA[1]-carPy;
            if(dxa*dxa+dya*dya<WARP_R2){
              redBatch.push(_mmA[0],_mmA[1],_mmB[0],_mmB[1]);
            }
          }
        });
        ctx.stroke();
      }

      // ── Red overlay: contour segments inside the warp halo turn red
      // while the car is currently chopping a tree (decays in ~0.5s) ──
      if(redBatch&&redBatch.length){
        ctx.strokeStyle=`rgba(220,55,40,${(treeFlash*.92).toFixed(2)})`;
        ctx.lineWidth=1.4;
        ctx.lineCap='round';
        ctx.beginPath();
        for(let i=0;i<redBatch.length;i+=4){
          ctx.moveTo(redBatch[i],redBatch[i+1]);
          ctx.lineTo(redBatch[i+2],redBatch[i+3]);
        }
        ctx.stroke();
      }

      // ── Channel edges (road in Act 1, riverbanks in Act 2) ──
      ctx.strokeStyle=bankStroke;
      ctx.lineWidth=1;
      for(const side of [-1,1]){
        ctx.beginPath();
        for(let r=0;r<=MM_ROWS;r+=2){
          const sy=syTop+(r/MM_ROWS)*viewH;
          const rx=centerlineFn(sy)+side*halfWidthFn(sy);
          const px=(rx-sxCenter+viewW/2)/viewW*MM_W;
          const py=r/MM_ROWS*MM_H;
          if(r===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
        }
        ctx.stroke();
      }

      // ── Rocks as dark dots (Act 2 only) ──
      if(isAct2){
        ctx.fillStyle='rgba(40,35,30,.88)';
        for(const rock of ROCK_SLOTS){
          if(rock.sY<syTop||rock.sY>syTop+viewH)continue;
          const rnx=rock.nx;
          if(rnx<sxCenter-viewW/2||rnx>sxCenter+viewW/2)continue;
          const px=(rnx-sxCenter+viewW/2)/viewW*MM_W;
          const py=(rock.sY-syTop)/viewH*MM_H;
          ctx.beginPath();
          ctx.arc(px,py,Math.max(1.3,rock.size*2.0),0,Math.PI*2);
          ctx.fill();
        }
      }

      // ── Agent marker (chevron; same shape for both acts) ──
      ctx.save();
      ctx.translate(carPx,carPy);
      ctx.rotate(-agent.heading);
      // Soft drop shadow for depth
      ctx.shadowColor='rgba(0,0,0,.4)';
      ctx.shadowBlur=4;
      ctx.shadowOffsetY=1;
      // Filled chevron — wedge with concave back so it reads as direction
      ctx.fillStyle='rgba(225,105,30,.96)';
      ctx.beginPath();
      ctx.moveTo(0,-7);
      ctx.lineTo(5,5);
      ctx.lineTo(0,2.2);
      ctx.lineTo(-5,5);
      ctx.closePath();
      ctx.fill();
      // Disable shadow before stroke so the outline stays crisp
      ctx.shadowColor='transparent';
      ctx.shadowBlur=0;
      ctx.shadowOffsetY=0;
      ctx.lineJoin='round';
      ctx.lineCap='round';
      ctx.lineWidth=1.1;
      ctx.strokeStyle='rgba(255,248,235,.92)';
      ctx.stroke();
      ctx.restore();
    }

    // ─── Waterfall Sound (ambient at finish) ──────────
    let waterfallGain=null,waterfallSrc=null;
    function startWaterfallSound(){
      if(!audioCtx||waterfallSrc)return;
      // Procedural waterfall: filtered noise
      const bufLen=audioCtx.sampleRate*3;
      const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
      const data=buf.getChannelData(0);
      for(let i=0;i<bufLen;i++){
        data[i]=(Math.random()-.5)*.8;
        // Low rumble modulation
        if(i>0)data[i]=data[i]*.3+data[i-1]*.7;
      }
      waterfallGain=audioCtx.createGain();waterfallGain.gain.value=0;
      const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=800;lp.Q.value=.3;
      const hp=audioCtx.createBiquadFilter();hp.type='highpass';hp.frequency.value=100;hp.Q.value=.3;
      waterfallGain.connect(lp);lp.connect(hp);hp.connect(masterGain);
      waterfallSrc=audioCtx.createBufferSource();waterfallSrc.buffer=buf;waterfallSrc.loop=true;
      waterfallSrc.connect(waterfallGain);waterfallSrc.start();
      // Fade in
      waterfallGain.gain.linearRampToValueAtTime(.15,audioCtx.currentTime+2);
    }

    // ─── Act-1 scene registry ────────────────────────────
    // All meshes below belong to Act 1. setAct(1) shows them, setAct(2)
    // hides them. Lighting (ambLight/dLight/hemiLight) stays visible in
    // both acts so the world keeps a consistent atmosphere. Act-2-specific
    // meshes (water surface, kayak, rocks) are pushed into act2SceneObjects
    // starting in Phase 3.
    act1SceneObjects.push(
      terrainMesh, contourLines3d,
      // Tree InstancedMeshes are shared between both acts — left out of the
      // registry so default visibility (true) stays across setAct toggles.
      // updateTrees branches on currentAct and places them along the road
      // or along the river banks accordingly.
      carGroups[0], carGroups[1],
      particlePoints,
      sunMesh,            // glowMesh is a child of sunMesh → hides with it
      lakeMesh, mountainGroup
    );
    // ─── Act 2: Mountain backdrop ─────────────────────────────
    // Three stacked ridges receding into the distance so the kayak feels
    // like it's heading somewhere — a horizon, not just a continuing
    // tunnel of trees. Each ridge is a procedural triangle-strip with a
    // jagged top edge, vertex-colored from a darker base to a haze-tinted
    // peak (built-in atmospheric perspective). Materials use fog:false so
    // they remain visible past Act-2's existing fog far (~95).
    function buildAct2Ridge(opts){
      const w=opts.width,peakY=opts.peakY,baseY=opts.baseY,segments=opts.segments;
      const colBot=opts.colBot,colTop=opts.colTop;
      const rng=mulberry32(opts.seed);
      // Two-octave noise for the top edge — low-freq for mountain shape,
      // high-freq for jagged peaks.
      const tops=new Float32Array(segments+1);
      for(let i=0;i<=segments;i++){
        const t=i/segments;
        const x=(t-0.5)*w;
        const lo=fbm(x*opts.freqLow,opts.seed*1e-7);
        const hi=Math.abs(noise2d(x*opts.freqHi,opts.seed*1e-7+1));
        const blend=lo*0.7+hi*0.3;
        tops[i]=peakY*(0.42+0.58*blend);
        // Tiny RNG nudge so the same x doesn't always sit at the same height
        tops[i]*=(0.92+rng()*0.16);
      }
      const vertCount=2*(segments+1);
      const positions=new Float32Array(vertCount*3);
      const colors=new Float32Array(vertCount*3);
      for(let i=0;i<=segments;i++){
        const t=i/segments;
        const x=(t-0.5)*w;
        const bIdx=i*2;       // bottom vertex
        positions[bIdx*3]=x;positions[bIdx*3+1]=baseY;positions[bIdx*3+2]=0;
        colors[bIdx*3]=colBot[0];colors[bIdx*3+1]=colBot[1];colors[bIdx*3+2]=colBot[2];
        const tIdx=i*2+1;     // top vertex (peak)
        positions[tIdx*3]=x;positions[tIdx*3+1]=tops[i];positions[tIdx*3+2]=0;
        colors[tIdx*3]=colTop[0];colors[tIdx*3+1]=colTop[1];colors[tIdx*3+2]=colTop[2];
      }
      const indices=[];
      for(let i=0;i<segments;i++){
        const bL=i*2,tL=i*2+1,bR=(i+1)*2,tR=(i+1)*2+1;
        indices.push(bL,bR,tL,tL,bR,tR);
      }
      const geo=new THREE.BufferGeometry();
      geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
      geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
      geo.setIndex(indices);
      const mat=new THREE.MeshBasicMaterial({vertexColors:true,fog:false,side:THREE.DoubleSide});
      const m=new THREE.Mesh(geo,mat);
      m.renderOrder=-1;     // draw before water/contours so they sit behind everything
      return m;
    }

    const act2Mountains=new THREE.Group();
    // Near ridge — shorter peaks, darkest base. Closest to camera, gets
    // partially occluded by foreground trees.
    const ridgeNear=buildAct2Ridge({
      width:380,peakY:18,baseY:-10,segments:64,
      freqLow:0.04,freqHi:0.18,
      colBot:[.30,.36,.34],colTop:[.55,.66,.72],seed:0x4170B70F,
    });
    ridgeNear.position.set(0,0,-85);
    act2Mountains.add(ridgeNear);
    // Mid ridge — taller, bluer base, fills the middle of the silhouette.
    const ridgeMid=buildAct2Ridge({
      width:520,peakY:26,baseY:-10,segments:64,
      freqLow:0.028,freqHi:0.12,
      colBot:[.46,.55,.60],colTop:[.66,.76,.83],seed:0x223C8E1F,
    });
    ridgeMid.position.set(0,0,-130);
    act2Mountains.add(ridgeMid);
    // Far ridge — biggest peaks, lightest tones. Reads as the giants in
    // the distance — atmospheric perspective makes them feel huge.
    const ridgeFar=buildAct2Ridge({
      width:680,peakY:34,baseY:-10,segments:64,
      freqLow:0.018,freqHi:0.08,
      colBot:[.60,.70,.78],colTop:[.78,.84,.90],seed:0x509F5132,
    });
    ridgeFar.position.set(0,0,-180);
    act2Mountains.add(ridgeFar);
    act2Mountains.visible=false;
    scene3d.add(act2Mountains);

    act2SceneObjects.push(
      waterMesh, act2ContourLines3d, kayakGroup,
      ...rockInsts,
      act2Mountains,
      act2WakeLineL, act2WakeLineR
    );

    // ─── Render Loop ─────────────────────────────────────

    function frame(){
      requestAnimationFrame(frame);
      const now=performance.now(),dt=Math.min((now-lastTime)/1000,.05);lastTime=now;

      // Act 2 runs before the pre-game preview branch: the preview rewrites
      // the clear color to the Act-1 sky every frame, so if we fall through
      // to it after setAct(2) the Act-2 backdrop gets clobbered.
      if(currentAct===2){
        if(!finishTime)gameTime+=dt;
        const k=kayaks[0];
        updateKayak(k,dt);
        updateTrees(k.scroll);
        renderAct2(now,dt);
        updateAct2HUD(k);
        updateAct2WaterAudio(k);
        updateAct2Ambient();
        updateMinimap(k,k.scroll);
        if(k.finished&&!anyFinished){anyFinished=true;finishTime=gameTime;showAct2Finish();}
        return;
      }

      // Pre-game: slow preview
      if(!started){
        previewScrollOffset+=.003*dt;
        updateTerrainMesh(previewScrollOffset);
        updateTrees(previewScrollOffset);
        if(now-(_lastContourTime||0)>100){_lastContourTime=now;updateContourLines(previewScrollOffset,0,now*0.001);}

        // Position car and show perspective
        const c0=cars[0];
        const cSY=c0.ny-previewScrollOffset*5;
        const wx=(c0.nx-0.5)*WORLD_SCALE;
        const wy=sampleTerrainHeight(c0.nx,cSY)*HEIGHT_SCALE;
        carGroups[0].position.set(wx,wy,0);
        if(countingDown){
          // Behind-car driving view during countdown
          const camTX=wx, camTY=wy+5.5, camTZ=10;
          camPos.x=lerp(camPos.x,camTX,.06);camPos.y=lerp(camPos.y,camTY,.04);camPos.z=lerp(camPos.z,camTZ,.06);
          camLook.x=lerp(camLook.x,wx,.08);camLook.y=lerp(camLook.y,wy-1.2,.06);camLook.z=lerp(camLook.z,-12,.08);
          cam3d.position.copy(camPos);cam3d.lookAt(camLook);
        }else{
          // 3/4 front view: gentle sway staying on the road (no tree clipping)
          const introT=now*.0003;
          const orbitX=wx+2.5*Math.sin(introT);
          const orbitZ=-7+1.5*Math.sin(introT*.7);
          cam3d.position.set(orbitX,wy+3.5,orbitZ);
          cam3d.lookAt(wx,wy+1.5,0);
        }
        // Sun
        sunMesh.position.set(50,12,-75);
        sunMat.color.setRGB(1,.72,.38);glowMat.opacity=.28;
        renderer.setClearColor(new THREE.Color(T.bg));
        scene3d.fog.color.set(T.bg);
        renderer.render(scene3d,cam3d);
        return;
      }

      if(!finishTime)gameTime+=dt;

      // (Act-2 branch handled earlier in the frame — before the pre-game
      // preview path so it doesn't fight over clear color.)

      // Update cars (physics unchanged)
      const activeCars=multiplayer?cars:[cars[0]];
      let maxDelta=0;

      if(multiplayer){
        const localCar=cars[localIdx];
        const d=updateCar(localCar,dt,sharedScrollOffset);
        if(d!==undefined&&d>maxDelta)maxDelta=d;
        const remoteCar=cars[1-localIdx];
        applyRemoteState(remoteCar,remoteCarState);
        if(isHost){
          sharedScrollOffset=Math.max(0,sharedScrollOffset+maxDelta);
          sendScroll(sharedScrollOffset);
        }else{
          if(remoteScroll!==null)sharedScrollOffset=remoteScroll;
          else sharedScrollOffset=Math.max(0,sharedScrollOffset+maxDelta);
        }
        sendTimer+=dt;
        if(sendTimer>.033){sendTimer=0;sendCarState(localCar);}
      }else{
        const d=updateCar(cars[0],dt,sharedScrollOffset);
        if(d!==undefined&&d>maxDelta)maxDelta=d;
        sharedScrollOffset=Math.max(0,sharedScrollOffset+maxDelta);
      }

      // ─── Update 3D terrain ────────────────────────
      updateTerrainMesh(sharedScrollOffset);

      // ─── Position cars in 3D world ────────────────
      const localCar=cars[localIdx];
      // ─── Update topology/contour lines (throttled to ~10fps) ──────────
      if(now-(_lastContourTime||0)>100){
        _lastContourTime=now;
        // Forest + road topology is static. The 3D contour lines only warp
        // when the player chops a tree, to visualize the disruption.
        // (Off-road / river warp is no longer wired into the contour pass.)
        updateContourLines(sharedScrollOffset,localCar._treeHitFlash||0,now*0.001);
      }
      updateTrees(sharedScrollOffset);
      updateParticles(dt);
      renderParticles();
      const localSY=localCar.ny-sharedScrollOffset*5;

      for(const c of activeCars){
        const g=carGroups[c.idx];
        const cSY=c.ny-sharedScrollOffset*5;

        // Parking animation
        if(c.finished&&c.parkTargetX!==undefined){
          c.parkTimer=Math.min(3,c.parkTimer+dt);
          const t=Math.min(1,c.parkTimer/2);
          c.nx=lerp(c.nx,c.parkTargetX,t*.03);
          c.speed*=.95;c.lateralSpeed*=.9;
          c.heading=lerp(c.heading,0,.05);
        }

        // World position on terrain
        const wx=(c.nx-0.5)*WORLD_SCALE;
        const terrY=sampleTerrainHeight(c.nx,cSY)*HEIGHT_SCALE;
        // Z relative to local car (local car is always at Z=0)
        const wz=-(cSY-localSY)*WORLD_SCALE;

        // Car sits ON terrain — never below. Soft bounce for impacts only.
        if(c.bounceY===undefined)c.bounceY=terrY;
        if(c.bounceV===undefined)c.bounceV=0;
        c.bounceV+=(terrY-c.bounceY)*1.2;
        c.bounceV*=.25; // heavy damping
        c.bounceV=Math.max(-.3,Math.min(.3,c.bounceV));
        c.bounceY+=c.bounceV;
        // Very strong pull to terrain — car never sinks below
        c.bounceY=lerp(c.bounceY,terrY,.8);
        // Hard floor: car ALWAYS at or above terrain
        c.bounceY=Math.max(c.bounceY,terrY);
        const wy=c.bounceY;

        g.position.set(wx,wy,wz);

        // Body orientation: slight lean from lateral movement
        g.rotation.y=lerp(g.rotation.y||0,c.heading*.3,.12);

        // Front wheels turn with steering
        if(g.userData.frontWheelPivot){
          g.userData.frontWheelPivot.rotation.y=lerp(g.userData.frontWheelPivot.rotation.y,-c.heading*1.8,.2);
        }

        // Terrain slope from actual wheel positions (car is 3.4w × 4.0l)
        // Front axle is ~2 units ahead, rear ~2 behind; wheels ±1.7 laterally
        const wheelFwd=2.0/WORLD_SCALE;  // front axle offset in normalized coords
        const wheelLat=1.7/WORLD_SCALE;  // wheel lateral offset in normalized coords
        const hFront=sampleTerrainHeight(c.nx,cSY-wheelFwd)*HEIGHT_SCALE;
        const hRear=sampleTerrainHeight(c.nx,cSY+wheelFwd)*HEIGHT_SCALE;
        const hLeft2=sampleTerrainHeight(c.nx-wheelLat,cSY)*HEIGHT_SCALE;
        const hRight2=sampleTerrainHeight(c.nx+wheelLat,cSY)*HEIGHT_SCALE;
        // Pitch: atan of height diff over wheelbase length (4 world units)
        const pitchAngle=Math.atan2(hFront-hRear,4.0);
        // Roll: atan of height diff over track width (3.4 world units)
        const rollAngle=Math.atan2(hRight2-hLeft2,3.4);
        // Apply directly — no artificial scaling, just the real terrain angle
        g.rotation.x=lerp(g.rotation.x,pitchAngle,.25); // fast follow
        g.rotation.z=lerp(g.rotation.z,rollAngle+c.lateralSpeed*.15,.2);
        // Keep shadow flat on ground (counter-rotate car tilt)
        if(g.userData.shadow){
          g.userData.shadow.rotation.x=-g.rotation.x;
          g.userData.shadow.rotation.z=-g.rotation.z;
          g.userData.shadow.position.y=.05-wy+terrY; // pin to terrain
        }

        // Off-road: very subtle rumble
        if(c.warp>.15)g.position.y+=Math.sin(now*.006)*c.warp*.02;

        g.visible=true;
        applyDamageVisuals(g,c.stability);
      }
      if(!multiplayer)carGroups[1].visible=false;

      // ─── Camera: third-person behind car ──────────
      // Slow oscillating shake — no per-frame jitter, feels like rough road not seizure
      const shakeT=now*.001;
      const shake=localCar.warp>.05?Math.sin(shakeT*4.3)*Math.cos(shakeT*7.1)*localCar.warp*.12:0;
      const shakeZ=localCar.catting?Math.sin(shakeT*11)*.15:0;

      const carWX=(localCar.nx-0.5)*WORLD_SCALE;
      const carWY=sampleTerrainHeight(localCar.nx,localSY)*HEIGHT_SCALE;

      {

      // Heading-aware chase camera — barely perceptible. 0.08 caps the
      // camera arc at ~2° at full steer. Just enough to add a subliminal
      // sense of weight when turning. Anything more reads as motion.
      const ACT1_CAM_FOLLOW=0.08;
      const hCam=localCar.heading*ACT1_CAM_FOLLOW;
      const sinHc=Math.sin(hCam),cosHc=Math.cos(hCam);
      const camBack=10, lookAhead=12;

      // Camera target: higher behind car, looking down at inclined road ahead
      const camTargetX=carWX+shake-sinHc*camBack;
      const camTargetY=carWY+5.5;                   // higher up to see road incline
      const camTargetZ=cosHc*camBack+shakeZ;        // arcs around with heading
      const lookTargetX=carWX+sinHc*lookAhead;
      const lookTargetY=carWY-1.2;                  // look DOWN at road
      const lookTargetZ=-cosHc*lookAhead;           // look further ahead to see terrain

      camPos.x=lerp(camPos.x,camTargetX,.06);
      camPos.y=lerp(camPos.y,camTargetY,.04);
      camPos.z=lerp(camPos.z,camTargetZ,.06);
      camLook.x=lerp(camLook.x,lookTargetX,.08);
      camLook.y=lerp(camLook.y,lookTargetY,.06);
      camLook.z=lerp(camLook.z,lookTargetZ,.08);

      cam3d.position.copy(camPos);
      cam3d.lookAt(camLook);
      } // end else (normal driving camera)

      // ─── Update lake + mountain vista ────────────────
      const lakeSY=LWY*5;
      const carSY2=0.7-sharedScrollOffset*5;
      const lakeRelZ=(lakeSY-carSY2)*WORLD_SCALE; // ahead of car = negative Z
      const lakeWX=(LCX-0.5)*WORLD_SCALE;
      const lakeWY=sampleTerrainHeight(LCX,lakeSY)*HEIGHT_SCALE-1;
      const lakeZ=lakeRelZ;
      lakeMesh.position.set(lakeWX,lakeWY,lakeZ);
      const lakeDist=Math.abs(sharedScrollOffset-FINISH_DIST);
      // Hold the end scene back until the car is genuinely close so the
      // trailhead doesn't pop into view long before the road catches up
      // to it. ~0.25 ≈ last 8% of the drive.
      const showLake=lakeDist<0.25;
      lakeMesh.visible=showLake;
      mountainGroup.visible=showLake;
      if(showLake){
        // Fade in end scene gradually
        endSceneFade=Math.min(1,endSceneFade+dt*.3);
        for(const mat of allEndMats)mat.opacity=endSceneFade;
        lakeMat.opacity=.85*endSceneFade;
        // Anchor the end scene at a fixed scroll-space Y so it behaves like a
        // real destination: still in the world while the car drives toward it.
        // The offset places mountainGroup ~7 units AHEAD of the car at finish,
        // because parkingMesh sits at z=+7 in mountainGroup-local space — the
        // design wants the car parked roughly at the lot center (world Z=0).
        // 7 / WORLD_SCALE = 0.0875 in scroll-space, rounded to -0.09 so the
        // parking lot, barrier, trailhead sign and side trees land neatly
        // around the car instead of stacking up behind it.
        const endSceneSY=LSY-0.09;
        const endSceneRelZ=(endSceneSY-carSY2)*WORLD_SCALE;
        const endTerrY=sampleTerrainHeight(LCX-0.2,endSceneSY)*HEIGHT_SCALE;
        mountainGroup.position.set(0,endTerrY-0.1,endSceneRelZ);
        // River shimmer
        riverMat.opacity=endSceneFade*.85;
      }else{
        endSceneFade=0;
      }

      // ─── Theme / lighting update ──────────────────
      const progress=Math.min(1,sharedScrollOffset/FINISH_DIST);
      T=getTimeOfDayTheme(progress);
      renderer.setClearColor(new THREE.Color(T.bg));
      scene3d.fog.color.set(T.bg);
      scene3d.fog.near=T.fogNear||50;
      scene3d.fog.far=T.fogFar||120;
      ambLight.intensity=T.aL;dLight.intensity=T.dL;dLight.color.set(T.dC);
      document.body.style.background=T.bg;
      // Push fog back and brighten scene when end landscape is visible
      if(mountainGroup.visible){
        scene3d.fog.far=400;scene3d.fog.near=80;
        ambLight.intensity=Math.max(ambLight.intensity,.7);
        dLight.intensity=Math.max(dLight.intensity,1.1);
      }

      // ─── Sun arc (east dawn→overhead noon→west sunset) ──────────
      const sunAng=progress*Math.PI; // 0=east, π=west
      const sunRelX=Math.cos(sunAng)*40; // narrower east-west arc
      const sunRelY=5+Math.sin(sunAng)*18; // 5 low to 23 high — stays visible through tree corridor
      sunMesh.position.set(cam3d.position.x+sunRelX, sunRelY, cam3d.position.z-65);
      // Sun color: cool-white at noon, warm orange at dawn/dusk
      const sunWarm=Math.pow(1-Math.sin(sunAng),2.5); // 0=noon, 1=horizon
      sunMat.color.setRGB(.98+sunWarm*.02, .93-sunWarm*.25, .7-sunWarm*.52);
      glowMat.color.setRGB(1,.82-sunWarm*.2,.55-sunWarm*.35);
      glowMat.opacity=.1+sunWarm*.22; // bigger glow at horizon

      // ─── Render 3D scene ──────────────────────────
      if(multiplayer){
        renderer.setScissorTest(true);renderer.clear();
        const halfAspect=(W/2)/H;
        for(let p=0;p<2;p++){
          const xOff=p===0?0:W/2;
          renderer.setViewport(xOff,0,W/2,H);
          renderer.setScissor(xOff,0,W/2,H);
          carGroups[0].visible=(p===0);
          carGroups[1].visible=(p===1);
          cam3d.aspect=halfAspect;
          cam3d.updateProjectionMatrix();
          // Position camera behind this player's car
          const c=cars[p];
          const cSY=c.ny-sharedScrollOffset*5;
          const cWX=(c.nx-0.5)*WORLD_SCALE;
          const cWY=sampleTerrainHeight(c.nx,cSY)*HEIGHT_SCALE;
          cam3d.position.set(cWX,cWY+8,15);
          cam3d.lookAt(cWX,cWY+2,-12);
          renderer.render(scene3d,cam3d);
        }
        renderer.setScissorTest(false);
        renderer.setViewport(0,0,W,H);
        cam3d.aspect=W/H;cam3d.updateProjectionMatrix();
      }else{
        renderer.render(scene3d,cam3d);
      }

      // ─── Minimap ────────────────────────────────────
      updateMinimap(localCar,sharedScrollOffset);

      // ─── Audio ────────────────────────────────────
      updateAudio(baseScroll+localCar.speed,Math.max(...activeCars.map(c=>c.warp)),localCar.damage);

      // ─── HUD ──────────────────────────────────────
      for(const c of activeCars){
        const i=c.idx;
        document.getElementById('h-speed-'+i).textContent=`${((0.02+c.speed)*1000).toFixed(0)} km/h`;
        const terrainEl=document.getElementById('h-terrain-'+i);
        if(terrainEl){
          const biomeNames2={meadow:'Meadow',cliff:'Coastal Cliffs',forest:'Rainforest',alpine:'Alpine'};
          const cb2=getBiome(c.ny-sharedScrollOffset*5);
          terrainEl.textContent=(c.isOffRoad?'Off-Road \u00b7 ':'')+(biomeNames2[cb2]||'');
        }
        const stabEl=document.getElementById('h-stab-'+i);
        if(stabEl){const st=Math.max(0,c.stability);
          const dots=5;const filled=Math.round(st/100*dots);
          stabEl.textContent='●'.repeat(filled)+'○'.repeat(dots-filled);
          stabEl.style.color=filled>=4?'rgba(80,100,80,.7)':filled>=2?'rgba(160,120,40,.8)':'rgba(180,50,40,.9)';
        }
      }
      const pct=Math.min(100,progress*100);
      document.getElementById('progress-fill').style.width=pct+'%';

      const displayTime=finishTime||gameTime;
      const m=Math.floor(displayTime/60),sec=(displayTime%60).toFixed(1);
      timerEl.textContent=`${String(m).padStart(2,'0')}:${sec.padStart(4,'0')}`;
      timerEl.style.color=T.timer;

      if(activeCars.some(c=>c.isOffRoad&&c.warp>.1))offroadFlash.classList.add('visible');
      else offroadFlash.classList.remove('visible');

      // Level/bubble indicator — combine roll, pitch, lateral speed, and off-road warp
      const carGroup0=carGroups[0];
      if(carGroup0){
        const c0=cars[0];
        const combinedTilt=carGroup0.rotation.z+c0.lateralSpeed*.5+c0.warp*.3*(Math.sin(now*.003));
        // Tree hit flash decays
        if(c0._treeHitFlash>0)c0._treeHitFlash=Math.max(0,c0._treeHitFlash-dt*2);
        drawLevelIndicator(combinedTilt,c0._treeHitFlash||0);
      }

      // Kayak highlight pulsing
      updateKayakHighlight(now*.001);

      // Waterfall ambient near finish
      if(lakeMesh.visible&&!waterfallSrc)startWaterfallSound();
    }
    // ─── Debug: skip to Act 2 via ?act=2 URL param ───────────
    // First-user-gesture audio bootstrap — browsers require a user gesture
    // to start an AudioContext. The Drive button does this via beginGame
    // for the normal flow; for the ?act=2 debug path (or for the start
    // page before clicking DRIVE), we attach a one-shot listener that
    // boots audio on the first click/key.
    async function _bootAudioOnGesture(){
      if(!audioCtx){
        try{await initAudio();}catch(e){console.warn('audio init failed',e);}
      }else if(audioCtx.state==='suspended'){
        try{await audioCtx.resume();}catch(e){console.warn('audio resume failed',e);}
      }
    }
    addEventListener('click',_bootAudioOnGesture,{once:true});
    addEventListener('keydown',_bootAudioOnGesture,{once:true});

    // Lets you iterate on Act 2 without driving through Act 1 every time.
    // Removes the overlay, reveals the HUD, skips audio init + countdown,
    // and snaps the camera to the kayak's spawn.
    if(urlParams.get('act')==='2'){
      overlay.classList.add('hidden');
      document.getElementById('hud-left').classList.add('visible');
      document.getElementById('timer').classList.add('visible');
      document.getElementById('progress-bar').classList.add('visible');
      levelEl.classList.add('visible');
      document.getElementById('minimap').classList.add('visible');
      requestAnimationFrame(()=>{
        const hudRect=document.getElementById('hud-left').getBoundingClientRect();
        const w=Math.max(80,Math.round(hudRect.width));
        levelCanvas.width=w;levelCanvas.style.width=w+'px';levelEl.style.width=w+'px';
      });
      started=true;
      setAct(2);
      const startWx=(kayaks[0].px-0.5)*WORLD_SCALE;
      cam3d.position.set(startWx,3.2,8.5);
      document.body.tabIndex=0;document.body.focus();
    }

    frame();
  </script>
</body>
</html>
