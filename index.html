<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Off the Road</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Oswald:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:#1a2a1a}
    #car-canvas{position:fixed;inset:0;z-index:0}

    #overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;padding:8vh 8vw;background:linear-gradient(180deg,transparent 0%,rgba(10,18,10,.15) 40%,rgba(10,15,10,.55) 100%);transition:opacity 1s ease;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
    #overlay.hidden{opacity:0;pointer-events:none}
    /* Portfolio-aligned: DM Sans throughout, tight tracking, sentence case. */
    #overlay h1{font-family:'DM Sans',sans-serif;font-weight:600;font-size:clamp(48px,10vw,96px);color:rgba(245,242,236,.96);letter-spacing:-0.025em;line-height:1.02}
    .subtitle{font-family:'DM Sans',sans-serif;font-weight:400;font-size:14px;color:rgba(230,225,210,.72);letter-spacing:-0.005em;text-transform:none;margin-top:14px}
    .overlay-controls{margin-top:22px;font-family:'DM Sans',sans-serif;font-weight:400;font-size:13px;letter-spacing:0;text-transform:none;color:rgba(220,215,200,.65)}
    .overlay-controls span{color:rgba(245,240,225,.94);font-weight:500;padding:2px 7px;border:1px solid rgba(220,215,195,.32);border-radius:6px;margin:0 2px;font-size:12px}

    .mode-row{display:flex;gap:8px;margin-top:24px}
    .btn{padding:10px 22px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;letter-spacing:-0.005em;text-transform:none;color:rgba(230,225,210,.85);border:1px solid rgba(220,215,200,.28);border-radius:999px;background:rgba(255,255,255,.06);cursor:pointer;transition:all .25s ease;backdrop-filter:blur(6px)}
    .btn:hover{color:rgba(250,248,240,.98);border-color:rgba(220,215,200,.6);background:rgba(255,255,255,.12)}
    .btn.active{background:rgba(255,255,255,.18);border-color:rgba(220,215,200,.7);color:rgba(250,248,240,.98)}
    .btn:disabled{opacity:.35;cursor:not-allowed}

    #together-panel{margin-top:16px;text-align:center;display:none}
    #together-panel p{font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(80,100,80,.55);margin-bottom:8px}
    #session-link{width:340px;max-width:80vw;padding:8px 12px;font-size:12px;font-family:'DM Sans',sans-serif;color:#3a5a3a;background:rgba(255,255,255,.55);border:1px solid rgba(80,120,80,.25);border-radius:8px;text-align:center;cursor:pointer}
    #peer-status{margin-top:8px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0;text-transform:none;color:rgba(80,100,80,.55)}
    #peer-status.connected{color:#3a6a3a;font-weight:500}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    /* Cool accent glow (was warm orange) — matches the portfolio palette
       on the dark in-game backdrop. */
    @keyframes kayakGlow{0%,100%{box-shadow:0 0 22px rgba(120,160,220,.45);border-color:rgba(180,210,255,.6)}50%{box-shadow:0 0 8px rgba(120,160,220,.18);border-color:rgba(180,210,255,.28)}}
    .kayak-pulse{animation:kayakGlow 2s ease-in-out infinite}
    .waiting{animation:pulse 2s infinite}

    .settings-toggle{margin-top:20px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;letter-spacing:0;text-transform:none;color:rgba(200,210,195,.5);cursor:pointer;border:none;background:none;transition:color .25s}
    .settings-toggle:hover{color:rgba(225,232,218,.85)}
    #settings-panel{margin-top:12px;display:none;gap:6px;flex-wrap:wrap;justify-content:center}
    #settings-panel.open{display:flex}

    .drive-btn{margin-top:28px;padding:14px 36px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:15px;letter-spacing:-0.01em;text-transform:none;color:rgba(245,242,232,.94);border:1px solid rgba(220,215,200,.45);background:rgba(255,255,255,.10);border-radius:999px;backdrop-filter:blur(8px);transition:all .3s ease}
    .drive-btn:hover{background:rgba(255,255,255,.20);border-color:rgba(245,240,225,.75);color:rgba(250,248,240,1);box-shadow:0 6px 20px -8px rgba(0,0,0,.25)}

    #countdown{position:fixed;inset:0;z-index:150;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:clamp(60px,15vw,120px);font-weight:600;color:rgba(245,242,236,.92);letter-spacing:-0.02em;text-shadow:0 2px 20px rgba(0,0,0,.3);pointer-events:none;opacity:0;transition:opacity .25s}
    #countdown.visible{opacity:1}

    /* Shared frosted-glass chrome (only used by the minimap container now). */
    .ui-glass{background:rgba(245,238,222,.38);-webkit-backdrop-filter:blur(10px) saturate(1.15);backdrop-filter:blur(10px) saturate(1.15);border:1px solid rgba(120,100,70,.22);border-radius:6px;box-shadow:0 2px 14px rgba(20,15,10,.12)}
    /* HUD readouts — DM Sans, sentence case, tabular numerals for the values. */
    #hud-left,#hud-right{position:fixed;z-index:50;pointer-events:none;opacity:0;transition:opacity .6s;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;letter-spacing:-0.005em;text-transform:none;line-height:1.8;color:rgba(40,55,40,.78)}
    #hud-left{right:24px;bottom:20px;text-align:right}
    #hud-right{right:24px;top:20px;text-align:right;display:none}
    #hud-left.visible,#hud-right.visible{opacity:1}
    .hud-val{color:rgba(20,30,20,.95);font-weight:500;font-variant-numeric:tabular-nums}
    .hud-title{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:rgba(20,30,20,.92);letter-spacing:-0.015em;text-transform:none;margin-bottom:6px}
    #offroad-flash{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;background:radial-gradient(circle at 50% 50%,rgba(200,120,50,.08) 0%,transparent 60%);transition:opacity .15s}
    #offroad-flash.visible{opacity:1}
    #progress-bar{position:fixed;top:48px;left:50%;transform:translateX(-50%);width:140px;height:4px;z-index:50;pointer-events:none;opacity:0;transition:opacity .6s;background:rgba(40,35,25,.28);border-radius:2px;overflow:hidden;border:1px solid rgba(120,100,70,.25)}
    #progress-bar.visible{opacity:1}
    #progress-fill{height:100%;width:0%;background:linear-gradient(90deg,rgba(90,120,70,.85),rgba(140,120,60,.78),rgba(100,80,50,.85));border-radius:2px;transition:width .3s ease-out}
    /* Minimap legend — sits above the map, no background. */
    #map-scale{position:fixed;bottom:262px;left:16px;width:240px;z-index:51;pointer-events:none;opacity:0;transition:opacity .6s;text-align:center;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0;text-transform:none;color:rgba(40,55,40,.78)}
    #map-scale.visible{opacity:1}
    /* Timer hidden for now — keeps the experience low-pressure. Toggle back
       to its old DM-Sans rule if you want to re-introduce the time challenge. */
    #timer{display:none}
    #timer.visible{display:none}

    /* ══ Design tokens (matches /experiments/portfolio system) ══
       DM Sans, cool-gray neutrals, light frost glass, no warm tones.
       Used on the finish-screen card + the act2 tune panel so the
       chrome reads as portfolio-aligned UI on top of the colorful
       game scene. */
    :root{
      --ink-1:#0c0e12;
      --ink-2:rgba(12,14,18,0.62);
      --ink-3:rgba(12,14,18,0.40);
      --line-1:rgba(12,14,18,0.08);
      --line-2:rgba(12,14,18,0.16);
      --frost-bg:rgba(255,255,255,0.78);
      --frost-border:rgba(255,255,255,0.65);
      --shadow-card:0 1px 2px rgba(12,14,24,0.06),0 14px 36px -18px rgba(12,14,24,0.28);
      --accent:#1e3a8a;
      --pill-bg:#0c0e12;
      --pill-ink:#ffffff;
    }
    /* Finish screen: no card. A vertical black gradient covers the scene
       just enough to read the text, but the gameplay backdrop stays visible
       behind. Text is light so the scene can show through. */
    #finish-screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:linear-gradient(180deg,rgba(8,10,14,0) 0%,rgba(8,10,14,0.32) 22%,rgba(8,10,14,0.65) 55%,rgba(8,10,14,0.82) 100%);font-family:'DM Sans',-apple-system,sans-serif;opacity:0;pointer-events:none;transition:opacity 1.2s ease}
    #finish-screen.visible{opacity:1;pointer-events:auto}
    .fin-card{background:none;border:none;box-shadow:none;padding:24px 24px 28px;max-width:560px;width:100%;display:flex;flex-direction:column;align-items:center;text-shadow:0 1px 12px rgba(0,0,0,0.45)}
    #finish-screen h2{font-family:'DM Sans',sans-serif;font-weight:600;font-size:clamp(28px,4vw,42px);color:rgba(248,248,242,0.96);letter-spacing:-0.02em;margin-bottom:12px;text-shadow:0 2px 18px rgba(0,0,0,0.55)}
    .stat{font-family:'DM Sans',sans-serif;font-size:13px;color:rgba(238,238,232,0.78);margin:3px 0;letter-spacing:0;text-transform:none;font-weight:400}
    .stat b{color:rgba(248,248,242,0.96);font-weight:500}
    /* Gauges align by their LABELS (flex-end), so a tall numeric value and
       a short stability-dots row both bottom-anchor on the same label line. */
    .stat-row{display:flex;gap:36px;margin:8px 0;align-items:flex-end;justify-content:center}
    /* Inside each gauge, anchor everything to a fixed-height value-slot so
       'value' areas occupy the same vertical box regardless of content. */
    .stat-gauge{display:flex;flex-direction:column;align-items:center;gap:6px}
    .stat-gauge .gauge-val{font-family:'DM Sans',sans-serif;font-size:26px;font-weight:500;color:rgba(248,248,242,0.97);letter-spacing:-0.01em;min-height:32px;display:flex;align-items:center;justify-content:center}
    .stat-gauge .gauge-label{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(220,224,216,0.62);font-weight:500}
    /* Act-2 finish enhancements: animated reveals, stability dots, journey trace bar. */
    .fin-section{opacity:0;transform:translateY(10px);animation:fin-in .65s cubic-bezier(.2,.7,.3,1) forwards;width:100%;display:flex;flex-direction:column;align-items:center}
    .fin-divider{width:100%;max-width:380px;height:1px;background:rgba(238,238,232,0.18);margin:18px auto 10px;opacity:0;animation:fin-in .5s ease forwards}
    .fin-heading{font-family:'DM Sans',sans-serif;font-weight:500;margin-top:6px;color:rgba(220,224,216,0.62);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
    @keyframes fin-in{to{opacity:1;transform:translateY(0)}}
    .stab-dots{display:inline-flex;gap:5px;align-items:center;justify-content:center;min-height:32px}
    .stab-dots .dot{width:11px;height:11px;border-radius:50%;background:rgba(238,238,232,0.18);transition:background .4s ease;box-shadow:0 0 1px rgba(0,0,0,0.4)}
    .stab-dots .dot.fill{background:rgba(120,210,140,0.92);box-shadow:0 0 10px rgba(120,210,140,0.35)}
    .stab-dots .dot.warn{background:rgba(230,180,80,0.92);box-shadow:0 0 10px rgba(230,180,80,0.35)}
    .stab-dots .dot.danger{background:rgba(230,90,72,0.92);box-shadow:0 0 10px rgba(230,90,72,0.45)}
    .journey-trace{position:relative;width:320px;height:6px;background:rgba(238,238,232,0.14);border-radius:3px;margin:18px auto 22px}
    .journey-trace .filled{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,rgba(170,205,255,0.55),rgba(220,235,255,0.95));border-radius:3px;transform-origin:left;transform:scaleX(0);animation:trace-fill 1.4s cubic-bezier(.3,.6,.2,1) .8s forwards}
    .journey-trace .marker{position:absolute;top:-3px;width:2px;height:12px;background:rgba(238,238,232,0.55);border-radius:1px}
    .journey-trace .marker.rapids{background:rgba(255,180,120,0.85)}
    .journey-trace .marker.pool{background:rgba(150,210,255,0.85)}
    .journey-trace .label{position:absolute;top:13px;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:rgba(220,224,216,0.62);transform:translateX(-50%);white-space:nowrap;font-weight:500}
    @keyframes trace-fill{to{transform:scaleX(var(--fill-pct,1))}}
    .rating-badge{display:inline-block;padding:7px 18px;margin-top:6px;border:1px solid rgba(238,238,232,0.32);border-radius:999px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;letter-spacing:0;text-transform:none;color:rgba(248,248,242,0.97);background:rgba(8,10,14,0.35);backdrop-filter:blur(2px)}
    /* Level/stability bubble — sits above the SPEED readout in the
       bottom-right so it never hides behind the car in the 3D viewport.
       Width is set at runtime to match the HUD-left column. */
    #level-indicator{position:fixed;bottom:80px;right:24px;z-index:50;pointer-events:none;opacity:0;transition:opacity .6s}
    #level-indicator.visible{opacity:1}
    #level-indicator canvas{display:block}
    #minimap{position:fixed;bottom:16px;left:16px;z-index:50;pointer-events:none;opacity:0;transition:opacity .6s;border:1px solid rgba(80,70,55,.45);border-radius:6px;overflow:hidden;box-shadow:0 4px 18px rgba(20,15,10,.28)}
    #minimap.visible{opacity:1}
    #minimap canvas{display:block}
    #split-line{position:fixed;left:50%;top:0;width:2px;height:100%;background:rgba(80,100,80,.15);z-index:55;display:none;pointer-events:none}
    .player-label{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:0;text-transform:none;opacity:.55;margin-bottom:2px}
    /* Tune panel — portfolio-aligned: light frost glass, DM Sans, cool-gray ink. */
    #act2-tune{position:fixed;left:16px;top:16px;right:auto;z-index:120;width:268px;max-height:calc(100vh - 32px);overflow-y:auto;padding:12px 14px;padding-top:44px;background:var(--frost-bg);border:1px solid var(--line-1);border-radius:14px;color:var(--ink-1);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0;backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);box-shadow:var(--shadow-card)}
    #act2-tune.collapsed{width:34px;height:34px;min-width:0;padding:0;display:flex;align-items:center;justify-content:center;background:transparent;border:none;backdrop-filter:none;-webkit-backdrop-filter:none;box-shadow:none}
    #act2-tune.collapsed #act2-tune-inner{display:none}
    #act2-tune .act2-tune-toggle{position:absolute;top:8px;right:8px;flex:0 0 auto;width:34px;height:34px;padding:0;border:1px solid var(--line-2);border-radius:999px;background:rgba(255,255,255,.85);color:var(--ink-1);font-size:16px;line-height:1;cursor:pointer;font-family:'DM Sans',sans-serif}
    #act2-tune.collapsed .act2-tune-toggle{position:static;top:auto;right:auto;box-shadow:var(--shadow-card);background:var(--frost-bg);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%)}
    .act2-tune-toggle:hover{background:#fff}
    #act2-tune h3{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:-0.01em;text-transform:none;margin-bottom:10px;color:var(--ink-1)}
    #act2-tune .tune-section{border-top:1px solid var(--line-1);margin-top:12px;padding-top:10px}
    #act2-tune .tune-section:first-of-type{border-top:none;margin-top:4px;padding-top:0}
    #act2-tune .tune-section h4{margin:0 0 8px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;letter-spacing:.10em;text-transform:uppercase;color:var(--ink-3)}
    .tune-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;margin:7px 0}
    .tune-row label{color:var(--ink-2);font-weight:400}
    .tune-row output{color:var(--ink-1);font-weight:500;font-variant-numeric:tabular-nums;min-width:42px;text-align:right}
    .tune-row input[type="range"]{grid-column:1/-1;width:100%;accent-color:var(--accent)}
    #act2-tune select{grid-column:1/-1;width:100%;padding:6px 8px;margin-top:2px;background:#fff;color:var(--ink-1);border:1px solid var(--line-2);border-radius:8px;font:inherit;font-size:11px;font-family:'DM Sans',sans-serif}
    #act2-tune .btn-row{display:flex;gap:8px;margin-top:12px}
    #act2-tune .btn-row button{flex:1;padding:7px 10px;border:1px solid var(--line-2);border-radius:999px;background:rgba(255,255,255,.7);color:var(--ink-1);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:background .15s ease,border-color .15s ease}
    #act2-tune .btn-row button:hover{background:#fff;border-color:var(--ink-3)}
    /* Finish-screen pill buttons — translucent on the dark gradient so the
       scene shows through, with a soft border so they read at a glance. */
    .fin-card .btn{padding:11px 22px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:13px;letter-spacing:0;text-transform:none;color:rgba(248,248,242,0.97);border:1px solid rgba(238,238,232,0.42);border-radius:999px;background:rgba(255,255,255,0.10);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:transform .15s ease,background .15s ease,border-color .15s ease}
    .fin-card .btn:hover{background:rgba(255,255,255,0.22);border-color:rgba(248,248,242,0.78);color:rgba(255,255,255,1);transform:translateY(-1px)}
    .fin-card .btn.fin-secondary{background:transparent;color:rgba(238,238,232,0.85);border:1px solid rgba(238,238,232,0.28)}
    .fin-card .btn.fin-secondary:hover{background:rgba(255,255,255,0.08);border-color:rgba(238,238,232,0.6);color:rgba(255,255,255,1)}
    .fin-card .kayak-pulse{animation:none;box-shadow:0 4px 22px -6px rgba(120,180,255,0.45)}

    /* ─── On-screen touch controls (inverted-T D-pad) ───────────────────
       Single cluster centered at the bottom edge, shaped like a keyboard
       arrow-key cluster: ↑ on top, ← ↓ → on the bottom row. Each button
       maps 1:1 to a keyboard arrow key via keys[], so the existing
       keyDown() input layer is untouched.

       Visibility model:
       - On mobile (max-width:768px) we auto-show; phones can't play
         without it and a toggle pill there would just be clutter.
       - On tablets / laptops / desktops we DON'T auto-show — a small
         "Touch controls" pill in the corner toggles them on demand.
         (Touch-screen laptops report pointer:coarse, so the previous
         pointer:coarse trigger was showing the pad on machines that
         already had a keyboard, overlapping the HUD.)                  */
    #touch-controls{
      position:fixed;
      bottom:max(20px,env(safe-area-inset-bottom,20px));
      left:50%;
      transform:translateX(-50%);
      z-index:60;
      display:none;
      pointer-events:none;
    }
    body.touch-on #touch-controls{display:block}
    /* Auto-show on phones AND tablets (≤1024px). On these sizes the
       touch pad IS the primary input, so we anchor it bottom-right to
       leave room for minimap + HUD across the top. Desktop keeps the
       default bottom-center position because it only appears via the
       toggle pill. */
    @media (max-width:1200px){
      #touch-controls{
        display:block;
        left:auto;
        transform:none;
        right:max(20px,env(safe-area-inset-right,20px));
      }
    }
    /* Hide the pad + toggle pill while the splash overlay is visible —
       the pad isn't useful on the start screen. Both #overlay and the
       touch elements are direct children of body, so the general
       sibling combinator picks them up. */
    #overlay:not(.hidden)~#touch-controls,
    #overlay:not(.hidden)~#touch-toggle{display:none !important}

    /* Inverted-T D-pad. Absolute-positioning each button inside an
       explicitly-sized container is more robust than grid (some mobile
       browsers were collapsing the grid to a single column). */
    .tc-pad{
      position:relative;
      width:200px;height:136px;
      pointer-events:auto;
    }
    .tc-btn{
      position:absolute;
      width:64px;height:64px;
      border-radius:18px;
      border:1px solid rgba(245,245,238,0.45);
      background:rgba(20,28,34,0.42);
      -webkit-backdrop-filter:blur(12px) saturate(140%);
      backdrop-filter:blur(12px) saturate(140%);
      color:rgba(250,250,244,0.96);
      font-family:'DM Sans',sans-serif;
      font-size:26px;font-weight:500;line-height:1;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;padding:0;
      touch-action:none;user-select:none;-webkit-user-select:none;
      -webkit-tap-highlight-color:transparent;
      transition:transform .08s ease,background .12s ease,border-color .12s ease;
      box-shadow:0 4px 16px -8px rgba(0,0,0,0.45);
    }
    .tc-up   {top:0;   left:68px}
    .tc-left {top:72px;left:0}
    .tc-down {top:72px;left:68px}
    .tc-right{top:72px;left:136px}
    .tc-btn:active,.tc-btn.tc-pressed{
      background:rgba(255,255,255,0.30);
      border-color:rgba(255,255,255,0.85);
      transform:scale(0.93);
    }

    /* Toggle pill — lives where the pad itself would appear (bottom
       center) so the spatial relationship is clear. When the pad turns
       on, the pill lifts above it. Three visibility tiers:
       - mobile (≤768px): hidden, pad auto-shows.
       - tablet (769–1024px): full frosted-glass pill, keep it inviting
         because touch is the likely primary input on this size.
       - desktop (>1024px): faded down to a subtle hint, brightens on
         hover. Most desktop users will use the keyboard anyway. */
    #touch-toggle{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:max(24px,env(safe-area-inset-bottom,24px));
      z-index:70;
      padding:6px 14px;
      font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
      letter-spacing:0;color:rgba(35,50,35,0.85);
      background:rgba(245,238,222,0.55);
      border:1px solid rgba(120,100,70,0.28);
      border-radius:999px;
      cursor:pointer;
      -webkit-backdrop-filter:blur(8px) saturate(140%);
      backdrop-filter:blur(8px) saturate(140%);
      transition:background .15s ease,border-color .15s ease,opacity .2s ease,color .15s ease,bottom .25s ease;
    }
    #touch-toggle:hover{background:rgba(250,244,228,0.82);border-color:rgba(120,100,70,0.5)}
    /* When the pad is showing, lift the pill above the pad (pad is
       136px tall + 24px bottom margin = ~170px from the bottom edge). */
    body.touch-on #touch-toggle{
      bottom:max(180px,calc(env(safe-area-inset-bottom,0px) + 180px));
    }
    /* Hide the toggle on phones AND tablets — the pad auto-shows at
       those sizes, so there's nothing to opt into.                    */
    @media (max-width:1200px){#touch-toggle{display:none}}
    /* Desktop: make the pill subtle — keyboard is the primary input. */
    @media (min-width:1201px){
      #touch-toggle{
        padding:4px 11px;
        font-size:10px;
        color:rgba(60,70,55,0.55);
        background:rgba(245,238,222,0.22);
        border-color:rgba(120,100,70,0.15);
        opacity:0.55;
      }
      #touch-toggle:hover{
        color:rgba(35,50,35,0.95);
        background:rgba(250,244,228,0.72);
        border-color:rgba(120,100,70,0.42);
        opacity:1;
      }
    }

    /* ─── Phone + tablet layout (≤1024px) ───────────────────────────────
       Minimap and HUD readout are stacked horizontally as a paired
       telemetry unit at top-left, with the HUD tucked immediately to
       the right of the minimap so the two feel like one card. Progress
       bar spans the top edge. Bottom-right is reserved for the touch
       pad. */
    @media (max-width:1200px){
      #overlay{padding:5vh 6vw}
      #overlay h1{font-size:clamp(38px,9vw,68px)}
      .subtitle{font-size:13px}
      .overlay-controls{font-size:12px}
      .drive-btn{padding:14px 32px;font-size:15px}

      /* Progress bar — near-full-width band at the top edge.           */
      #progress-bar{top:14px;left:16px;right:16px;width:auto;transform:none;height:5px}

      /* Minimap pushed below the progress bar with a comfortable gap.  */
      #minimap{bottom:auto;top:48px;left:12px;border-radius:12px;border:1px solid rgba(80,70,55,0.32);box-shadow:0 4px 18px -8px rgba(20,15,10,0.32)}
      #minimap canvas{width:100px;height:100px;display:block}
      #map-scale{display:none}

      /* HUD readout — sits IMMEDIATELY TO THE RIGHT of the minimap so
         the two chrome cards read as a single telemetry unit. The
         12px + 100px + 10px math places its left edge just past the
         minimap's right edge with a comfortable gap.                   */
      #hud-left{
        left:calc(12px + 100px + 10px);right:auto;bottom:auto;top:48px;
        min-width:96px;max-width:calc(100vw - (12px + 100px + 10px) - 12px);
        padding:8px 12px;
        font-size:11px;line-height:1.5;text-align:left;
        background:rgba(245,238,222,0.55);
        border:1px solid rgba(80,70,55,0.32);
        border-radius:12px;
        -webkit-backdrop-filter:blur(8px) saturate(140%);
        backdrop-filter:blur(8px) saturate(140%);
        box-shadow:0 4px 18px -8px rgba(20,15,10,0.32);
      }
      #hud-right{left:calc(12px + 100px + 10px);right:auto;top:auto;bottom:auto;font-size:11px;line-height:1.5}
      .hud-title{font-size:12px;margin-bottom:2px}

      /* Hide the standalone level indicator on phones + tablets — the
         dots in the HUD readout already communicate stability.         */
      #level-indicator{display:none}

      /* Finish screen — tighter padding for small phones.               */
      .fin-card{padding:18px 18px 22px;max-width:100%}
      #finish-screen h2{font-size:clamp(26px,7vw,36px);margin-bottom:8px}
      .stat-row{gap:24px}

      /* Tune panel — when ?act2tune=1 is enabled, scale it down.        */
      #act2-tune{width:230px;font-size:10px}

      /* Bump all .btn tap targets to comfortable thumb size on phones.  */
      .btn{padding:12px 22px;font-size:14px}
      .fin-card .btn{padding:14px 26px;font-size:14px}
    }

    /* Overlay hint: swap keyboard chips for a tap hint when the touch
       pad is enabled (either by the mobile media query or the toggle). */
    .overlay-controls .touch-hint{display:none}
    @media (max-width:768px){
      .overlay-controls .kbd-hint{display:none}
      .overlay-controls .touch-hint{display:inline}
    }
    body.touch-on .overlay-controls .kbd-hint{display:none}
    body.touch-on .overlay-controls .touch-hint{display:inline}
  </style>
</head>
<body>
  <canvas id="car-canvas"></canvas>
  <div id="split-line"></div>
  <div id="countdown"></div>

  <div id="overlay">
    <h1>Off the Road</h1>
    <p class="subtitle">start your adventure</p>
    <div class="overlay-controls">
      <span class="kbd-hint"><span>A</span> <span>D</span> steer &nbsp;&middot;&nbsp; <span>W</span> <span>S</span> speed</span>
      <span class="touch-hint">Tap arrow buttons to drive</span>
    </div>

    <div class="mode-row" style="display:none">
      <button class="btn mode-btn active" data-mode="solo">Solo</button>
      <button class="btn mode-btn" data-mode="together">Together</button>
    </div>

    <div id="together-panel" style="display:none">
      <div id="host-section">
        <p>Share this link with a friend:</p>
        <input id="session-link" readonly onclick="this.select()">
      </div>
      <div id="peer-status" class="waiting">Waiting for player 2&hellip;</div>
    </div>

    <div id="settings-panel" style="display:none">
      <button class="btn time-btn" data-time="dawn">Dawn</button>
      <button class="btn time-btn active" data-time="day">Day</button>
      <button class="btn time-btn" data-time="golden">Golden</button>
      <button class="btn time-btn" data-time="sunset">Sunset</button>
    </div>

    <button class="btn drive-btn" id="drive-btn">Drive</button>
  </div>

  <div id="hud-left">
    <div class="player-label" id="p1-label" style="display:none">Player 1</div>
    <div><span>Speed</span> <span class="hud-val" id="h-speed-0">0</span></div>
    <div id="stab-row" style="display:flex;align-items:center;gap:6px;margin-top:4px"><span>Condition</span><span class="hud-val" id="h-stab-0" style="letter-spacing:2px">●●●●●</span></div>
  </div>
  <div id="hud-right">
    <div class="player-label">Player 2</div>
    <div><span>Speed</span> <span class="hud-val" id="h-speed-1">0</span></div>
    <div><span>Terrain</span> <span class="hud-val" id="h-terrain-1">Road</span></div>
    <div><span>Stability</span> <span class="hud-val" id="h-stab-1">100%</span></div>
  </div>
  <div id="timer">00:00.0</div>
  <div id="offroad-flash"></div>
  <div id="map-scale">1 : 50,000</div>
  <button id="guitar-toggle" style="display:none" title="Toggle music">Mute</button>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="level-indicator"><canvas id="level-canvas" width="120" height="40"></canvas></div>
  <div id="minimap"><canvas id="minimap-canvas" width="240" height="240"></canvas></div>
  <div id="act2-tune" style="display:none"></div>

  <!-- Touch controls. Inverted-T D-pad (matches the keyboard arrow-key
       cluster shape), centered at the bottom edge. Each button maps to
       a keyboard arrow key via keys[], so the existing keyDown() input
       layer doesn't change. Auto-visible on mobile (≤768px); on larger
       viewports the #touch-toggle pill flips a body class to show. -->
  <div id="touch-controls" role="group" aria-label="Touch directional controls">
    <div class="tc-pad">
      <button class="tc-btn tc-up"    data-tc="arrowup"    aria-label="Forward"  type="button">↑</button>
      <button class="tc-btn tc-left"  data-tc="arrowleft"  aria-label="Left"     type="button">←</button>
      <button class="tc-btn tc-down"  data-tc="arrowdown"  aria-label="Slow"     type="button">↓</button>
      <button class="tc-btn tc-right" data-tc="arrowright" aria-label="Right"    type="button">→</button>
    </div>
  </div>
  <!-- Toggle pill — desktop / tablet / hybrid only (hidden on phones). -->
  <button id="touch-toggle" type="button" aria-label="Toggle touch controls">Show touch pad</button>


  <div id="finish-screen">
    <div class="fin-card">
      <h2 id="finish-title">River Reached!</h2>
      <div id="finish-stats"></div>
      <div id="kayak-tease" style="margin-top:22px;text-align:center">
        <button class="btn kayak-pulse" id="kayak-btn">Continue to Kayak</button>
      </div>
      <button class="btn fin-secondary" id="restart-btn" style="margin-top:10px">Drive Again</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <script type="module">
    // Direct URL import so we don't depend on <script type="importmap">.
    // Import maps require Safari 16.4+ (iPadOS 16.4+); older iPads on
    // iPadOS 15 or 16.0–16.3 silently fail on the bare 'three' specifier
    // and the game appears as a blank dark-green screen. Using the full
    // URL works on every browser that supports ES modules (iPadOS 12+).
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js';

    // ─── Themes ──────────────────────────────────────────
    const THEMES={
      dawn:{bg:'#e5e0d5',fillAlpha:.32,cAlpha:[.3,.55],cCol:[[140,135,130],[110,105,100]],glow:[210,160,130],
        roadEdge:'rgba(125,105,85,.42)',roadDash:'rgba(145,125,100,.28)',roadFill:'rgba(165,150,128,.16)',
        fm:'rgba(115,90,68,.42)',ff:'rgba(55,115,60,.3)',ft:'rgba(100,80,62,.36)',fe:'rgba(135,112,82,.28)',
        grid:.04,lb:[[155,180,205,.26],[118,158,195,.32],[88,138,178,.26]],ls:'rgba(72,118,155,.42)',
        tf:['rgba(42,92,42,.36)','rgba(58,105,52,.24)'],
        pal:[[225,215,200],[215,195,185],[205,185,175],[195,180,168],[180,190,160],[155,185,135],[125,168,105],[98,148,82],[72,128,65],[60,108,55],[85,115,95],[110,125,115],[140,135,128],[165,148,140],[190,172,165],[210,195,185],[222,210,198]],
        aL:.55,dL:.82,dC:0xffeedd,hud:'rgba(60,70,55,.75)',timer:'rgba(60,70,55,.65)',
        fogNear:28,fogFar:80,fogCol:0xe5e0d5,skyCol:0xd8d0c2,roadCol:[0.55,0.50,0.42]},
      day:{bg:'#eae6d8',fillAlpha:.32,cAlpha:[.35,.65],cCol:[[145,140,135],[115,110,105]],glow:[180,90,30],
        roadEdge:'rgba(120,100,75,.45)',roadDash:'rgba(140,120,90,.3)',roadFill:'rgba(160,145,115,.18)',
        fm:'rgba(110,80,50,.45)',ff:'rgba(50,105,40,.25)',ft:'rgba(90,70,50,.35)',fe:'rgba(130,100,65,.28)',
        grid:.05,lb:[[140,180,210,.28],[100,160,200,.35],[75,140,185,.28]],ls:'rgba(55,110,150,.45)',
        tf:['rgba(35,85,30,.38)','rgba(50,100,40,.25)'],
        pal:[[215,208,188],[200,195,172],[185,182,158],[170,185,148],[145,178,128],[118,165,100],[90,148,75],[68,128,58],[52,110,48],[45,92,42],[65,100,78],[88,108,95],[112,112,105],[135,128,118],[155,148,138],[175,168,155],[195,185,170]],
        aL:.7,dL:1,dC:0xfff8f0,hud:'rgba(50,70,50,.8)',timer:'rgba(50,70,50,.7)',
        fogNear:30,fogFar:85,fogCol:0xeae6d8,skyCol:0xc8d8e8,roadCol:[0.52,0.47,0.38]},
      golden:{bg:'#f0e0c0',fillAlpha:.36,cAlpha:[.32,.6],cCol:[[155,148,138],[125,118,108]],glow:[245,185,55],
        roadEdge:'rgba(162,112,52,.5)',roadDash:'rgba(182,138,62,.32)',roadFill:'rgba(198,172,108,.2)',
        fm:'rgba(158,98,38,.48)',ff:'rgba(88,128,42,.36)',ft:'rgba(148,102,42,.42)',fe:'rgba(172,128,58,.35)',
        grid:.045,lb:[[218,182,128,.26],[198,158,102,.3],[178,138,82,.26]],ls:'rgba(172,128,68,.42)',
        tf:['rgba(72,92,28,.42)','rgba(88,102,35,.3)'],
        pal:[[245,228,175],[238,215,152],[228,200,128],[215,192,108],[198,178,88],[175,160,65],[148,142,52],[128,125,42],[115,108,38],[105,98,48],[88,105,62],[72,108,72],[95,128,82],[135,148,95],[178,172,118],[215,198,148],[238,218,168]],
        aL:.62,dL:1.35,dC:0xffcc55,hud:'rgba(95,65,25,.8)',timer:'rgba(95,65,25,.7)',
        fogNear:25,fogFar:75,fogCol:0xf0e0c0,skyCol:0xf0d898,roadCol:[0.58,0.50,0.35]},
      sunset:{bg:'#ddc8d2',fillAlpha:.38,cAlpha:[.3,.58],cCol:[[148,140,142],[118,110,115]],glow:[205,98,135],
        roadEdge:'rgba(132,68,88,.48)',roadDash:'rgba(152,88,102,.32)',roadFill:'rgba(168,128,138,.2)',
        fm:'rgba(138,62,78,.48)',ff:'rgba(58,88,78,.36)',ft:'rgba(122,62,78,.42)',fe:'rgba(142,82,98,.32)',
        grid:.04,lb:[[172,128,168,.28],[148,102,148,.32],[122,82,132,.28]],ls:'rgba(122,72,118,.45)',
        tf:['rgba(38,68,58,.42)','rgba(52,78,68,.32)'],
        pal:[[225,198,205],[215,182,195],[202,168,182],[188,152,168],[172,138,152],[155,118,138],[138,98,122],[125,82,108],[108,65,92],[98,72,82],[82,92,88],[68,108,98],[88,125,105],[118,138,118],[152,148,135],[188,168,158],[215,192,185]],
        aL:.48,dL:.92,dC:0xee8888,hud:'rgba(85,45,55,.8)',timer:'rgba(85,45,55,.7)',
        fogNear:22,fogFar:70,fogCol:0xddc8d2,skyCol:0xd8a8b8,roadCol:[0.50,0.42,0.45]}
    };
    let T=THEMES.day;
    let selectedTheme='day';

    // Time-of-day transitions based on drive progress
    function lerpColor3(a,b,t){return[a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]}
    function lerpThemes(tA,tB,t){
      const pal=tA.pal.map((c,i)=>{const c2=tB.pal[Math.min(i,tB.pal.length-1)];return lerpColor3(c,c2,t).map(v=>Math.round(v))});
      const bg=tB.bg;
      const mix=(k)=>{const a=tA[k],b=tB[k];return typeof a==='number'?a+(b-a)*t:b};
      const mixCol=(k)=>{const a=tA[k],b=tB[k];if(Array.isArray(a))return a.map((v,i)=>v+(b[i]-v)*t);return b};
      return Object.assign({},tA,tB,{
        pal,
        fillAlpha:mix('fillAlpha'),aL:mix('aL'),dL:mix('dL'),grid:mix('grid'),
        fogNear:mix('fogNear'),fogFar:mix('fogFar'),
        fogCol:tA.fogCol,skyCol:tA.skyCol,
        roadCol:mixCol('roadCol'),
      });
    }
    function getTimeOfDayTheme(progress){
      if(progress<.15) return lerpThemes(THEMES.dawn,THEMES.day,progress/.15);
      if(progress<.4) return THEMES.day;
      if(progress<.65){const t=(progress-.4)/.25;return lerpThemes(THEMES.day,THEMES.golden,t);}
      if(progress<.85){const t=(progress-.65)/.2;return lerpThemes(THEMES.golden,THEMES.sunset,t);}
      return THEMES.sunset;
    }

    // ─── Config ──────────────────────────────────────────
    const COLS=90,ROWS=65,LEVELS=10;
    const ROAD_BASE=.5,ROAD_HALF_W=.10;
    const CATAPULT_TH=.95,CATAPULT_F=2.5,FINISH_DIST=3;
    const CAR_COLORS=[0x4a8a3a,0xb85c2e];
    const TILT_SCALE=.15;
    // Canonical contour-line distortion amplitude. Used by Act 1 updateContourLines
    // and reused by Act 2 so both acts warp at the same scale. Do not duplicate.
    const WARP_AMPLITUDE=.04;

    // Phase 1: 3D terrain constants
    const WORLD_SCALE=80;        // width of terrain in world units
    const HEIGHT_SCALE=4;        // low terrain — gentle hills not canyon walls
    const TERRAIN_SEGS=90;       // higher res for road detail
    const TERRAIN_AHEAD=0.7;     // fraction of terrain mesh ahead of car
    const SY_VISIBLE=1.2;        // how much scroll-space Y the terrain covers

    function getRoadX(s){return ROAD_BASE+Math.sin(s*.6)*.1+Math.sin(s*1.4+1.5)*.06+Math.sin(s*2.8+3)*.03}

    // ─── Seeded PRNG ────────────────────────────────────
    let _seed=Date.now()^(Math.random()*0xffffffff);
    function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
    let rng=mulberry32(_seed);
    function seedRng(s){_seed=s;rng=mulberry32(s)}
    function srand(){return rng()}

    // ─── Multiplayer state ──────────────────────────────
    let multiplayer=false,isHost=true,peer=null,conn=null,peerReady=false;
    let remoteCarState=null,remoteScroll=null;
    const urlParams=new URLSearchParams(location.search);
    const joinId=urlParams.get('join');
    const urlSeed=urlParams.get('seed');
    const ACT2_TUNE_MODE=urlParams.get('act2tune')==='1';
    // Dummy dbg object retained so sprinkled `dbg.foo=...` writes elsewhere
    // remain harmless no-ops now that the debug overlay has been removed.
    const dbg={segCount:0,hMin:0,hMax:0};
    if(urlSeed)seedRng(parseInt(urlSeed,36));
    let localIdx=0;

    // ─── DOM ─────────────────────────────────────────────
    const carCanvas=document.getElementById('car-canvas');
    const overlay=document.getElementById('overlay');
    const offroadFlash=document.getElementById('offroad-flash');
    const timerEl=document.getElementById('timer');
    const finishScreen=document.getElementById('finish-screen');
    const splitLine=document.getElementById('split-line');
    const countdownEl=document.getElementById('countdown');
    const driveBtn=document.getElementById('drive-btn');
    const togetherPanel=document.getElementById('together-panel');
    const peerStatus=document.getElementById('peer-status');
    const sessionLinkEl=document.getElementById('session-link');
    const act2TuneEl=document.getElementById('act2-tune');

    // Lightweight in-game tuning studio for Act 2 iteration.
    const ACT2_TUNE_DEFAULTS={
      twistAmp:1.79,
      twistFreq:1.50,
      widthScale:0.75,
      bankWarn:0.92,
      warpGain:0.56,
      rockWarp:1.55,
      turnRate:0.75,
      latThrust:1.68,
      waterDrag:0.91,
      // Heading persists between strokes (1.0 = no self-correction). Real
      // kayak physics: once you've yawed, you stay yawed until a counter
      // stroke straightens you. Tune down for arcade-style auto-centering.
      headingRecovery:1.0,
      // Forward paddling pushes the kayak in the direction it's facing —
      // this is the "ferry across a current" feel. Without this, sustained
      // heading is purely visual; with it, sustained heading actually
      // moves you sideways while you paddle forward.
      headingThrust:0.55,
      bankLean:1.6,
      turnPivot:0.8,
      // 0 = kayak rotates around the offset pivot — bow swings in the
      //     steering direction (matches the studio default, what you want).
      // 1 = bow tip is pinned in world; the STERN swings instead.
      // Keep at 0 unless you want the brace-pivot effect.
      bowPivotWeight:0,
      paddleSway:0.67,
      paddleLerp:16,
      paddleStroke:5.5,
      paddleMode:'hold-side',
      waterRoughness:1,
      // Spray defaults — disabled (foam patches on the hull read as paint
      // smudges from this camera angle). The sliders remain for re-enabling
      // during tuning; the actual Points objects are hard-hidden below.
      sprayGain:0,
      spraySizeMax:0.09,
      sprayOpacityMax:0.14,
      spraySpread:0.55,
      sprayForward:0,
      sprayUp:0,
      sprayAnimSpeed:6.5,
      paddleBladeSpray:0,
      sprayAudio:1,
      // Paddle-stroke ripples — concentric wave that distorts the depth
      // contour lines outward from each blade-entry point, decaying ~1s.
      rippleAmp:0.45,                    // radial push amplitude (world units)
      rippleSpeed:5.0,                   // wave expansion rate (world units/sec)
      rippleLife:1.0,                    // lifespan (seconds)
      rippleBandWidth:0.5,               // Gaussian band width around the wave
      rippleSpawnSide:1.6,               // lateral offset from kayak in world units
      rippleCooldown:0.45,               // min seconds between strokes
      // Canyon walls — replace the gentle bank elevation with steep cliffs
      // rising from the river edge. canyonHeight is in depth units (× 4 for
      // world units of cliff height). canyonSteepness controls how fast the
      // wall rises as you move past the bank — higher = steeper cliff face.
      canyonHeight:3.2,                  // ~12.8 world units max cliff height
      canyonSteepness:28,                // exponential rise rate (per nx unit)
      canyonNoise:0.6,                   // amplitude of bumps on cliff face
      canyonTreeRim:0.05,                // push trees out by this much in nx so they sit on the rim
      canyonHeightVar:0.45,              // macro-scale height variation along river (0=uniform, 1=full ±50%)
      canyonAsymmetry:1.0,               // 0=both sides match, 1=independent random per side
      canyonColorVar:0.55,               // strength of rock-color overlay (0=pure moss, 1=mostly rock)
      canyonRapidsBoost:0.6,             // walls grow this much taller in the rapids zone (0=off, 1=double height)
      waterNormalEvery:3,                // recompute mesh normals every N frames (1=every, 3=throttled, less wobble)
      // Rapids "feel" — surface chop, camera vibration, and ambient
      // amplification when entering the rapids hotspot. All scale with
      // the same rapidsBlend Gaussian getRiverHW + canyon walls use.
      rapidsChop:2.4,                    // water surface wobble multiplier in rapids (1=no extra, 3+=violent)
      rapidsFoamGain:1.0,                // strength of foam streaks near rocks (0=off, 1=default, 2=heavy)
      // Calm-water flow streaks — anisotropic noise that drifts downstream
      // over time, visualizing the current direction. Inversely scaled by
      // rapidsBlend so foam takes over in the rapids zone (clean handoff
      // between the two effects).
      flowStreaks:0.32,                  // streak overlay strength (0=off, 1=strong)
      flowSpeed:1.5,                     // how fast streaks drift downstream
      // Camera — how much the camera arcs behind the kayak's heading.
      // 0 = world-fixed (camera always at world +Z, ignores yaw).
      // 1 = full chase (camera always behind kayak's facing direction).
      cameraHeadingFollow:0.55,
      // Time-of-day arc — how much progress through the river shifts the
      // sky/fog/light from morning toward dusk. 0 = static morning,
      // 1 = full progression to peach-dusk by the finish.

    // ─── Noise ───────────────────────────────────────────
    const perm=new Uint8Array(512);
    function initPerm(){
      const p=new Uint8Array(256);for(let i=0;i<256;i++)p[i]=i;
      for(let i=255;i>0;i--){const j=Math.floor(srand()*(i+1));[p[i],p[j]]=[p[j],p[i]]}
      for(let i=0;i<512;i++)perm[i]=p[i&255];
    }
    initPerm();
    const fade=t=>t*t*t*(t*(t*6-15)+10),lerp=(a,b,t)=>a+t*(b-a);
    function grad(h,x,y){return((h&1)?-x:x)+((h&2)?-y:y)}
    function noise2d(x,y){
      const X=Math.floor(x)&255,Y=Math.floor(y)&255,xf=x-Math.floor(x),yf=y-Math.floor(y),u=fade(xf),v=fade(yf);
      return lerp(lerp(grad(perm[perm[X]+Y],xf,yf),grad(perm[perm[X+1]+Y],xf-1,yf),u),
                  lerp(grad(perm[perm[X]+Y+1],xf,yf-1),grad(perm[perm[X+1]+Y+1],xf-1,yf-1),u),v);
    }
    function fbm(x,y){let v=0,a=.5,f=1;for(let i=0;i<5;i++){v+=a*noise2d(x*f,y*f);a*=.5;f*=2}return v*.5+.5}
    // Fast 3-octave fbm for terrain mesh rendering (Phase 1 perf optimization)
    function fbm3(x,y){let v=0,a=.5,f=1;for(let i=0;i<3;i++){v+=a*noise2d(x*f,y*f);a*=.5;f*=2}return v*.5+.5}

    // ─── Biome zones along the route ─────────────────────
    function getBiome(sY){
      const prog=(.14-sY/5)/FINISH_DIST;
      if(prog<.2) return 'meadow';
      if(prog<.45) return 'cliff';
      if(prog<.7) return 'forest';
      return 'alpine';
    }

    // ─── Terrain height sampling (Phase 1) ───────────────
    // Single source of truth for terrain elevation. Used by both the terrain mesh
    // and car Y positioning. Extracts the height formula from the old buildField().
    function sampleTerrainHeight(nx,sY){
      let v=fbm(nx*4+10,sY*3+10);
      // Gentle edge ridges (reduced — road is the focus, not canyon walls)
      v+=(Math.exp(-((nx-.15)**2)/.01)*.12+Math.exp(-((nx-.85)**2)/.01)*.12)*(.5+.5*Math.sin(sY*4));
      v+=fbm(nx*8+30,sY*5+30)*.05;
      // Biome-specific terrain shaping (toned down — subtle background)
      const biome=getBiome(sY);
      if(biome==='cliff'){
        v+=Math.exp(-((nx-.82)**2)/.008)*.15;
        v+=Math.exp(-((nx-.9)**2)/.015)*.1;
        v-=Math.exp(-((nx-.95)**2)/.005)*.2;
        v+=fbm(nx*12+20,sY*8+20)*.06;
      }else if(biome==='forest'){
        v+=fbm(nx*6+40,sY*4+40)*.04;
      }else if(biome==='alpine'){
        v+=fbm(nx*10+60,sY*6+60)*.08;
        v+=Math.exp(-((nx-.2)**2)/.02)*.08;
      }
      // Road: gentle undulating surface with visible ups and downs
      const lrx=getRoadX(sY);
      const roadDist=Math.abs(nx-lrx);
      const roadBlend=Math.max(0,1-roadDist/(ROAD_HALF_W*2.0));
      if(roadBlend>0){
        const vRoad=fbm(lrx*4+10,sY*3+10);
        // Road undulation: visible ups and downs along the road
        const roadUndulation=Math.sin(sY*8)*.06+Math.sin(sY*15+2)*.04+Math.sin(sY*25)*.02;
        // Major incline section: steep uphill around 40-55% of route
        const inclineCenter=0.7-FINISH_DIST*.47*5;
        const inclineDist=(sY-inclineCenter);
        const inclineWidth=FINISH_DIST*.15*5;
        const incline=Math.abs(inclineDist)<inclineWidth?
          Math.sin((inclineDist/inclineWidth)*Math.PI)*.25:0;
        // Really steep mountain pass: sharp climb at 65-72% of route
        const steepCenter=0.7-FINISH_DIST*.68*5;
        const steepDist=(sY-steepCenter);
        const steepWidth=FINISH_DIST*.07*5; // narrow section
        let steepIncline=0;
        if(Math.abs(steepDist)<steepWidth){
          // Asymmetric: steep uphill then plateau then sharp descent
          const t2=steepDist/steepWidth; // -1 to 1
          if(t2<0) steepIncline=Math.sin((-t2)*Math.PI*.5)*.55; // steep climb
          else steepIncline=Math.cos(t2*Math.PI*.5)*.55; // plateau then drop
        }
        v=lerp(v,vRoad+roadUndulation+incline+steepIncline,roadBlend*roadBlend*.93)-roadBlend*roadBlend*.06;
      }
      // River depressions
      for(const rv of RIVERS){
        const rDist=Math.abs(sY-(rv.wy*5));
        if(rDist<.15)v-=Math.exp(-(rDist*rDist)/.003)*(rv.style==='wide'?.3:.2);
      }
      // Rocky pass — extra terrain noise
      const pDist=Math.abs(sY-(PASS_WY*5));
      if(pDist<.1)v+=Math.sin(nx*40+sY*30)*.08*Math.exp(-(pDist*pDist)/.002);
      // Road hazard deformations — visible bumps, potholes, puddles
      for(const h of ROAD_HAZARDS){
        const dx=(nx-h.nx)*WORLD_SCALE,dz=(sY-h.sY)*WORLD_SCALE;
        const rW=h.rad*WORLD_SCALE,d2=dx*dx+dz*dz;
        if(d2>=rW*rW)continue;
        const t=1-Math.sqrt(d2)/rW;
        if(h.type==='pothole')v-=t*t*(h.depth||.15);
        else if(h.type==='bump')v+=t*t*(h.height||.12);
        else if(h.type==='puddle')v-=t*t*.08;
      }
      return v;
    }

    // Fast terrain height for mesh vertices (uses fbm3 for speed)
    function sampleTerrainHeightFast(nx,sY){
      let v=fbm3(nx*4+10,sY*3+10);
      v+=(Math.exp(-((nx-.15)**2)/.01)*.12+Math.exp(-((nx-.85)**2)/.01)*.12)*(.5+.5*Math.sin(sY*4));
      const biome=getBiome(sY);
      if(biome==='cliff'){
        v+=Math.exp(-((nx-.82)**2)/.008)*.15;
        v-=Math.exp(-((nx-.95)**2)/.005)*.2;
      }else if(biome==='alpine'){
        v+=Math.exp(-((nx-.2)**2)/.02)*.08;
      }
      const lrx=getRoadX(sY);
      const roadDist=Math.abs(nx-lrx);
      const roadBlend=Math.max(0,1-roadDist/(ROAD_HALF_W*2.0));
      if(roadBlend>0){
        const vRoad=fbm3(lrx*4+10,sY*3+10);
        const roadUndulation=Math.sin(sY*8)*.06+Math.sin(sY*15+2)*.04+Math.sin(sY*25)*.02;
        const inclineCenter2=0.7-FINISH_DIST*.47*5;
        const inclineDist2=(sY-inclineCenter2);
        const inclineWidth2=FINISH_DIST*.15*5;
        const incline2=Math.abs(inclineDist2)<inclineWidth2?Math.sin((inclineDist2/inclineWidth2)*Math.PI)*.25:0;
        const steepCenter2=0.7-FINISH_DIST*.68*5;
        const steepDist2=(sY-steepCenter2);
        const steepWidth2=FINISH_DIST*.07*5;
        let steepIncline2=0;
        if(Math.abs(steepDist2)<steepWidth2){
          const t3=steepDist2/steepWidth2;
          if(t3<0)steepIncline2=Math.sin((-t3)*Math.PI*.5)*.55;
          else steepIncline2=Math.cos(t3*Math.PI*.5)*.55;
        }
        v=lerp(v,vRoad+roadUndulation+incline2+steepIncline2,roadBlend*roadBlend*.93)-roadBlend*roadBlend*.06;
      }
      // Road hazard deformations (visible in mesh)
      if(roadBlend>0){
        for(const h of ROAD_HAZARDS){
          const dx=(nx-h.nx)*WORLD_SCALE,dz=(sY-h.sY)*WORLD_SCALE;
          const rW=h.rad*WORLD_SCALE,d2=dx*dx+dz*dz;
          if(d2>=rW*rW)continue;
          const t=1-Math.sqrt(d2)/rW;
          if(h.type==='pothole')v-=t*t*(h.depth||.15);
          else if(h.type==='bump')v+=t*t*(h.height||.12);
          else if(h.type==='puddle')v-=t*t*.08;
        }
      }
      return v;
    }

    // Smoothstep helper for road blending
    function smoothstep(edge0,edge1,x){
      const t=Math.max(0,Math.min(1,(x-edge0)/(edge1-edge0)));
      return t*t*(3-2*t);
    }

    // ─── Features (map labels — kept for potential 3D labels later) ────
    let features=[];
    function initFeatures(){
      features=[];
      for(let i=0;i<100;i++){const fx=srand(),fy=srand()*10;if(Math.abs(fx-getRoadX(fy*2))<ROAD_HALF_W+.06)continue;const t=srand();
        if(t<.3)features.push({x:fx,y:fy,t:'m',n:`${(srand()*2000+800).toFixed(0)}m`,s:3+srand()*3});
        else if(t<.7)features.push({x:fx,y:fy,t:'f',c:3+(srand()*4|0),s:2.5+srand()*1.5});
        else if(t<.85)features.push({x:fx,y:fy,t:'t',n:['Ridgeview','Pine Hollow','Cedar Falls','Stonebrook','Elk Meadow','Fern Valley','Hawk Ridge'][srand()*7|0]});
        else features.push({x:fx,y:fy,t:'e',v:`${(srand()*1500+200).toFixed(0)}`})}
    }
    initFeatures();

    // ─── Lake ───────────────────────────────────────────
    const LWY=.14-FINISH_DIST-.02,LSY=LWY*5,LCX=getRoadX(LSY)+.18,LR=200,LP=64;

    // ─── Rivers ────────────────────────────────────────
    const RIVERS=[
      {dist:FINISH_DIST*.25, name:'Willow Creek', width:.02, style:'narrow', bridgeType:'log'},
      {dist:FINISH_DIST*.5, name:'Pine River', width:.028, style:'wide', bridgeType:'plank'},
      {dist:FINISH_DIST*.72, name:'Eagle Fork', width:.022, style:'rocky', bridgeType:'stone'}
    ];
    RIVERS.forEach(r=>{r.wy=.14-r.dist});
    const BRIDGE_HW=ROAD_HALF_W*1.3;

    const PASS_DIST=FINISH_DIST*.4;
    const PASS_WY=.14-PASS_DIST;
    const LOOKOUT_DIST=FINISH_DIST*.85;
    const LOOKOUT_WY=.14-LOOKOUT_DIST;

    // ─── Road hazards (deterministic positions) ────────
    const ROAD_HAZARDS=(()=>{
      const haz=[];const hr=mulberry32(0xBAD40AD);
      // Dense potholes — frequent, punishing
      for(let sp=0.05;sp<FINISH_DIST;sp+=0.04+hr()*.035){
        const sY=0.7-sp*5;const rcx=getRoadX(sY);
        const off=(hr()-.5)*ROAD_HALF_W*1.8;
        const rad=(1.6+hr()*1.5)/WORLD_SCALE;
        const depth=0.18+hr()*0.2;
        haz.push({type:'pothole',sp,sY,nx:rcx+off,rad,depth});
      }
      // Many raised bumps — very frequent, intense jolts
      for(let sp=0.06;sp<FINISH_DIST;sp+=0.04+hr()*.04){
        const sY=0.7-sp*5;const rcx=getRoadX(sY);
        const off=(hr()-.5)*ROAD_HALF_W*1.6;
        const rad=(1.0+hr()*1.2)/WORLD_SCALE;
        const height=0.15+hr()*0.2; // taller bumps
        haz.push({type:'bump',sp,sY,nx:rcx+off,rad,height});
      }
      // Puddles
      for(let sp=0.15;sp<FINISH_DIST;sp+=0.12+hr()*.1){
        const sY=0.7-sp*5;const rcx=getRoadX(sY);
        const off=(hr()-.5)*ROAD_HALF_W*1.2;
        const rad=(1.8+hr()*1.5)/WORLD_SCALE;
        haz.push({type:'puddle',sp,sY,nx:rcx+off,rad});
      }
      // Mud patches
      for(let sp=0.15;sp<FINISH_DIST;sp+=0.18+hr()*.08){
        const sY=0.7-sp*5;const rcx=getRoadX(sY);
        const off=(hr()-.5)*ROAD_HALF_W*1.0;
        haz.push({type:'mud',sp,sY,nx:rcx+off,hw:1.5/WORLD_SCALE,hl:0.9/WORLD_SCALE});
      }
      return haz;
    })();

    function isOnAnyBridge(nx,sharedScroll,carNY){
      const carWorldY=carNY/5-sharedScroll;
      for(const r of RIVERS){
        const rsy=r.wy*5;
        const rcx=getRoadX(rsy);
        if(Math.abs(carWorldY-r.wy)<r.width*2&&Math.abs(nx-rcx)<BRIDGE_HW*1.2)return true;
      }
      return false;
    }

    // ─── 3D Setup (Phase 1) ─────────────────────────────
    const renderer=new THREE.WebGLRenderer({canvas:carCanvas,antialias:true,alpha:true});
    renderer.setSize(W,H);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setClearColor(new THREE.Color(T.bg));
    renderer.shadowMap.enabled=false;

    const scene3d=new THREE.Scene();
    scene3d.fog=new THREE.Fog(new THREE.Color(T.bg),T.fogNear||50,T.fogFar||120);

    // Phase 1: PerspectiveCamera (third-person behind car)
    const cam3d=new THREE.PerspectiveCamera(65,W/H,0.5,300);
    cam3d.position.set(0,12,18);cam3d.lookAt(0,0,-10);

    const ambLight=new THREE.AmbientLight(0xffffff,T.aL);scene3d.add(ambLight);
    const dLight=new THREE.DirectionalLight(T.dC,T.dL);dLight.position.set(5,15,8);scene3d.add(dLight);
    // Hemisphere light for natural outdoor feel
    const hemiLight=new THREE.HemisphereLight(0x99bbdd,0x556633,.6);scene3d.add(hemiLight);

    // ─── Terrain Mesh (Phase 1) ─────────────────────────
    const terrainGeo=new THREE.PlaneGeometry(WORLD_SCALE,WORLD_SCALE*SY_VISIBLE,TERRAIN_SEGS,TERRAIN_SEGS);
    terrainGeo.rotateX(-Math.PI/2); // lay flat, Y-up
    // Add vertex colors
    const terrainColors=new Float32Array((TERRAIN_SEGS+1)*(TERRAIN_SEGS+1)*3);
    terrainGeo.setAttribute('color',new THREE.BufferAttribute(terrainColors,3));
    const terrainMat=new THREE.MeshStandardMaterial({
      vertexColors:true,roughness:.82,metalness:.05,flatShading:true
    });
    const terrainMesh=new THREE.Mesh(terrainGeo,terrainMat);
    scene3d.add(terrainMesh);

    // Phase 1: update terrain mesh vertices and colors
    // Throttle: only recompute when scroll has changed enough
    let _lastTerrainScroll=-999;
    let _lastContourTime=0;
    function updateTerrainMesh(scrollOff){
      if(Math.abs(scrollOff-_lastTerrainScroll)<0.008)return;
      _lastTerrainScroll=scrollOff;
      const pos=terrainGeo.attributes.position;
      const col=terrainGeo.attributes.color;
      const carSY=0.7-scrollOff*5;
      // sYMin = ahead of car (lower sY = further forward on route)
      const sYMin=carSY-SY_VISIBLE*TERRAIN_AHEAD;       // ahead → negative Z
      const sYMax=carSY+SY_VISIBLE*(1-TERRAIN_AHEAD);   // behind → positive Z
      const P=T.pal;

      for(let j=0;j<=TERRAIN_SEGS;j++){
        for(let i=0;i<=TERRAIN_SEGS;i++){
          const vIdx=j*(TERRAIN_SEGS+1)+i;
          const nx=i/TERRAIN_SEGS;
          // j=0 → sYMin (farthest ahead, neg Z); j=SEGS → sYMax (behind, pos Z)
          const sY=sYMin+(j/TERRAIN_SEGS)*(sYMax-sYMin);

          // World position: ahead=negative Z (camera looks toward -Z)
          const wx=(nx-0.5)*WORLD_SCALE;
          const wz=(sY-carSY)*WORLD_SCALE; // ahead(sY<carSY)→neg, behind→pos

          const v=sampleTerrainHeightFast(nx,sY);
          hCache[vIdx]=v; // cache for contour lines
          const wy=v*HEIGHT_SCALE;

          pos.setXYZ(vIdx,wx,wy,wz);

          // ── Vertex color: elevation-based palette + biome tinting ──
          const t=Math.max(0,Math.min(1,(v-.12)/.72));
          const idx=t*(P.length-1),lo=idx|0,hi=Math.min(P.length-1,lo+1),f=idx-lo;
          let r=lerp(P[lo][0],P[hi][0],f)/255;
          let g=lerp(P[lo][1],P[hi][1],f)/255;
          let b=lerp(P[lo][2],P[hi][2],f)/255;

          const biome=getBiome(sY);
          if(biome==='cliff'){
            r=r*.85+30/255;g=g*.88+18/255;b=b*.82+38/255;
          }else if(biome==='forest'){
            // Rich dark green forest floor — strong contrast with brown road
            r=r*.7;g=Math.min(1,g*1.15+15/255);b=b*.65;
          }else if(biome==='alpine'){
            const gray=(r+g+b)/3;
            r=lerp(r,gray+15/255,.35);g=lerp(g,gray+5/255,.3);b=lerp(b,gray+8/255,.3);
          }

          const roadCX=getRoadX(sY);
          const roadDist=Math.abs(nx-roadCX);
          if(roadDist<ROAD_HALF_W*1.5){
            // Sharp-edged dirt road — crisp boundary with forest
            const roadT=1-smoothstep(ROAD_HALF_W*.9,ROAD_HALF_W*1.5,roadDist);
            r=lerp(r,.60,roadT*.98);g=lerp(g,.47,roadT*.98);b=lerp(b,.28,roadT*.98);
            if(roadDist<ROAD_HALF_W){
              // Tire ruts
              const cx=nx-roadCX;
              const rutInset=1.5/WORLD_SCALE;
              const rutOff=ROAD_HALF_W-rutInset;
              const rutHW=0.4/WORLD_SCALE;
              const ld=Math.abs(cx-rutOff),rd=Math.abs(cx+rutOff);
              const rutDist=Math.min(ld,rd);
              const rutT=Math.max(0,1-rutDist/rutHW)*roadT;
              r=lerp(r,.420,rutT*.8);g=lerp(g,.325,rutT*.8);b=lerp(b,.208,rutT*.8);
              // Hazard coloring — make each type visually distinct
              for(const h of ROAD_HAZARDS){
                const dx=(nx-h.nx)*WORLD_SCALE,dz=(sY-h.sY)*WORLD_SCALE;
                const rW=(h.rad||0)*WORLD_SCALE,d2=dx*dx+dz*dz;
                if(!rW||d2>=rW*rW)continue;
                const pt=1-Math.sqrt(d2)/rW;
                if(h.type==='pothole'){
                  // Concentric depth rings — darker toward center, ring pattern
                  const ringFreq=pt*5; // multiple rings within the pothole
                  const ringPattern=Math.sin(ringFreq*Math.PI*2)*.15+.85; // subtle ring shading
                  const depthShade=pt*pt; // darker in center (quadratic falloff)
                  const shadowSide=Math.max(0,(dx/rW+.3)*.4); // directional shadow
                  r=lerp(r,.18-depthShade*.08-shadowSide*.06,pt*.9*ringPattern);
                  g=lerp(g,.13-depthShade*.05-shadowSide*.04,pt*.9*ringPattern);
                  b=lerp(b,.06-depthShade*.02,pt*.9*ringPattern);
                  // Rim highlight (lip of pothole)
                  if(pt>.02&&pt<.15){
                    r=lerp(r,.55,(.15-pt)/.13*.3);g=lerp(g,.48,(.15-pt)/.13*.3);b=lerp(b,.38,(.15-pt)/.13*.3);
                  }
                }else if(h.type==='bump'){
                  // Raised earth with highlight on top
                  const highlightT=Math.max(0,1-Math.abs(pt-.7)/.3);
                  r=lerp(r,.60+highlightT*.1,pt*.7);g=lerp(g,.52+highlightT*.08,pt*.7);b=lerp(b,.40+highlightT*.05,pt*.7);
                }else if(h.type==='puddle'){
                  // Wet puddle — dark blue-brown with slight specular
                  const spec=Math.pow(Math.max(0,1-Math.abs(pt-.5)/.3),3)*.15;
                  r=lerp(r,.20+spec,pt*.85);g=lerp(g,.26+spec*1.2,pt*.85);b=lerp(b,.34+spec*1.5,pt*.85);
                }
              }
            }
          }

          col.setXYZ(vIdx,r,g,b);
        }
      }
      pos.needsUpdate=true;
      col.needsUpdate=true;
      terrainGeo.computeVertexNormals();
      terrainMesh.position.set(0,0,0);
    }

    // ─── Contour / Topology Lines ────────────────────────
    // Run marching squares on hCache to produce 3D contour LineSegments.
    // warpAmt: off-road warp (distorts lines). t: time (animates water lines).
    function updateContourLines(scrollOff,warpAmt,t){
      const carSY=0.7-scrollOff*5;
      const sYMin=carSY-SY_VISIBLE*TERRAIN_AHEAD;
      const sYMax=carSY+SY_VISIBLE*(1-TERRAIN_AHEAD);
      const S=TERRAIN_SEGS;
      let segIdx=0;

      // Convert a grid-space edge crossing (xg,yg) at known iso-level height
      // to 3D world coords, applying off-road warp + river ripple.
      // Note: for marching-squares edge crossings the height AT the crossing
      // always equals the iso-level by construction — no extra interpolation
      // needed.
      function edgeToWorld(xg,yg,ht,outXYZ){
        const nx=xg/S;
        const sY=sYMin+(yg/S)*(sYMax-sYMin);
        const distort=warpAmt>0.02?noise2d(nx*12+t*.3,sY*8+t*.2)*.5-.25:0;
        const nx2=Math.max(0,Math.min(1,nx+distort*warpAmt*WARP_AMPLITUDE));
        let ripple=0;
        for(const rv of RIVERS){
          const rd=Math.abs(sY-(rv.wy*5));
          if(rd<.12)ripple+=Math.sin(nx2*10+t*2.5)*.25*Math.exp(-rd*rd/.004);
        }
        outXYZ[0]=(nx2-0.5)*WORLD_SCALE;
        outXYZ[1]=ht*HEIGHT_SCALE+0.12+ripple;
        outXYZ[2]=(sY-carSY)*WORLD_SCALE;
      }

      // Road-mask filter passed to marchingSquares — skip off-road cells
      // entirely so the forest stays contour-free. Also brakes the loop once
      // the segment budget is nearly exhausted.
      function roadMask(c,r){
        if(segIdx>=MAX_CSEGS-4)return false;
        const segNX=(c+0.5)/S;
        const segSY=sYMin+((r+0.5)/S)*(sYMax-sYMin);
        return Math.abs(segNX-getRoadX(segSY))<=ROAD_HALF_W*3;
      }

      const p0=[0,0,0],p1=[0,0,0];
      for(const level of CONTOUR_LEVELS){
        if(segIdx>=MAX_CSEGS-4)break;
        marchingSquares(hCache,S,S,level,(x0,y0,x1,y1,c,r)=>{
          if(segIdx>=MAX_CSEGS-2)return;
          const segNX=(c+0.5)/S;
          const segSY=sYMin+((r+0.5)/S)*(sYMax-sYMin);
          const roadDist=Math.abs(segNX-getRoadX(segSY));
          const edgeFade=Math.max(0,1-roadDist/(ROAD_HALF_W*3));
          const cr=.28*edgeFade,cg=.16*edgeFade,cb=.10*edgeFade;
          edgeToWorld(x0,y0,level,p0);
          edgeToWorld(x1,y1,level,p1);
          const base=segIdx*6;
          cPos[base]=p0[0];cPos[base+1]=p0[1];cPos[base+2]=p0[2];
          cPos[base+3]=p1[0];cPos[base+4]=p1[1];cPos[base+5]=p1[2];
          cCol[base]=cr;cCol[base+1]=cg;cCol[base+2]=cb;
          cCol[base+3]=cr;cCol[base+4]=cg;cCol[base+5]=cb;
          segIdx++;
        },roadMask);
      }

      contourGeo.setDrawRange(0,segIdx*2);
      contourGeo.attributes.position.needsUpdate=true;
      contourGeo.attributes.color.needsUpdate=true;
      dbg.segCount=segIdx;
    }

    // ─── Topology / Contour Lines (3D marching squares) ────
    // Marching squares edge table: bits = TL<<3|TR<<2|BR<<1|BL<<0
    // Edges: 0=top(TL-TR), 1=right(TR-BR), 2=bottom(BL-BR), 3=left(TL-BL)
    const MS_TABLE=[
      [],[[2,3]],[[1,2]],[[1,3]],
      [[0,1]],[[0,3],[1,2]],[[0,2]],[[0,3]],
      [[0,3]],[[0,2]],[[0,1],[2,3]],[[0,1]],
      [[1,3]],[[1,2]],[[2,3]],[]
    ];

    // ─── Marching squares helper ────────────────────────
    // Iterate every non-empty cell at one iso-level, emitting edge segments.
    // field: flat (cols+1)*(rows+1) scalar array (row-major).
    // visit(x0,y0,x1,y1,c,r): segment endpoints in fractional grid space
    //   [0..cols] × [0..rows]; (c,r) is the cell index. Caller maps to pixels,
    //   world coords, etc.
    // filter(c,r): optional early-skip — return false to skip a cell entirely
    //   (avoids the table lookup for masked regions like off-road forest).
    function marchingSquares(field,cols,rows,iso,visit,filter){
      const stride=cols+1;
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          if(filter&&!filter(c,r))continue;
          const i=r*stride+c;
          const v00=field[i],v10=field[i+1];
          const v01=field[i+stride],v11=field[i+stride+1];
          const bits=(v00>=iso?8:0)|(v10>=iso?4:0)|(v11>=iso?2:0)|(v01>=iso?1:0);
          if(bits===0||bits===15)continue;
          const segs=MS_TABLE[bits];
          if(!segs||segs.length===0)continue;
          // Edge-crossing fractions (guard against flat cells with 0.5 fallback)
          const dhT=v10-v00,dhR=v11-v10,dhB=v11-v01,dhL=v01-v00;
          const tT=Math.abs(dhT)<1e-6?.5:(iso-v00)/dhT;
          const tR=Math.abs(dhR)<1e-6?.5:(iso-v10)/dhR;
          const tB=Math.abs(dhB)<1e-6?.5:(iso-v01)/dhB;
          const tL=Math.abs(dhL)<1e-6?.5:(iso-v00)/dhL;
          // Grid-space endpoints per edge (0=top, 1=right, 2=bottom, 3=left)
          const ex=[c+tT, c+1, c+tB, c];
          const ey=[r,    r+tR, r+1,  r+tL];
          for(const[e0,e1]of segs){
            visit(ex[e0],ey[e0],ex[e1],ey[e1],c,r);
          }
        }
      }
    }

    // ─── Radial warp helper (the "Puget-Sound bubble") ──
    // Displaces (x,y) radially around (cx,cy) with a smoothstep falloff.
    // amp > 0  → push outward (contour lines bow around the agent).
    // amp < 0  → pull inward, clamped at center (band samples collapse onto
    //            the agent so the disc reads as a uniform avatar cell).
    // Writes into `out` (a 2-element array) to avoid per-call allocation on
    // hot paths like the minimap band fill (~8k calls/frame). If omitted,
    // writes into the shared scratch — callers must read before calling again.
    const _warpScratch=[0,0];
    function applyRadialWarp(x,y,cx,cy,warpR,amp,out){
      out=out||_warpScratch;
      const dx=x-cx,dy=y-cy;
      const d2=dx*dx+dy*dy;
      if(d2>=warpR*warpR){out[0]=x;out[1]=y;return out;}
      const d=Math.sqrt(d2)+1e-4;
      const fall=1-d/warpR;
      const ease=fall*fall*(3-2*fall);
      let push=ease*amp;
      if(amp<0)push=Math.max(push,-d); // inward pull never overshoots center
      out[0]=x+(dx/d)*push;
      out[1]=y+(dy/d)*push;
      return out;
    }

    // Very fine contour levels — show every bump and dip on the road.
    // Hardcoded by design: lines must be temporally stable as the car drives.
    // Adaptive [hMin,hMax] levels (used by the minimap and Act 2) would slide
    // around frame-to-frame as the visible window shifts and break that stability.
    const CONTOUR_LEVELS=[];
    for(let v=.18;v<=.85;v+=.025)CONTOUR_LEVELS.push(v);
    const MAX_CSEGS=24000;
    const cPos=new Float32Array(MAX_CSEGS*6); // 2 pts × xyz per seg
    const cCol=new Float32Array(MAX_CSEGS*6);
    const contourGeo=new THREE.BufferGeometry();
    contourGeo.setAttribute('position',new THREE.BufferAttribute(cPos,3));
    contourGeo.setAttribute('color',new THREE.BufferAttribute(cCol,3));
    contourGeo.setDrawRange(0,0);
    const contourLineMat=new THREE.LineBasicMaterial({vertexColors:true,linewidth:2,fog:false});
    const contourLines3d=new THREE.LineSegments(contourGeo,contourLineMat);
    contourLines3d.frustumCulled=false; // bounding sphere starts degenerate; always render
    contourLines3d.renderOrder=1;       // draw after terrain (renderOrder 0) so depth test works
    scene3d.add(contourLines3d);

    // Height cache for contour computation (reused from terrain mesh)
    const hCache=new Float32Array((TERRAIN_SEGS+1)*(TERRAIN_SEGS+1));

    // ─── Sun (arcs east→zenith→west with drive progress) ────────────
    const sunGeo=new THREE.SphereGeometry(2.5,16,12);
    const sunMat=new THREE.MeshBasicMaterial({color:0xffffc0,fog:false});
    const sunMesh=new THREE.Mesh(sunGeo,sunMat);
    scene3d.add(sunMesh);
    // Soft glow halo around sun
    const glowGeo=new THREE.SphereGeometry(5,16,12);
    const glowMat=new THREE.MeshBasicMaterial({color:0xffeeaa,fog:false,transparent:true,opacity:.18});
    const glowMesh=new THREE.Mesh(glowGeo,glowMat);
    sunMesh.add(glowMesh); // child of sun, same position

    // ─── Lake mesh (simple 3D circle at lake position) ──
    const lakeGeo=new THREE.CircleGeometry(10,48);
    lakeGeo.rotateX(-Math.PI/2);
    const lakeMat=new THREE.MeshStandardMaterial({
      color:0x3a7a9a,transparent:true,opacity:.75,roughness:.05,metalness:.4,fog:false
    });
    const lakeMesh=new THREE.Mesh(lakeGeo,lakeMat);
    lakeMesh.visible=false;
    scene3d.add(lakeMesh);

    // End scene: trailhead dead end — trees block road, sign points to river/kayak launch
    const mountainGroup=new THREE.Group();
    mountainGroup.visible=false;
    scene3d.add(mountainGroup);
    // All materials transparent for fade-in
    const endTreeMat=new THREE.MeshStandardMaterial({color:0x2a4a28,roughness:.8,flatShading:true,transparent:true,opacity:0,fog:false});
    const endTreeMat2=new THREE.MeshStandardMaterial({color:0x1e3a1e,roughness:.85,flatShading:true,transparent:true,opacity:0,fog:false});
    const endTreeMat3=new THREE.MeshStandardMaterial({color:0x3a5a30,roughness:.75,flatShading:true,transparent:true,opacity:0,fog:false});
    const endTrunkMat=new THREE.MeshStandardMaterial({color:0x5a3a20,roughness:.9,transparent:true,opacity:0,fog:false});
    const endTrunkMat2=new THREE.MeshStandardMaterial({color:0x6b4828,roughness:.88,transparent:true,opacity:0,fog:false});
    const parkingMat=new THREE.MeshStandardMaterial({color:0x605850,roughness:.95,transparent:true,opacity:0,fog:false});
    const trailMat=new THREE.MeshStandardMaterial({color:0x6a5a42,roughness:.9,transparent:true,opacity:0,fog:false});
    const riverMat=new THREE.MeshStandardMaterial({color:0x3a7a9a,roughness:.05,metalness:.3,transparent:true,opacity:0,fog:false});
    const signPostMat=new THREE.MeshStandardMaterial({color:0x5a4530,roughness:.85,transparent:true,opacity:0,fog:false});
    const signBoardMat=new THREE.MeshStandardMaterial({color:0x4a3a22,roughness:.8,transparent:true,opacity:0,fog:false});
    const allEndMats=[endTreeMat,endTreeMat2,endTreeMat3,endTrunkMat,endTrunkMat2,parkingMat,trailMat,riverMat,signPostMat,signBoardMat];

    // Gravel pullout — where the car parks
    const parkingGeo=new THREE.BoxGeometry(14,0.8,12);
    const parkingMesh=new THREE.Mesh(parkingGeo,parkingMat);
    parkingMesh.position.set(0,-.1,7);mountainGroup.add(parkingMesh);

    // Dense tree wall blocking road ahead — this IS the dead end
    const endTreeRng=mulberry32(0xABCD1234);
    // River bounds for tree exclusion (river at x=10,z=4 size 5x14 → x:7.5-12.5, z:-3 to 11)
    function inRiver(tx,tz){return tx>6.5&&tx<13.5&&tz>-4&&tz<12;}
    function addEndTree(tx,tz,ts,mat,tMat,isRound){
      if(inRiver(tx,tz))return; // skip trees in the river
      const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.1*ts,.18*ts,2.5*ts,5),tMat);
      trunk.position.set(tx,ts*1.25,tz);mountainGroup.add(trunk);
      let cGeo;
      if(isRound){
        cGeo=new THREE.SphereGeometry(2*ts,6,5);
      }else{
        cGeo=new THREE.ConeGeometry(1.4*ts,7*ts,6);
      }
      const canopy=new THREE.Mesh(cGeo,mat);
      canopy.position.set(tx,isRound?3.2*ts:5*ts,tz);mountainGroup.add(canopy);
    }
    // Front tree wall across the road (z=0 to -3) — what you drive into
    for(let i=0;i<22;i++){
      const tx=-14+i*1.3+endTreeRng()*.5;
      const tz=0-endTreeRng()*3;
      const ts=.7+endTreeRng()*.6;
      const mat=[endTreeMat,endTreeMat2,endTreeMat3][Math.floor(endTreeRng()*3)];

    // Fade-in state
    let endSceneFade=0;

    // ─── Forest Trees (PNW mix: tall evergreens + varied deciduous) ─────────
    const TREE_COUNT=2000; // 1000 per side — very dense forest walls
    const TREE_TRUNK_H=2.8;
