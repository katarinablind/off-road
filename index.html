    const canopyGeo=new THREE.ConeGeometry(1.6,12,6);
    const canopyMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.8,flatShading:true});
    // Laubbäume — round deciduous canopy (Big Leaf Maple / Alder)
    const canopyGeo2=new THREE.SphereGeometry(2.6,7,5);
    const canopyMat2=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.7,flatShading:true});
    // Third type: very tall narrow spire (Western Red Cedar)
    const canopyGeo3=new THREE.ConeGeometry(1.1,14,5);
    const canopyMat3=new THREE.MeshStandardMaterial({color:0xffffff,roughness:.85,flatShading:true});
    // Varied trunk browns
    const trunkColors=[new THREE.Color(0x5a3a20),new THREE.Color(0x6b4828),new THREE.Color(0x7a5535),new THREE.Color(0x4e3018),new THREE.Color(0x684530)];
    // Varied greens for canopy variety
    const canopyColors1=[new THREE.Color(0x2d4a2d),new THREE.Color(0x345a30),new THREE.Color(0x264428),new THREE.Color(0x2a5232)];
    const canopyColors2=[new THREE.Color(0x4a6a38),new THREE.Color(0x5a7a3a),new THREE.Color(0x3e6830),new THREE.Color(0x4e7240)];
    const canopyColors3=[new THREE.Color(0x1e3a1e),new THREE.Color(0x244224),new THREE.Color(0x1a321a),new THREE.Color(0x203820)];
    const treeInstTrunk=new THREE.InstancedMesh(trunkGeo,trunkMat,TREE_COUNT);
    treeInstTrunk.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(TREE_COUNT*3),3);
    // Split trees into 3 types: 60% tall evergreen, 20% broad deciduous, 20% narrow spire
    const TREE_TYPE1=Math.floor(TREE_COUNT*.6);
    const TREE_TYPE2=Math.floor(TREE_COUNT*.2);
    const treeInstCanopy=new THREE.InstancedMesh(canopyGeo,canopyMat,TREE_TYPE1);
    treeInstCanopy.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(TREE_TYPE1*3),3);
    const treeInstCanopy2=new THREE.InstancedMesh(canopyGeo2,canopyMat2,TREE_TYPE2);
    treeInstCanopy2.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(TREE_TYPE2*3),3);
    const TREE_TYPE3=TREE_COUNT-TREE_TYPE1-TREE_TYPE2;
    const treeInstCanopy3=new THREE.InstancedMesh(canopyGeo3,canopyMat3,TREE_TYPE3);
    treeInstCanopy3.instanceColor=new THREE.InstancedBufferAttribute(new Float32Array(TREE_TYPE3*3),3);
    treeInstTrunk.frustumCulled=false;
    treeInstCanopy.frustumCulled=false;
    treeInstCanopy2.frustumCulled=false;
    treeInstCanopy3.frustumCulled=false;
    scene3d.add(treeInstTrunk);scene3d.add(treeInstCanopy);scene3d.add(treeInstCanopy2);scene3d.add(treeInstCanopy3);
    const _treeDummy=new THREE.Object3D();
    // Pre-generate tree slots with fixed seed so they never shift
    const fallenTrees=new Map(); // tree index → {angle, dir}
    const TREE_SLOTS=(()=>{
      const slots=[];const tr=mulberry32(0xF04E5704);
      let ci1=0,ci2=0,ci3=0;
      for(let i=0;i<TREE_COUNT;i++){
        const side=i%2===0?-1:1;
        const routePos=tr()*FINISH_DIST;
        const latW=1.2+tr()*12;
        const scale=0.55+tr()*0.9;
        const rotY=tr()*Math.PI*2;
        // Assign per-instance trunk color (varied browns)
        const tc=trunkColors[Math.floor(tr()*trunkColors.length)];
        treeInstTrunk.instanceColor.setXYZ(i,tc.r,tc.g,tc.b);
        // Assign per-instance canopy color (varied greens)
        const tType=i<TREE_TYPE1?0:i<TREE_TYPE1+TREE_TYPE2?1:2;
        if(tType===0){const cc=canopyColors1[Math.floor(tr()*canopyColors1.length)];treeInstCanopy.instanceColor.setXYZ(ci1++,cc.r,cc.g,cc.b);}
        else if(tType===1){const cc=canopyColors2[Math.floor(tr()*canopyColors2.length)];treeInstCanopy2.instanceColor.setXYZ(ci2++,cc.r,cc.g,cc.b);}
        else{const cc=canopyColors3[Math.floor(tr()*canopyColors3.length)];treeInstCanopy3.instanceColor.setXYZ(ci3++,cc.r,cc.g,cc.b);}
        slots.push({i,side,routePos,latW,scale,rotY});
      }
      return slots;
    })();
    function updateTrees(scrollOff){
      // Animate falling trees (Act-1-only — kayak doesn't knock trees over)
      for(const [idx,f] of fallenTrees){
        if(f.angle<Math.PI*.4){
          f.angle+=f.vel*.016;
          f.vel*=.98;
        }
      }
      const carSY=0.7-scrollOff*5;
      // Act 2 reuses the same TREE_SLOTS but places trees along the river
      // banks via getRiverX / getRiverHW instead of the road.
      const isAct2=currentAct===2;
      // Track indices for each canopy type
      let ci1=0,ci2=0,ci3=0;
      for(const sl of TREE_SLOTS){
        const treeSY=0.7-sl.routePos*5;
        const wz=(treeSY-carSY)*WORLD_SCALE;
        // Determine tree type based on slot index
        const tType=sl.i<TREE_TYPE1?0:sl.i<TREE_TYPE1+TREE_TYPE2?1:2;
        const cIdx=tType===0?ci1:tType===1?ci2:ci3;
        const cInst=tType===0?treeInstCanopy:tType===1?treeInstCanopy2:treeInstCanopy3;
        if(wz<-72||wz>95){
          _treeDummy.scale.set(0,0,0);_treeDummy.updateMatrix();
          treeInstTrunk.setMatrixAt(sl.i,_treeDummy.matrix);
          cInst.setMatrixAt(cIdx,_treeDummy.matrix);
          if(tType===0)ci1++;else if(tType===1)ci2++;else ci3++;
          continue;
        }
        const centerX=isAct2?getRiverX(treeSY):getRoadX(treeSY);
        const halfW=isAct2?getRiverHW(treeSY):ROAD_HALF_W;
        // Act 2: push the closest trees out to the canyon rim so they don't
        // float halfway up the cliff face. canyonTreeRim is in nx units —
        // added to halfW before the per-tree latW offset stacks on.
        const rimOffset=isAct2?(act2Tune.canyonTreeRim||0):0;
        const desiredTreeNX=centerX+sl.side*(halfW+rimOffset+sl.latW/WORLD_SCALE);
        // Skip trees that would clamp to the world edge in Act 2 (the river
        // meandered to an extreme nx position; the tree would teleport from
        // the canyon rim to the mesh boundary, appearing to float in water).
        if(isAct2&&(desiredTreeNX<0.005||desiredTreeNX>0.995)){
          _treeDummy.scale.set(0,0,0);_treeDummy.updateMatrix();
          treeInstTrunk.setMatrixAt(sl.i,_treeDummy.matrix);
          cInst.setMatrixAt(cIdx,_treeDummy.matrix);
          if(tType===0)ci1++;else if(tType===1)ci2++;else ci3++;
          continue;
        }
        const treeNX=Math.max(0,Math.min(1,desiredTreeNX));
        // Act 2: density-based culling along the river. fbm sampled at
        // (treeSY, side) gives smooth bands of dense forest alternating
        // with sparser stretches. Slight side offset so left and right
        // banks don't always have the same density at the same point.
        if(isAct2&&act2Tune.treeDensityVar>0){
          const densN=fbm(treeSY*0.42+50,sl.side*7+50);
          const cutoff=0.50-act2Tune.treeDensityVar*0.45;   // 0.05 to 0.50
          if(densN<cutoff){
            _treeDummy.scale.set(0,0,0);_treeDummy.updateMatrix();
            treeInstTrunk.setMatrixAt(sl.i,_treeDummy.matrix);
            cInst.setMatrixAt(cIdx,_treeDummy.matrix);
            if(tType===0)ci1++;else if(tType===1)ci2++;else ci3++;
            continue;
          }
        }
        const wx=(treeNX-0.5)*WORLD_SCALE;
        // Act 2: sit tree on the land elevation (-depth when off the river);
        // clamp to 0 so trees near the waterline don't submerge.
        const wy=isAct2
          ?Math.max(0,-sampleRiverDepth(treeNX,treeSY))*HEIGHT_SCALE
          :sampleTerrainHeightFast(treeNX,treeSY)*HEIGHT_SCALE;
        let s=sl.scale*(tType===2?1.1:tType===1?.85:1);
        // Act 2: height variation along the river — taller trees in
        // some sections, shorter in others. Per-side noise key so banks
        // can have different heights at the same scroll position.
        if(isAct2&&act2Tune.treeHeightVar>0){
          const hN=fbm(treeSY*0.30+100,sl.side*11+100);
          const hMod=1+(hN-0.5)*2*act2Tune.treeHeightVar;
          s*=Math.max(0.4,hMod);
        }
        const fallen=fallenTrees.get(sl.i);
        const fallAngle=fallen?Math.min(fallen.angle,Math.PI*.4):0;
        const fallDirX=fallen?fallen.dir:0;
        _treeDummy.position.set(wx,wy+TREE_TRUNK_H*s*.5,wz);
        _treeDummy.scale.set(s,s,s);
        _treeDummy.rotation.set(fallAngle*fallDirX,sl.rotY,fallAngle*(1-Math.abs(fallDirX)));
        _treeDummy.updateMatrix();
        treeInstTrunk.setMatrixAt(sl.i,_treeDummy.matrix);
        // Canopy offset depends on type
        const canopyH=tType===0?6*s:tType===1?2.2*s:7*s;
        const canopyOffset=TREE_TRUNK_H*s+(tType===1?canopyH:canopyH);
        _treeDummy.position.set(
          wx+Math.sin(fallAngle*fallDirX)*canopyOffset*.5,
          wy+canopyOffset*Math.cos(fallAngle),
          wz+Math.sin(fallAngle*(1-Math.abs(fallDirX)))*canopyOffset*.5
        );
        _treeDummy.updateMatrix();
        cInst.setMatrixAt(cIdx,_treeDummy.matrix);
        if(tType===0)ci1++;else if(tType===1)ci2++;else ci3++;
      }
      treeInstTrunk.instanceMatrix.needsUpdate=true;
      treeInstCanopy.instanceMatrix.needsUpdate=true;
      treeInstCanopy2.instanceMatrix.needsUpdate=true;
      treeInstCanopy3.instanceMatrix.needsUpdate=true;
    }

    // ─── Car Model (Bronco-style + kayak) ─────────────
    function buildCarMesh(color){
      const g=new THREE.Group();
      const bodyCol=0x4a6a3a; // military green
      const m=new THREE.MeshStandardMaterial({color:bodyCol,roughness:.6,metalness:.15,flatShading:true});
      g.userData={bodyMat:m,baseColor:new THREE.Color(bodyCol).clone(),allMats:[m]};

      const body=new THREE.Mesh(new THREE.BoxGeometry(3.0,1.4,4.0),m);body.position.y=1.6;g.add(body);

      // Cab top: rear 60%

      // Windshield: dark, angled 15° back

      const ws=new THREE.Mesh(new THREE.BoxGeometry(2.4,.9,.08),wsMat);ws.position.set(0,2.75,-.7);ws.rotation.x=-.26;g.add(ws);
      // Rear panel
      const rearMat=new THREE.MeshStandardMaterial({color:0x3a5a2a,roughness:.7,flatShading:true});
      const rear=new THREE.Mesh(new THREE.BoxGeometry(2.8,1.2,.08),rearMat);rear.position.set(0,1.8,2.0);g.add(rear);
      // Spare tire on back with rim
      const wm=new THREE.MeshStandardMaterial({color:0x222222,roughness:.85});
      const rimMat=new THREE.MeshStandardMaterial({color:0x888888,metalness:.7,roughness:.2});
      const hubMat=new THREE.MeshStandardMaterial({color:0x666666,metalness:.5,roughness:.3});
      const spare=new THREE.Mesh(new THREE.CylinderGeometry(.6,.6,.2,14),wm);spare.position.set(0,1.6,2.12);spare.rotation.x=Math.PI/2;g.add(spare);
      // Spare rim: outer ring + center hub + spokes
      const spRim=new THREE.Mesh(new THREE.TorusGeometry(.42,.05,6,14),rimMat);spRim.position.set(0,1.6,2.22);g.add(spRim);
      const spHub=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,.06,8),hubMat);spHub.position.set(0,1.6,2.23);spHub.rotation.x=Math.PI/2;g.add(spHub);
      for(let si=0;si<5;si++){
        const ang=si*Math.PI*2/5;
        const spoke=new THREE.Mesh(new THREE.BoxGeometry(.04,.04,.35),rimMat);
        spoke.position.set(Math.cos(ang)*.21,1.6+Math.sin(ang)*.21,2.22);
        spoke.rotation.z=ang;g.add(spoke);
      }
      // Helper to add rim details to a wheel
      function addRim(parent,x,y,z,side){
        const outX=side>0?x+.22:x-.22;
        // Outer rim ring
        const rimRing=new THREE.Mesh(new THREE.TorusGeometry(.52,.06,6,14),rimMat);
        rimRing.position.set(outX,y,z);rimRing.rotation.y=Math.PI/2;parent.add(rimRing);
        // Center hub cap
        const hub=new THREE.Mesh(new THREE.CylinderGeometry(.15,.15,.06,8),hubMat);
        hub.position.set(outX,y,z);hub.rotation.z=Math.PI/2;parent.add(hub);
        // 5 spokes
        for(let si=0;si<5;si++){
          const ang=si*Math.PI*2/5;
          const spoke=new THREE.Mesh(new THREE.BoxGeometry(.06,.04,.42),rimMat);
          spoke.position.set(outX,y+Math.sin(ang)*.26,z+Math.cos(ang)*.26);
          spoke.rotation.x=ang;parent.add(spoke);
        }
      }
      // Wheels: radius 0.75, width 0.45, wide stance ±1.7
      [[-1.7,.75,1.2],[1.7,.75,1.2]].forEach(([x,y,z])=>{
        const w=new THREE.Mesh(new THREE.CylinderGeometry(.75,.75,.45,14),wm);w.position.set(x,y,z);w.rotation.z=Math.PI/2;g.add(w);
        addRim(g,x,y,z,x>0?1:-1);
      });
      const frontWheelPivot=new THREE.Group();frontWheelPivot.position.set(0,0,-1.2);g.add(frontWheelPivot);
      [[-1.7,.75,0],[1.7,.75,0]].forEach(([x,y,z])=>{
        const w=new THREE.Mesh(new THREE.CylinderGeometry(.75,.75,.45,14),wm);w.position.set(x,y,z);w.rotation.z=Math.PI/2;frontWheelPivot.add(w);
        addRim(frontWheelPivot,x,y,z,x>0?1:-1);
      });
      g.userData.frontWheelPivot=frontWheelPivot;
      // Bumpers
      const bm=new THREE.MeshStandardMaterial({color:0x333333,roughness:.8});
      const frontBump=new THREE.Mesh(new THREE.BoxGeometry(3.2,.3,.15),bm);frontBump.position.set(0,.8,-2.05);g.add(frontBump);
      const rearBump=new THREE.Mesh(new THREE.BoxGeometry(3.2,.25,.12),bm);rearBump.position.set(0,.8,2.05);g.add(rearBump);
      // Fender flares — wider arches over wheels
      const fenderMat=new THREE.MeshStandardMaterial({color:0x333333,roughness:.85,flatShading:true});
      for(const [x,z] of[[-1.65,1.2],[1.65,1.2],[-1.65,-1.2],[1.65,-1.2]]){
        const fender=new THREE.Mesh(new THREE.BoxGeometry(.25,.4,1.2),fenderMat);
        fender.position.set(x,1.35,z);g.add(fender);
      }
      // Running boards (side steps)
      for(const sx of[-1.5,1.5]){
        const step=new THREE.Mesh(new THREE.BoxGeometry(.2,.08,2.8),fenderMat);
        step.position.set(sx,.85,0);g.add(step);

    // ─── Audio (real samples only) ─────────────────────────
    let audioCtx,masterGain;
    let engineLowSrc,engineMidSrc,engineHighSrc,engineLowGain,engineMidGain,engineHighGain;
    let birdSrc,birdGain,windSrc,windGain,waterSrc,waterGain;
    let foliageSrc,foliageGain,foliageFilter;
    let gravelSrc,gravelGain,gravelFilter;
    let guitarSrc,guitarGain,guitarBuf;

    function mkDist(a){const n=44100,c=new Float32Array(n);for(let i=0;i<n;i++){const x=(i*2)/n-1;c[i]=((3+a)*x*20*(Math.PI/180))/(Math.PI+a*Math.abs(x))}return c}

    async function loadSound(url){
      try{const resp=await fetch(url);const ab=await resp.arrayBuffer();return await audioCtx.decodeAudioData(ab)}catch(e){console.warn('Failed to load sound:',url,e);return null}
    }

    function makeLoopSource(buf,gainNode,startGain){
      if(!buf)return null;
      const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;src.connect(gainNode);gainNode.gain.value=startGain;src.start();return src;
    }

    function playImpactSound(intensity){
      if(!audioCtx||!engineHighSrc)return;
      try{
        const g=audioCtx.createGain();const f=audioCtx.createBiquadFilter();
        f.type='highpass';f.frequency.value=800+intensity*1200;f.Q.value=2;
        g.gain.value=Math.min(.15,.03+intensity*.12);g.connect(f);f.connect(masterGain);
        const src=audioCtx.createBufferSource();src.buffer=engineHighSrc.buffer;
        src.playbackRate.value=1.5+intensity*2+Math.random()*.5;src.connect(g);
        src.start(audioCtx.currentTime,Math.random()*.02,.08+intensity*.15);
        src.onended=()=>{g.disconnect();f.disconnect()};
      }catch(e){}
    }

    async function initAudio(){
      audioCtx=new AudioContext();
      masterGain=audioCtx.createGain();masterGain.gain.value=audioMuted?0:.35;masterGain.connect(audioCtx.destination);
      distortion=audioCtx.createWaveShaper();distortion.curve=mkDist(0);distortion.oversample='4x';distortion.connect(masterGain);

      const [birdBuf,windBuf,waterBuf,engLowBuf,engMidBuf,engHighBuf]=await Promise.all([
        loadSound('sounds/birds.ogg'),loadSound('sounds/wind.ogg'),loadSound('sounds/water.mp3'),
        loadSound('sounds/engine_low.wav'),loadSound('sounds/engine_mid.wav'),loadSound('sounds/engine_high.wav')
      ]);

      birdGain=audioCtx.createGain();birdGain.connect(masterGain);
      birdSrc=makeLoopSource(birdBuf,birdGain,.12);

      windGain=audioCtx.createGain();
      const wf=audioCtx.createBiquadFilter();wf.type='lowpass';wf.frequency.value=600;
      windGain.connect(wf);wf.connect(masterGain);
      windSrc=makeLoopSource(windBuf,windGain,.06);

      waterGain=audioCtx.createGain();waterGain.connect(masterGain);
      waterSrc=makeLoopSource(waterBuf,waterGain,0);

      foliageGain=audioCtx.createGain();foliageGain.gain.value=0;
      foliageFilter=audioCtx.createBiquadFilter();
      foliageFilter.type='bandpass';foliageFilter.frequency.value=2500;foliageFilter.Q.value=.8;
      foliageGain.connect(foliageFilter);foliageFilter.connect(masterGain);
      if(windBuf){
        foliageSrc=audioCtx.createBufferSource();foliageSrc.buffer=windBuf;foliageSrc.loop=true;
        foliageSrc.playbackRate.value=2.5;foliageSrc.connect(foliageGain);foliageSrc.start();
      }

      engineLowGain=audioCtx.createGain();engineLowGain.connect(distortion);
      engineMidGain=audioCtx.createGain();engineMidGain.connect(distortion);
      engineHighGain=audioCtx.createGain();engineHighGain.connect(distortion);
      engineLowSrc=makeLoopSource(engLowBuf,engineLowGain,.1);
      engineMidSrc=makeLoopSource(engMidBuf,engineMidGain,0);
      engineHighSrc=makeLoopSource(engHighBuf,engineHighGain,0);

      // Gravel/dirt road crunch — procedural noise through bandpass filter
      const gravelBufLen=audioCtx.sampleRate*2;
      const gravelBuf=audioCtx.createBuffer(1,gravelBufLen,audioCtx.sampleRate);
      const gravelData=gravelBuf.getChannelData(0);
      // Crackly noise: random pops and crunches, not white noise
      for(let i=0;i<gravelBufLen;i++){
        const r=Math.random();
        gravelData[i]=r<.12?(Math.random()-.5)*1.5: // occasional loud crunch
                       r<.35?(Math.random()-.5)*.4:   // medium pops
                       (Math.random()-.5)*.08;         // quiet baseline
      }
      gravelGain=audioCtx.createGain();gravelGain.gain.value=0;
      gravelFilter=audioCtx.createBiquadFilter();
      gravelFilter.type='bandpass';gravelFilter.frequency.value=3000;gravelFilter.Q.value=.5;
      gravelGain.connect(gravelFilter);gravelFilter.connect(masterGain);
      gravelSrc=audioCtx.createBufferSource();gravelSrc.buffer=gravelBuf;gravelSrc.loop=true;
      gravelSrc.connect(gravelGain);gravelSrc.start();

      // Country music (falls back to guitar.mp3 if country.mp3 not found)
      try{
        guitarBuf=await loadSound('sounds/country.mp3')||await loadSound('sounds/guitar.mp3');
        if(guitarBuf){
          guitarGain=audioCtx.createGain();guitarGain.gain.value=.18;guitarGain.connect(masterGain);
          guitarSrc=makeLoopSource(guitarBuf,guitarGain,.18);
        }
      }catch(e){}
    }

    function updateAudio(spd,warp,damage){
      if(!audioCtx)return;const t=audioCtx.currentTime,s=Math.abs(spd);
      const dmg=Math.min(1,damage/80);
      if(engineLowGain){
        const idleVol=Math.max(.03,.1-s*1.2);
        const midVol=Math.min(.15,s*2.2)*(s<.05?s/.05:1);
        const highVol=Math.min(.12,Math.max(0,(s-.03)*3.5));
        const offroadBoost=warp*.08;
        engineLowGain.gain.setTargetAtTime(idleVol+dmg*.02+offroadBoost,t,.1);
        engineMidGain.gain.setTargetAtTime(midVol+dmg*.03+offroadBoost*.8,t,.1);
        engineHighGain.gain.setTargetAtTime(highVol+dmg*.02+offroadBoost*.5,t,.1);
        const jitter=warp>.1?Math.sin(t*15+Math.sin(t*7)*3)*.08*warp:0;
        if(engineLowSrc)engineLowSrc.playbackRate.setTargetAtTime(.8+s*3+dmg*.3+jitter,t,.08);
        if(engineMidSrc)engineMidSrc.playbackRate.setTargetAtTime(.7+s*4+dmg*.4+jitter*1.2,t,.08);
        if(engineHighSrc)engineHighSrc.playbackRate.setTargetAtTime(.6+s*5+dmg*.5+jitter*1.5,t,.08);
      }
      distortion.curve=mkDist(warp*80+dmg*40);
      if(windGain)windGain.gain.setTargetAtTime(.05+s*1.5+warp*.1,t,.2);
      if(windSrc)windSrc.playbackRate.setTargetAtTime(.8+s*2+warp*.5,t,.3);
      // Gravel/dirt crunch — louder with speed and off-road
      if(gravelGain){
        const gravelVol=Math.min(.18,s*2.5+warp*.12);
        gravelGain.gain.setTargetAtTime(gravelVol,t,.05);
        if(gravelSrc)gravelSrc.playbackRate.setTargetAtTime(.6+s*5+warp*1.5,t,.08);
        if(gravelFilter)gravelFilter.frequency.setTargetAtTime(2000+s*6000+warp*2000,t,.1);
      }
      if(foliageGain){
        const foliageVol=warp>.05?Math.min(.25,warp*.4)*Math.min(1,s*8):0;
        foliageGain.gain.setTargetAtTime(foliageVol,t,.06);
        if(foliageSrc)foliageSrc.playbackRate.setTargetAtTime(2+warp*2+s*3,t,.1);
        foliageFilter.frequency.setTargetAtTime(1800+warp*2500+s*1000,t,.1);
      }
      if(guitarGain){
        const gVol=guitarEnabled?.22:0;
        guitarGain.gain.setTargetAtTime(gVol,t,.3);
      }
      if(birdGain)birdGain.gain.setTargetAtTime(Math.max(.02,.12-s*.8-warp*.06),t,.3);
      const damageLevel=Math.floor(damage/5);
      if(damageLevel>lastDamageLevel&&damage>3){
        playImpactSound(Math.min(1,dmg));lastDamageLevel=damageLevel;
      }
      if(waterGain){
        let waterVol=0;
        const scrollY=sharedScrollOffset;
        for(const r of RIVERS){const dist=Math.abs(scrollY-r.dist);if(dist<.3)waterVol=Math.max(waterVol,.18*(1-dist/.3))}
        const lakeDist=Math.abs(scrollY-(FINISH_DIST-.1));
        if(lakeDist<.4)waterVol=Math.max(waterVol,.12*(1-lakeDist/.4));
        waterGain.gain.setTargetAtTime(waterVol,t,.15);
      }
    }

    // On-screen touch controls — each .tc-btn maps to a keyboard arrow
    // key (data-tc attribute), so pressing the button has the exact same
    // effect on physics + input as pressing the equivalent arrow key.
    // setPointerCapture keeps the release event firing even if the
    // finger drags off the button, preventing stuck-key sticky states.
    for(const btn of document.querySelectorAll('#touch-controls .tc-btn')){
      const k=btn.dataset.tc;
      const press=(e)=>{
        e.preventDefault();
        keys[k]=true;
        btn.classList.add('tc-pressed');
        if(e.pointerId!==undefined&&btn.setPointerCapture){
          try{btn.setPointerCapture(e.pointerId)}catch(_){/* older browsers */}
        }
      };
      const release=()=>{keys[k]=false;btn.classList.remove('tc-pressed')};
      btn.addEventListener('pointerdown',press);
      btn.addEventListener('pointerup',release);
      btn.addEventListener('pointercancel',release);
      btn.addEventListener('pointerleave',release);
      btn.addEventListener('contextmenu',(e)=>e.preventDefault());
    }

    {
      const toggle=document.getElementById('touch-toggle');
      if(toggle){
        toggle.addEventListener('click',()=>{
          const on=document.body.classList.toggle('touch-on');
          toggle.textContent=on?'Hide touch pad':'Show touch pad';
        });
      }
    }

    // ─── Particle system (sparks + dust) ────────────────
    const MAX_PARTICLES=200;
    const particles=[];
    function spawnParticle(wx,wy,wz,type,count){
      for(let i=0;i<count&&particles.length<MAX_PARTICLES;i++){
        let vx,vy,vz,life,size,col;
        if(type==='spark'){
          // Fiery sparks from tree hits — bright orange/yellow
          vx=(Math.random()-.5)*10;vy=Math.random()*8+2;vz=(Math.random()-.5)*10;
          life=.2+Math.random()*.5;size=.06+Math.random()*.12;
          const r=.9+Math.random()*.1;
          col=[r,.4+Math.random()*.4,.05+Math.random()*.15]; // hot orange-red
        }else{
          // Dirty dust/mud from holes and bumps — brown/earthy
          vx=(Math.random()-.5)*3;vy=Math.random()*3+.5;vz=(Math.random()-.5)*3;
          life=.6+Math.random()*.8;size=.2+Math.random()*.3;
          const brown=.3+Math.random()*.15;
          col=[brown+.1,brown,brown-.1]; // earthy brown
        }
        particles.push({x:wx,y:wy+.5,z:wz,vx,vy,vz,life,maxLife:life,size,col,type});
      }
    }
    function updateParticles(dt){
      for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx*dt;p.y+=p.vy*dt;p.z+=p.vz*dt;
        p.vy-=12*dt; // gravity
        if(p.type==='dust')p.vy-=2*dt; // dust settles slower
        p.life-=dt;
        if(p.life<=0)particles.splice(i,1);
      }
    }

    // Particle rendering as small billboard sprites
    const particleGeo=new THREE.BufferGeometry();
    const pPositions=new Float32Array(MAX_PARTICLES*3);
    const pColors=new Float32Array(MAX_PARTICLES*3);
    const pSizes=new Float32Array(MAX_PARTICLES);
    particleGeo.setAttribute('position',new THREE.BufferAttribute(pPositions,3));
    particleGeo.setAttribute('color',new THREE.BufferAttribute(pColors,3));
    particleGeo.setAttribute('size',new THREE.BufferAttribute(pSizes,1));
    // Circular particle sprite texture
    const particleSprite=(()=>{
      const c=document.createElement('canvas');c.width=32;c.height=32;
      const cx=c.getContext('2d');
      const grad=cx.createRadialGradient(16,16,0,16,16,16);
      grad.addColorStop(0,'rgba(255,255,255,1)');
      grad.addColorStop(.4,'rgba(255,255,255,.8)');
      grad.addColorStop(.7,'rgba(255,255,255,.3)');
      grad.addColorStop(1,'rgba(255,255,255,0)');
      cx.fillStyle=grad;cx.fillRect(0,0,32,32);
      return new THREE.CanvasTexture(c);
    })();
    const particleMat=new THREE.PointsMaterial({
      size:.4,vertexColors:true,transparent:true,opacity:.8,
      depthWrite:false,sizeAttenuation:true,map:particleSprite,
      blending:THREE.AdditiveBlending
    });
    const particlePoints=new THREE.Points(particleGeo,particleMat);
    particlePoints.frustumCulled=false;
    scene3d.add(particlePoints);

    function renderParticles(){
      for(let i=0;i<MAX_PARTICLES;i++){
        if(i<particles.length){
          const p=particles[i];
          const alpha=p.life/p.maxLife;
          pPositions[i*3]=p.x;pPositions[i*3+1]=p.y;pPositions[i*3+2]=p.z;
          pColors[i*3]=p.col[0]*alpha;pColors[i*3+1]=p.col[1]*alpha;pColors[i*3+2]=p.col[2]*alpha;
          pSizes[i]=p.size*(1+(.5*(1-alpha)));
        }else{
          pPositions[i*3]=0;pPositions[i*3+1]=-100;pPositions[i*3+2]=0;
          pSizes[i]=0;
        }
      }
      particleGeo.attributes.position.needsUpdate=true;
      particleGeo.attributes.color.needsUpdate=true;
      particleGeo.attributes.size.needsUpdate=true;
    }

    // Tree collision detection: check if car is near any tree
    function checkTreeCollision(c,scrollOff){
      const carSY=c.ny-scrollOff*5;
      const carWX=(c.nx-0.5)*WORLD_SCALE;
      const carWY=sampleTerrainHeightFast(c.nx,carSY)*HEIGHT_SCALE;
      let hit=false;
      for(const sl of TREE_SLOTS){
        const treeSY=0.7-sl.routePos*5;
        const wz=(treeSY-carSY)*WORLD_SCALE;
        if(Math.abs(wz)>6)continue; // too far ahead/behind
        const roadNX=getRoadX(treeSY);
        const treeNX=Math.max(0,Math.min(1,roadNX+sl.side*(ROAD_HALF_W+sl.latW/WORLD_SCALE)));
        const treeWX=(treeNX-0.5)*WORLD_SCALE;
        const dx=carWX-treeWX,dz2=wz*wz;
        const dist2=dx*dx+dz2;
        if(dist2<9){ // within ~3 world units
          hit=true;
          // Spawn sparks at collision point
          const treeWY=sampleTerrainHeightFast(treeNX,treeSY)*HEIGHT_SCALE;
          spawnParticle((carWX+treeWX)/2,treeWY+2,wz,'spark',3);
          // Mark tree as falling (if not already fallen)
          if(!fallenTrees.has(sl.i)){
            const pushDir=carWX>treeWX?-1:1;
            fallenTrees.set(sl.i,{angle:0,dir:pushDir,vel:.8});
          }
          break;
        }
      }
      return hit;
    }

    function updateCar(c,dt,sharedScroll){
      if(c.finished&&c.parkPhase>=1){
        const parkX=c.parkTargetX!==undefined?c.parkTargetX:(LCX-.08+(c.idx*.06));
        c.nx+=(parkX-c.nx)*dt*2;c.heading*=.95;c.speed*=.9;c.warp*=.9;
        if(c.parkPhase<4){c.parkPhase+=dt*.8;if(c.parkPhase>=4&&!anyFinished){anyFinished=true;showFinish()}}
        return;
      }
      if(c.finished)return;

      if(keyDown(c.idx,0))c.speed+=.8*dt;
      if(keyDown(c.idx,1))c.speed-=.8*dt;
      c.speed*=.95;c.speed=Math.max(-.012,Math.min(.025,c.speed)); // slower top speed

      const prog=sharedScroll/FINISH_DIST;
      const slow=prog>.92?Math.max(.35,1-(prog-.92)/.08*.65):1;
      let sDelta=(baseScroll+c.speed)*dt*slow;
      if(c.catting){sDelta+=c.catVy*dt;c.catVy*=.92}

      // Front-wheel steering — stackable, lets you push far into the woods
      const steer=1.0;
      if(keyDown(c.idx,2))c.heading-=steer*dt*2.4;
      if(keyDown(c.idx,3))c.heading+=steer*dt*2.4;
      c.heading*=.91; // slightly less damping — heading accumulates with held keys
      c.lateralSpeed=c.heading*.32;
      c.lateralSpeed=Math.max(-.35,Math.min(.35,c.lateralSpeed));

      if(c.catting){c.catVy*=.92}
      c.nx+=c.lateralSpeed*dt;c.nx=Math.max(.05,Math.min(.95,c.nx));

      const csyF=c.ny-sharedScroll*5,rTarget=getRoadX(csyF),rPull=(rTarget-c.nx)*.25*dt;
      c.nx+=rPull; // gentler road-pull so player can steer far off-road

      const csy=c.ny-sharedScroll*5,rcx=getRoadX(csy),dfr=Math.abs(c.nx-rcx);
      const onBridge=isOnAnyBridge(c.nx,sharedScroll,c.ny);
      c.isOffRoad=dfr>ROAD_HALF_W&&!onBridge;
      const targetWarp=c.isOffRoad?Math.min(1,(dfr-ROAD_HALF_W)/.18):0;
      if(targetWarp>c.warp){c.warp+=((targetWarp)-c.warp)*dt*3.5;}
      else{c.warp+=(targetWarp-c.warp)*dt*15;}
      if(onBridge){c.warp=Math.max(0,c.warp-.5*dt*60);}
      // Terrain roughness — steep slopes and rough ground cost stability
      const terrH=sampleTerrainHeight(c.nx,csy);
      const terrHfwd=sampleTerrainHeight(c.nx,csy-.02);
      const terrHlat=sampleTerrainHeight(c.nx+.02,csy);
      const slope=Math.abs(terrH-terrHfwd)+Math.abs(terrH-terrHlat);
      const roughness=slope*50; // normalize to ~0-5 range
      if(roughness>2.5){
        c.stability=Math.max(10,c.stability-roughness*.5*dt); // moderate terrain wear
      }
      if(c.isOffRoad){
        const offDist=(dfr-ROAD_HALF_W)/.15;
        c.stability=Math.max(10,c.stability-(2+offDist*3)*dt); // moderate off-road wear
        c.speed*=1-dt*.3;c.lateralSpeed*=1-dt*.4;
      }
      // Tree collision — very heavy resistance + sparks + tree falls + loud crunch
      if(c.isOffRoad&&checkTreeCollision(c,sharedScroll)){
        c.speed*=.35;
        c.lateralSpeed*=.2;
        c.stability=Math.max(10,c.stability-6*dt);
        c._treeHitFlash=Math.min(1,(c._treeHitFlash||0)+.3); // flash balance indicator, clamped to 1
        playImpactSound(1.0); // max volume impact
        // Big fiery spark burst
        const cwx=(c.nx-0.5)*WORLD_SCALE;
        const cwy=sampleTerrainHeightFast(c.nx,csy)*HEIGHT_SCALE;
        for(let sp=0;sp<8;sp++)spawnParticle(cwx+(Math.random()-.5)*3,cwy+1+(Math.random()*3),0,'spark',5);
      }

      const carWorldY=c.ny/5-sharedScroll;
      let inRiver=false;
      for(const rv of RIVERS){
        const riverDist=Math.abs(carWorldY-rv.wy);
        if(riverDist<rv.width*1.5&&!onBridge){
          inRiver=true;c.stability=Math.max(10,c.stability-3*dt);c.warp=Math.min(1,c.warp+dt*12);c.speed*=.85;
        }
      }
      // Hazard collisions — potholes, bumps, puddles
      if(!c._hitHazards)c._hitHazards=new Set();
      const carSY2=c.ny-sharedScroll*5;
      for(const h of ROAD_HAZARDS){
        if(h.type==='mud'){
          // Mud patches: continuous effect
          if(Math.abs(c.nx-h.nx)<h.hw&&Math.abs(carSY2-h.sY)<h.hl){c.heading*=.6;c.stability=Math.max(10,c.stability-.2*dt)}
          continue;
        }
        if(!h.rad||c._hitHazards.has(h))continue;
        const dx2=(c.nx-h.nx)*WORLD_SCALE,dz2=(carSY2-h.sY)*WORLD_SCALE;
        const hitR=h.rad*WORLD_SCALE;
        if(dx2*dx2+dz2*dz2>=hitR*hitR)continue;
        c._hitHazards.add(h);
        if(h.type==='pothole'){
          c.stability=Math.max(10,c.stability-4);c.speed*=.75;
          if(c.bounceV!==undefined)c.bounceV-=1.8; // deep drop
          // Big dust fling burst
          const pWX=(h.nx-0.5)*WORLD_SCALE;
          const pSY2=h.sY;const cSY3=c.ny-sharedScroll*5;
          const pWZ=-(pSY2-cSY3)*WORLD_SCALE;
          const pWY=sampleTerrainHeightFast(h.nx,pSY2)*HEIGHT_SCALE;
          for(let dp=0;dp<6;dp++)spawnParticle(pWX+(Math.random()-.5)*3,pWY+Math.random()*2,pWZ+(Math.random()-.5)*2,'dust',10);
          playImpactSound(.8);
        }else if(h.type==='bump'){
          c.stability=Math.max(10,c.stability-6);c.speed*=.85;
          if(c.bounceV!==undefined)c.bounceV+=1.5; // stronger launch
          // Dust spray on bump hit
          const bWX=(h.nx-0.5)*WORLD_SCALE;
          const bSY2=h.sY;const bCSY=c.ny-sharedScroll*5;
          const bWZ=-(bSY2-bCSY)*WORLD_SCALE;
          const bWY=sampleTerrainHeightFast(h.nx,bSY2)*HEIGHT_SCALE;
          for(let dp=0;dp<3;dp++)spawnParticle(bWX+(Math.random()-.5)*2,bWY+Math.random(),bWZ,'dust',6);
          playImpactSound(.6);
        }else if(h.type==='puddle'){
          c.stability=Math.max(10,c.stability-3);c.speed*=.82;
          c.heading+=(Math.random()-.5)*.2; // stronger slide
          if(c.bounceV!==undefined)c.bounceV-=.5;
          playImpactSound(.4);
        }
      }
      // Stability recovery on smooth road
      if(!c.isOffRoad&&!inRiver&&c.warp<.05)c.stability=Math.min(100,c.stability+1.2*dt);
      c.damage=100-c.stability; // backward compat for audio

      // Catapult
      if(c.warp>CATAPULT_TH&&!c.catting&&(c.catTimer||0)<=0){
        c.catVy=-(0.02+c.warp*.03);c.catting=true;c.catTimer=1.0;c.warp=.05;c.lateralSpeed=0;
        c.catTargetX=rcx;c.catVx=0;
      }
      if(c.catting&&c.catTargetX!==undefined){
        c.nx+=(c.catTargetX-c.nx)*dt*4;
        if(Math.abs(c.nx-c.catTargetX)<.005){c.catTargetX=undefined}
      }
      if(c.catTimer>0){c.catTimer-=dt;if(c.catTimer<=0)c.catting=false}

      // Finish — stop closer to trailhead
      if(sharedScroll>FINISH_DIST*.92){
        const lpy=(LWY+sharedScroll)*H*5;
        const distToLake=lpy-c.ny*H;
        if(distToLake>-40&&distToLake<80){
          c.speed*=.92;
          if(distToLake>-20&&distToLake<40){
            c.finished=true;c.parkPhase=1;
            if(!finishTime)finishTime=gameTime;
            const roadEnd=getRoadX(c.ny-sharedScroll*5);
            c.parkTargetX=roadEnd;
          }
        }
      }

      return sDelta;
    }

    function applyRemoteState(c,s){
      if(!s)return;
      c.nx=lerp(c.nx,s.nx,.3);c.ny=s.ny;
      c.speed=lerp(c.speed,s.speed,.3);c.lateralSpeed=lerp(c.lateralSpeed,s.lateralSpeed,.3);
      c.heading=lerp(c.heading,s.heading,.3);c.warp=lerp(c.warp,s.warp,.3);
      c.isOffRoad=s.isOffRoad;c.damage=s.damage;
      c.finished=s.finished;c.parkPhase=s.parkPhase;
    }

    function showFinish(){
      let html='';
      const activeCars=multiplayer?cars:[cars[0]];
      for(const c of activeCars){
        const label=multiplayer?`<div class="fin-heading" style="text-align:center;margin-top:12px">${c.idx===0?'Driver 1':'Driver 2'}</div>`:'';
        const stab=Math.max(0,c.stability);
        const dist=(sharedScrollOffset*100).toFixed(1);
        html+=label;
        // Time gauge intentionally omitted — keeps the post-game read
        // exploratory rather than score-y. Distance + condition tell the
        // story without time pressure.
        html+=`<div class="stat-row">`;
        html+=`<div class="stat-gauge"><span class="gauge-val">${dist} m</span><span class="gauge-label">Distance</span></div>`;
        html+=`<div class="stat-gauge"><span class="gauge-val">${stab.toFixed(0)}</span><span class="gauge-label">Stability Score</span></div>`;
        html+=`</div>`;
        // Secondary stats — also avg-speed-free for the same reason.
        const treesHit=fallenTrees.size;
        const hazardsHit=c._hitHazards?c._hitHazards.size:0;
        html+=`<div class="stat-row" style="margin-top:4px">`;
        html+=`<div class="stat-gauge"><span class="gauge-val" style="font-size:16px">${treesHit}</span><span class="gauge-label">Trees Felled</span></div>`;
        html+=`<div class="stat-gauge"><span class="gauge-val" style="font-size:16px">${hazardsHit}</span><span class="gauge-label">Hazards Hit</span></div>`;
        html+=`</div>`;
      }
      document.getElementById('finish-stats').innerHTML=html;
      finishScreen.classList.add('visible');
      // Highlight kayak on roof after finishing
      highlightKayak();
    }

    function resetGame(){
      cars=[makeCar(0),makeCar(1)];gameTime=0;anyFinished=false;finishTime=0;finishDelay=0;lastDamageLevel=0;cars.forEach(c=>c._hitHazards=new Set());
      finishScreen.classList.remove('visible');sharedScrollOffset=0;
      kayakHighlightActive=false;countingDown=false;endSceneFade=0;mountainGroup.userData.placed=false;
      if(waterfallSrc){waterfallSrc.stop();waterfallSrc=null;waterfallGain=null;}
      fallenTrees.clear();
      act1Stats=null;   // forget the Act-1 snapshot so a replay starts clean
      // Restore Act 1 (setAct handles scene visibility + backdrop/fog/HUD title)
      setAct(1);
      document.getElementById('finish-title').textContent='River Reached!';
      document.getElementById('kayak-tease').style.display='';
      cam3d.fov=65;cam3d.updateProjectionMatrix();
    }
    document.getElementById('restart-btn').addEventListener('click',resetGame);

    let sharedScrollOffset=0,previewScrollOffset=0,currentAct=1;
    // Game-loop state (was previously scoped inside the old Act-2 block; they
    // belong at the top level because frame() reads them every tick).
    let started=false,countingDown=false,lastTime=performance.now();

    // ─── Countdown & start ───────────────────────────────────
    // Plays the behind-car 3-2-1-GO intro on DRIVE click, then hands off
    // to the main frame loop (started=true).
    async function runCountdown(){
      carGroups[0].visible=true;
      if(multiplayer)carGroups[1].visible=true;
      treeInstTrunk.visible=true;treeInstCanopy.visible=true;treeInstCanopy2.visible=true;treeInstCanopy3.visible=true;
      countingDown=true;
      const c0=cars[0];
      const cSY=c0.ny-previewScrollOffset*5;
      const wx=(c0.nx-0.5)*WORLD_SCALE;
      const wy=sampleTerrainHeight(c0.nx,cSY)*HEIGHT_SCALE;
      camPos.set(wx,wy+5.5,10);
      camLook.set(wx,wy-1.2,-12);
      cam3d.position.copy(camPos);
      cam3d.lookAt(camLook);
      for(const txt of['3','2','1','GO']){
        countdownEl.textContent=txt;countdownEl.classList.add('visible');
        await new Promise(r=>setTimeout(r,800));
        countdownEl.classList.remove('visible');
        await new Promise(r=>setTimeout(r,200));
      }
      started=true;
    }

    async function beginGame(){
      overlay.classList.add('hidden');
      document.getElementById('hud-left').classList.add('visible');
      if(multiplayer){
        document.getElementById('hud-right').style.display='block';
        document.getElementById('hud-right').classList.add('visible');
        document.getElementById('p1-label').style.display='block';
        document.getElementById('map-scale').style.display='none';
        carGroups[1].visible=true;
      }else{
        document.getElementById('map-scale').classList.add('visible');
      }
      document.getElementById('timer').classList.add('visible');
      document.getElementById('progress-bar').classList.add('visible');
      levelEl.classList.add('visible');
      document.getElementById('minimap').classList.add('visible');
      // Size the stabilizing visualizer to match the HUD-left column width
      // (runs on the next frame so the HUD has a real bounding box).
      requestAnimationFrame(()=>{
        const hudRect=document.getElementById('hud-left').getBoundingClientRect();
        const w=Math.max(80,Math.round(hudRect.width));
        levelCanvas.width=w;
        levelCanvas.style.width=w+'px';
        levelEl.style.width=w+'px';
      });
      const guitarBtn=document.getElementById('guitar-toggle');
      await initAudio();
      guitarBtn.addEventListener('click',()=>{
        guitarEnabled=!guitarEnabled;
        guitarBtn.textContent=guitarEnabled?'Mute':'Unmute';
        guitarBtn.style.background=guitarEnabled?'rgba(80,120,80,.2)':'rgba(255,255,255,.12)';
      });
      await runCountdown();
      document.body.tabIndex=0;document.body.focus();
    }

    driveBtn.addEventListener('click',async e=>{
      e.stopPropagation();
      if(multiplayer&&conn&&conn.open){conn.send({t:'start'})}
      beginGame();
    });

    // ─── Act 2: Kayaking — Phase-1 scaffold ─────────────────
    // The 2D topo-canvas overlay is gone. Act 2 runs in the SAME Three.js
    // scene as Act 1: setAct(n) toggles visibility of the scene-object sets
    // registered in act1SceneObjects / act2SceneObjects. Lighting + sky stay
    // shared across both acts so the world reads as one continuous space.
    //
    // Phase 2 will add the water scalar field.
    // Phase 3 will add the water mesh + river-bank rendering.
    // Phase 4 will add the depth contour lines (reusing updateContourLines).
    // Phase 5 will add the kayak mesh + real paddling physics.
    // Phase 6-10: rocks, banks, minimap swap, finish, polish.

    const act1SceneObjects=[];   // populated near frame loop
    const act2SceneObjects=[];   // populated starting Phase 3

    function setAct(n){
      currentAct=n;
      for(const o of act1SceneObjects)o.visible=(n===1);
      for(const o of act2SceneObjects)o.visible=(n===2);
      // Minimap is shown in both acts (Phase 8 wired the Act-2 sampler).
      // Map-scale is Act-1-only — it's a road-map convention that doesn't
      // apply to the river view.
      const ms=document.getElementById('map-scale');
      if(ms)ms.style.display=(n===1)?'':'none';
      if(n===1){
        renderer.setClearColor(new THREE.Color(T.bg),1);
        document.body.style.background=T.bg;
        scene3d.fog.color.set(T.bg);
        const ht=document.querySelector('.hud-title');if(ht)ht.textContent='Off the Road';
        timerEl.style.color='';
      }else{
        // PNW-overcast palette: cool gray-blue sky, matching mist fog.
        const act2Bg='#7c96a8';
        renderer.setClearColor(new THREE.Color(act2Bg),1);
        document.body.style.background=act2Bg;
        scene3d.fog.color.set(act2Bg);
        scene3d.fog.near=35;scene3d.fog.far=95;
        const ht=document.querySelector('.hud-title');if(ht)ht.textContent='River Rapids';
        timerEl.style.color='rgba(60,120,150,.9)';
      }
    }

    // Fade-to-black transition overlay. The caller's `middle` runs at full
    // opacity so the scene swap is hidden behind black, then fades back out.
    const _fader=(()=>{
      const el=document.createElement('div');
      el.style.cssText='position:fixed;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity .6s ease;z-index:9999';
      document.body.appendChild(el);
      return el;
    })();
    async function crossfade(middle){
      _fader.style.opacity='1';
      await new Promise(r=>setTimeout(r,650));
      if(middle)await middle();
      _fader.style.opacity='0';
    }

    // Kayak state. `scroll` is progress along the river (0..ACT2_FINISH_DIST);
    // kayakSY = 0.7 - scroll*5 puts the kayak in the same scroll-space the
    // water field samples from. `warp` drives the off-channel noise distortion
    // on contour lines (same idiom as Act 1's off-road warp on topology
    // lines). `_hitRocks` tracks already-hit rocks so each rock damages the
    // kayak once, like Act 1's `_hitHazards`.
    function makeKayak(idx,stability){
      const startSY=0.7;
      return{idx,
             px:getRiverX(startSY),     // spawn on the river centerline
             scroll:0,
             speed:0,lateralSpeed:0,heading:0,
             paddleAngle:0,paddleRot:0,
             stability:stability||100,
             warp:0,warpTarget:0,
             _hitRocks:new Set(),
             _hitFlash:0,                // visual flash when rock is hit
             finished:false,
             _bowCorrX:0,_bowCorrZ:0,_lastBowHeading:null,_lastBowPivot:null,
             _rapidsSmooth:0};
    }
    let kayaks=[makeKayak(0,100)];

    // Snapshot of Act-1 results at the transition moment. Populated by
    // launchAct2; consumed by showAct2Finish to render the combined summary.
    // Null when the player jumps straight to Act 2 via ?act=2 (debug path).
    let act1Stats=null;

    // ─── Kayak physics ──────────────────────────────────────
    // Same control model as the car (keyDown(pIdx,action) with W/S/A/D) and
    // a similar lateral-speed-with-drag integration, so the kayak handles
    // with muscle memory built up in Act 1. Differences from the car:
    //   - baseCurrent (river flow) replaces baseScroll — you drift
    //     downstream even when not paddling
    //   - no road-pull toward the centerline (kayaks drift with current,
    //     they don't auto-correct)
    //   - off-channel => shallow-water drag + stability hit + warp rises
    //   - rock collisions bounce laterally, drop speed & stability
    const baseCurrent=.012;             // river flow even with no paddle
    // Default handling values mirror the selected kayak-studio preset but can
    // be tuned live via ?act2tune=1.
    function updateKayak(k,dt){
      if(k.finished)return;
      // Paddle forward / brake
      if(keyDown(k.idx,0))k.speed+=.010*dt*.8;     // W
      if(keyDown(k.idx,1))k.speed-=.010*dt*.8;     // S (back-paddle)
      k.speed=Math.max(-.01,Math.min(.035,k.speed))*0.985;

      // Steer — A/D rotate the kayak AND give a small lateral impulse on
      // each stroke. Heading persists (headingRecovery=1.0 by default) so
      // the kayak holds its angle until counter-steered, the way a real
      // kayak does in flatwater.
      if(keyDown(k.idx,2)){k.lateralSpeed-=act2Tune.latThrust*dt*.8;k.heading-=dt*act2Tune.turnRate;}
      if(keyDown(k.idx,3)){k.lateralSpeed+=act2Tune.latThrust*dt*.8;k.heading+=dt*act2Tune.turnRate;}
      // Forward / back paddle ferries the kayak in its facing direction —
      // sin(heading) component of paddle thrust feeds lateralSpeed so that
      // an angled kayak actually moves sideways while paddling forward.
      const fwdPaddle=keyDown(k.idx,0)?1:(keyDown(k.idx,1)?-0.35:0);
      if(fwdPaddle!==0){
        k.lateralSpeed+=Math.sin(k.heading)*fwdPaddle*act2Tune.headingThrust*dt;
      }
      // Hard cap on heading so accumulated drift can't put the kayak
      // sideways. ±0.15π ≈ ±27° — enough yaw to feel committed in a turn
      // but never broadside to the current.
      const HEADING_CAP=Math.PI*0.15;
      if(k.heading>HEADING_CAP)k.heading=HEADING_CAP;
      else if(k.heading<-HEADING_CAP)k.heading=-HEADING_CAP;
      k.heading*=act2Tune.headingRecovery;
      k.lateralSpeed*=act2Tune.waterDrag;
      k.px+=k.lateralSpeed*dt*.4;
      k.px=Math.max(0.02,Math.min(0.98,k.px));

      // Advance downstream (paddle + base current)
      const scrollDelta=(baseCurrent+k.speed)*dt;
      k.scroll+=scrollDelta;

      // Paddle animation: same mode set as kayak-studio.
      let paddleTarget=0;
      const paddleMode=act2Tune.paddleMode||'opposite';
      if(paddleMode==='sine'){
        const strokeMul=keyDown(k.idx,0)?act2Tune.paddleStroke:1.6;
        k.paddleAngle+=dt*strokeMul;
        paddleTarget=Math.sin(k.paddleAngle)*act2Tune.paddleSway;
      }else if(paddleMode==='hold-side'){
        if(keyDown(k.idx,2))paddleTarget=act2Tune.paddleSway;
        else if(keyDown(k.idx,3))paddleTarget=-act2Tune.paddleSway;
        else if(keyDown(k.idx,0)){
          k.paddleAngle+=dt*act2Tune.paddleStroke;
          paddleTarget=Math.sin(k.paddleAngle)*act2Tune.paddleSway;
        }else{
          k.paddleAngle+=dt*1.2;
          paddleTarget=Math.sin(k.paddleAngle)*act2Tune.paddleSway*0.18;
        }
      }else if(paddleMode==='alternating'){
        if(keyDown(k.idx,2))paddleTarget=act2Tune.paddleSway;
        else if(keyDown(k.idx,3))paddleTarget=-act2Tune.paddleSway;
        else if(keyDown(k.idx,0)){
          k.paddleAngle+=dt*act2Tune.paddleStroke;
          paddleTarget=Math.sin(k.paddleAngle)*act2Tune.paddleSway;
        }
      }else{
        if(keyDown(k.idx,2))paddleTarget=-act2Tune.paddleSway;
        else if(keyDown(k.idx,3))paddleTarget=act2Tune.paddleSway;
        else if(keyDown(k.idx,0)){
          k.paddleAngle+=dt*act2Tune.paddleStroke;
          paddleTarget=Math.sin(k.paddleAngle)*act2Tune.paddleSway;
        }
      }
      k.paddleRot+=(paddleTarget-k.paddleRot)*Math.min(1,dt*act2Tune.paddleLerp);

      // Spawn a ripple every cooldown-seconds while the player is paddling
      // (W/A/D held). Ripple side comes from k.paddleRot sign so the wave
      // appears on whichever side the blade is currently dipped.
      k._rippleTimer=(k._rippleTimer||0)+dt;
      const isPaddling=keyDown(k.idx,0)||keyDown(k.idx,2)||keyDown(k.idx,3);
      if(isPaddling&&k._rippleTimer>=(act2Tune.rippleCooldown||0.45)){
        k._rippleTimer=0;
        spawnPaddleRipple(k);
        // Audio companion to the visual ripple — same trigger, same pace.
        // Intensity scales with whether forward paddle (stronger) or just
        // a steering tap (lighter splash).
        const strokeIntensity=keyDown(k.idx,0)?1.0:0.55;
        playPaddleStrokeSound(strokeIntensity);
      }

      // Shallow-water warning + HARD river boundary. Kayaks can't walk onto
      // land — the bank is a physical wall. Between the warning threshold
      // (0.85 hw) and the wall (0.98 hw) you get drag + warp + stability
      // damage, a short buffer zone that signals "bank incoming" before the
      // hard clamp stops you.
      const kayakSY=0.7-k.scroll*5;
      const riverCx=getRiverX(kayakSY);
      const riverHw=getRiverHW(kayakSY);
      // Kayak's lateral extent at current heading — when angled, the
      // bow tip sticks out further sideways than just the hull half-width.
      // Using |sin| and |cos| of heading: at h=0 the kayak is aligned with
      // the river axis (extent = hull half-width), at h=90° it's sideways
      // (extent = hull half-length).
      const _absSinH=Math.abs(Math.sin(k.heading));
      const _absCosH=Math.abs(Math.cos(k.heading));
      const lateralExtentNx=(_absSinH*2.2+_absCosH*0.85)/WORLD_SCALE;
      const distFromCenter=Math.abs(k.px-riverCx);
      // Effective bow distance from centerline — the FAR tip of the
      // angled kayak. Warning + clamp both use this so rotation can't
      // push the bow into the wall.
      const effectiveDist=distFromCenter+lateralExtentNx;
      const warnDist=Math.max(0,effectiveDist-riverHw*act2Tune.bankWarn);
      const rapRaw=sampleAct2RapidsAtKayak(k.px,kayakSY);
      k._rapidsSmooth+=(rapRaw-k._rapidsSmooth)*Math.min(1,dt*5);
      const r=k._rapidsSmooth;
      const chDepth=sampleRiverDepth(k.px,kayakSY);
      if(chDepth>0.02){
        k.stability=Math.max(0,k.stability-r*10*dt);
        k.speed*=1-Math.min(0.35,r*0.22*dt);
      }
      const rapWarp=Math.min(0.42,r*0.55);
      if(warnDist>0){
        k.speed*=(1-Math.min(.6,warnDist*3)*dt);
        k.stability=Math.max(0,k.stability-warnDist*30*dt);
        k.warpTarget=Math.min(1,warnDist*6*act2Tune.warpGain+rapWarp);
      }else{
        k.warpTarget=rapWarp;
      }
      k.warp+=(k.warpTarget-k.warp)*Math.min(1,dt*4);

      // Hard clamp — unlike the car, the kayak cannot leave the channel.
      // Clamp accounts for the kayak's lateral extent at current heading,
      // so the BOW TIP (not just the hull center) is what stops at the
      // wall. Without this, an angled kayak could drift its nose into the
      // cliff face while px was still within the channel.
      const usableHw=Math.max(0.005,riverHw*0.98-lateralExtentNx);
      const maxPx=riverCx+usableHw;
      const minPx=riverCx-usableHw;
      if(k.px>maxPx){k.px=maxPx;k.lateralSpeed=Math.min(0,k.lateralSpeed);}
      if(k.px<minPx){k.px=minPx;k.lateralSpeed=Math.max(0,k.lateralSpeed);}

      // Rock collisions — cull by sY distance first
      const kayakWx=(k.px-0.5)*WORLD_SCALE;
      for(const rock of ROCK_SLOTS){
        if(Math.abs(rock.sY-kayakSY)>0.12)continue;
        if(k._hitRocks.has(rock))continue;
        const rockWx=(rock.nx-0.5)*WORLD_SCALE;
        const rockWz=(rock.sY-kayakSY)*WORLD_SCALE;
        const dx=kayakWx-rockWx,dz=0-rockWz;
        // Rock visible radius = rock.size * 0.5 (base geometries radius ~0.5
        // uniform-scaled). Kayak half-width ~0.9 + a small padding.
        const collR=rock.size*0.5+0.95;
        const d2=dx*dx+dz*dz;
        if(d2<collR*collR){
          k._hitRocks.add(rock);
          const d=Math.sqrt(d2)+1e-4;
          const overlap=(collR-d)/collR;
          // Bounce laterally away from the rock
          k.lateralSpeed+=(dx/d)*overlap*0.9;
          k.speed*=0.75;
          k.stability=Math.max(0,k.stability-(5+rock.size*4));
          k._hitFlash=Math.max(k._hitFlash,0.6);
          k.warp=Math.min(1,k.warp+overlap*0.5*act2Tune.rockWarp);
          // Audio: scaled-by-overlap thud + splash. Bigger rocks = louder.
          playRockImpactSound(overlap*(0.5+rock.size*0.4));
        }
      }
      if(k._hitFlash>0)k._hitFlash=Math.max(0,k._hitFlash-dt*1.5);

      // Finish
      if(k.scroll>=ACT2_FINISH_DIST){
        k.scroll=ACT2_FINISH_DIST;
        k.finished=true;
      }
    }

    function renderAct2(now,dt){
      const k=kayaks[0];
      // World window is anchored to the kayak (streaming model, same as Act 1)
      updateWaterMesh(k.scroll,now*0.001);
      updateRocks(k.scroll);
      const camX=(k.px-0.5)*WORLD_SCALE;

      // Mesh shift along local Z (same knob as kayak-studio pivot offset).
      const pVis=-act2Tune.turnPivot;
      if(kayakGroup.userData.visuals){
        kayakGroup.userData.visuals.position.z=pVis;
      }
      if(k._lastBowPivot!==pVis){
        k._bowCorrX=0;
        k._bowCorrZ=0;
        k._lastBowHeading=null;
        k._lastBowPivot=pVis;
      }

      // True bow-led turn in world XZ: when yaw changes, translate the group so
      // the bow tip stays fixed and the stern swings (your diagram).
      const bx=0;
      const bz=pVis+KAYAK_BOW_Z_IN_VISUALS;
      const wBow=act2Tune.bowPivotWeight;
      const h=k.heading;
      if(wBow>0.001){
        if(k._lastBowHeading===null){
          k._lastBowHeading=h;
        }else{
          const h0=k._lastBowHeading;
          const c0=Math.cos(h0),s0=Math.sin(h0);
          const c1=Math.cos(h),s1=Math.sin(h);
          const x0=bx*c0+bz*s0;
          const z0=-bx*s0+bz*c0;
          const x1=bx*c1+bz*s1;
          const z1=-bx*s1+bz*c1;
          k._bowCorrX+=wBow*(x0-x1);
          k._bowCorrZ+=wBow*(z0-z1);
          k._lastBowHeading=h;
        }
      }else{
        k._bowCorrX=0;
        k._bowCorrZ=0;
        k._lastBowHeading=h;
      }

      const visX=camX+k._bowCorrX;
      kayakGroup.position.set(visX,0.05,k._bowCorrZ);
      // Negated heading for the visual rotation. Tried +h to match the
      // studio convention but in-game the bow read backwards (because the
      // bowSprayMount is on the +z end of the mesh, which is opposite to
      // the studio's bow-at-(-z) convention). Negating it makes the visible
      // nose lead the steering direction the way the user expects.
      kayakGroup.rotation.y=-h;
      // Cap the bank tilt so spike events (rock collisions add up to 0.9 to
      // lateralSpeed in one frame) don't fling the kayak 90°. ±0.5 rad ≈ 28°.
      const bankRaw=-k.lateralSpeed*act2Tune.bankLean;
      kayakGroup.rotation.z=Math.max(-0.5,Math.min(0.5,bankRaw));
      // Paddle sway — sine around Z so ends dip alternately into the water
      if(kayakGroup.userData.paddlePivot){
        kayakGroup.userData.paddlePivot.rotation.z=k.paddleRot||0;
      }

      // Mountain backdrop — slow lateral lerp so the horizon parallaxes
      // gently as the kayak weaves. Slight forward creep over the journey
      // so peaks feel like they're approaching, not stationary.
      {
        const lag=Math.min(1,dt*0.4);                              // very slow follow
        act2Mountains.position.x+=(camX-act2Mountains.position.x)*lag;
        const journey=Math.max(0,Math.min(1,k.scroll/ACT2_FINISH_DIST));
        act2Mountains.position.z=journey*6;                        // 0 → +6 over the trip
      }

      // Kayak wake — V-shape trail behind the stern.
      updateAct2Wake(dt,k);

      // Age + cull paddle-stroke ripples. Each lives ≤ rippleLife seconds.
      if(ripples.length){
        const lifeMax=act2Tune.rippleLife;
        for(let i=ripples.length-1;i>=0;i--){
          ripples[i].age+=dt;
          if(ripples[i].age>lifeMax)ripples.splice(i,1);
        }
      }

      // Depth contours — normally throttled to 10Hz, but bumped to ~60fps
      // while there are active ripples so the wave fronts animate smoothly
      // instead of stepping every 100ms.
      const contourCadenceMs=ripples.length?16:100;
      if(now-_lastAct2ContourTime>contourCadenceMs){
        _lastAct2ContourTime=now;
        updateAct2Contours(k.scroll,visX,k.warp,now*0.001);
      }

      // Heading-aware chase camera. cameraHeadingFollow=0 reproduces the
      // old world-fixed camera (always at +Z behind the kayak). At 1, the
      // camera arcs fully behind the kayak's facing direction so turns
      // feel committed. Smoothed lerp on both position and look-target so
      // sharp steering doesn't whip the view.
      const headFollow=Math.max(0,Math.min(1,act2Tune.cameraHeadingFollow||0));
      const hCam=h*headFollow;
      const sinHc=Math.sin(hCam),cosHc=Math.cos(hCam);
      const camBack=8.5,camLook=6;
      const targetCamX=visX-sinHc*camBack;
      const targetCamZ=cosHc*camBack;
      const targetLookX=visX+sinHc*camLook;
      const targetLookZ=-cosHc*camLook;
      const camLerp=Math.min(1,dt*4);
      cam3d.position.x=lerp(cam3d.position.x,targetCamX,camLerp);
      cam3d.position.z=lerp(cam3d.position.z,targetCamZ,camLerp);
      cam3d.position.y=3.2;
      // Smooth the look-at target through a kayak-attached scratch so
      // the lookAt() call doesn't snap when heading flips fast.
      if(!k._camLookX){k._camLookX=visX;k._camLookZ=-6;}
      k._camLookX=lerp(k._camLookX,targetLookX,camLerp);
      k._camLookZ=lerp(k._camLookZ,targetLookZ,camLerp);
      cam3d.lookAt(k._camLookX,0.3,k._camLookZ);

      // Time-of-day sky/fog progression. Lerps from morning blue → golden
      // → dusk over the journey. Scaled by act2DayShift so it can be
      // disabled (=0) for a static palette.
      {
        const journey=Math.max(0,Math.min(1,k.scroll/ACT2_FINISH_DIST));
        const dayP=journey*Math.max(0,Math.min(1,act2Tune.act2DayShift||0));
        getAct2SkyAt(dayP,_act2SkyCol);
        renderer.setClearColor(_act2SkyCol);
        scene3d.fog.color.copy(_act2SkyCol);
        // Subtle warmer directional light at dusk — cools the green tint.
        const golden=Math.max(0,dayP-0.4)/0.6;
        dLight.color.setRGB(1,1-golden*0.10,1-golden*0.28);
      }
      updateAct2Spray(dt,k._rapidsSmooth||0,k);
      renderer.render(scene3d,cam3d);
    }
    function updateAct2HUD(k){
      const spdEl=document.getElementById('h-speed-0');
      if(spdEl){
        // Display downstream speed (paddle + current) in "km/h-equivalent"
        // like Act 1, so the unit reads the same.
        const totalSpeed=(baseCurrent+Math.max(0,k.speed))*1000;
        spdEl.textContent=`${totalSpeed.toFixed(0)} km/h`;
      }
      const stabEl=document.getElementById('h-stab-0');
      if(stabEl){
        const st=Math.max(0,k.stability),dots=5;
        const filled=Math.round(st/100*dots);
        stabEl.textContent='●'.repeat(filled)+'○'.repeat(dots-filled);
        stabEl.style.color=filled>=4?'#4a8a4a':filled>=2?'#8a7a2a':'#8a3a2a';
      }
      const pbar=document.getElementById('progress-fill');
      if(pbar)pbar.style.width=Math.min(100,Math.max(0,k.scroll)/ACT2_FINISH_DIST*100)+'%';
      const displayTime=finishTime||gameTime;
      const m=Math.floor(displayTime/60),sec=(displayTime%60).toFixed(1);
      timerEl.textContent=`${String(m).padStart(2,'0')}:${sec.padStart(4,'0')}`;
    }

    // Combined Act-1 + Act-2 finish screen. Sections fade in with stagger,
    // stability shows as 5-dot indicators (color-coded by health), and a
    // Act-2 finish — kept structurally identical to the Act-1 finish screen
    // (showFinish): two stat rows of gauges, no section headings, no
    // journey-trace bar. Optional rating badge appears only when act1Stats
    // is present (i.e. the player did the full journey through both acts).
    function showAct2Finish(){
      const k=kayaks[0];
      const kayakStab=Math.max(0,k.stability);
      const rocksHit=k._hitRocks?k._hitRocks.size:0;
      // 5-dot stability indicator. Color reflects health: green ≥ 60,
      // amber 30–59, red < 30. Empty dots are dim placeholders.
      const stabDots=(stab)=>{
        const filled=Math.round(Math.max(0,Math.min(100,stab))/100*5);
        const cls=stab>=60?'fill':stab>=30?'warn':'danger';
        let h=`<div class="stab-dots">`;
        for(let i=0;i<5;i++){
          h+=`<span class="dot${i<filled?' '+cls:''}"></span>`;
        }
        h+=`</div>`;
        return h;
      };

      // Primary row: Distance + Kayak Condition. Matches Act 1's first
      // stat-row layout (big gauge values, label below).
      let html='';
      html+=`<div class="stat-row">`;
      html+=`<div class="stat-gauge"><span class="gauge-val">${(k.scroll*100).toFixed(1)} m</span><span class="gauge-label">Distance</span></div>`;
      html+=`<div class="stat-gauge">${stabDots(kayakStab)}<span class="gauge-label">Kayak Condition</span></div>`;
      html+=`</div>`;

      // Secondary row: smaller gauges (matches Act 1's Trees Felled / Hazards Hit row).
      html+=`<div class="stat-row" style="margin-top:4px">`;
      html+=`<div class="stat-gauge"><span class="gauge-val" style="font-size:16px">${rocksHit}</span><span class="gauge-label">Rocks Struck</span></div>`;
      html+=`</div>`;

      // Rating badge — only when the player finished both acts. Drops the
      // separate "Journey Total" section and uses the same badge style as
      // the Act-1 visual closer.
      if(act1Stats){
        const avgStab=Math.round((act1Stats.stability+kayakStab)/2);
        const rating=avgStab>=90?'Expert Adventurer':
                     avgStab>=75?'Seasoned Traveler':
                     avgStab>=60?'Still Intact':
                                 'Battered but Alive';
        html+=`<div style="text-align:center;margin-top:18px"><span class="rating-badge">${rating}</span></div>`;
      }

      document.getElementById('finish-title').textContent='Lake Reached!';
      document.getElementById('finish-stats').innerHTML=html;
      document.getElementById('kayak-tease').style.display='none';
      finishScreen.classList.add('visible');
    }

    // ─── Act 2: Water scalar field + rock slots ─────────────
    // Procedural river in the same (nx, sY) coordinate system as Act 1.
    // kayakSY = 0.7 - scroll*5, with scroll ∈ [0, ACT2_FINISH_DIST]. The
    // river therefore occupies sY ∈ [0.7 - ACT2_FINISH_DIST*5, 0.7].
    //
    // Phase-2 scope: data + pure functions only. Phase 3 consumes them to
    // render the water mesh; Phase 4 for depth contour lines; Phase 5 for
    // kayak physics; Phase 6 for rock instance matrices.

    const ACT2_FINISH_DIST=2.5;

    // Centerline — same sum-of-sines idiom as getRoadX but with wider and
    // slower meanders so the river feels bigger than a road while staying
    // trackable by a car-equivalent lateral responsiveness:
    //   amps  = 1.5× road  (±0.285 total swing)
    //   freqs = 0.67× road (gentler turns spread over more scroll)
    //   drift rate (Σamp·freq) = 0.228 — same as getRoadX, so the kayak
    //   can track the centerline with the same physics the car uses.
    function getRiverX(sY){
      const twistAmp=act2Tune.twistAmp;
      const twistFreq=act2Tune.twistFreq;
      return 0.5
        +Math.sin(sY*(0.40*twistFreq))*0.15*twistAmp
        +Math.sin(sY*(0.93*twistFreq)+1.5)*0.09*twistAmp
        +Math.sin(sY*(1.87*twistFreq)+3.0)*0.045*twistAmp;
    }

    // Half-width with three named hotspots baked in: a narrow "rapids"
    // mid-river, a wide "pool" later, and a much wider "lake" right at the
    // finish (so the river visibly opens into a pool with a far shore).
    // Between hotspots, small fbm jitter keeps the edges from looking
    // mechanical.
    const RIVER_BASE_HW=0.12;
    const RIVER_RAPIDS_SY=0.7-1.0*5;       // scroll=1.0 — mid-river
    const RIVER_POOL_SY=0.7-2.0*5;         // scroll=2.0 — late river
    const RIVER_LAKE_SY=0.7-2.45*5;        // scroll=2.45 — terminal pool
    // Far shore: past this sY (scroll ≈ 2.55, i.e. ~25 world units ahead of
    // the kayak's final position) the river floor rises out of the water
    // as a beach + treeline backdrop, closing off the lake's downstream end.
    const RIVER_FAR_SHORE_SY=0.7-2.55*5;
    function getRiverHW(sY){
      const rapidsD=sY-RIVER_RAPIDS_SY;
      const poolD=sY-RIVER_POOL_SY;
      const lakeD=sY-RIVER_LAKE_SY;
      // Gaussian falloffs — tighter for lake so it doesn't bleed upstream.
      const rapidsBlend=Math.exp(-rapidsD*rapidsD/1.5);
      const poolBlend=Math.exp(-poolD*poolD/1.0);
      const lakeBlend=Math.exp(-lakeD*lakeD/0.55);
      const jitter=(fbm(sY*0.7+50,0.5)-0.5)*0.03;
      const hw=(RIVER_BASE_HW+jitter)*act2Tune.widthScale;
      return hw*(1-rapidsBlend*0.4)*(1+poolBlend*0.5)*(1+lakeBlend*3.2);
    }

    // Signed depth: positive inside the river (parabolic max at center,
    // tapers to 0 at the banks), negative outside (land elevation). Shape
    // is compatible with marchingSquares — Phase 4 will iso-level through
    // positive depths for bathymetry contours.
    function sampleRiverDepth(nx,sY){
      // Far shore — past the lake's downstream edge, the riverbed RISES out
      // of the water as a beach/bank that closes off the basin. This is
      // what makes Act 2 read as having a visible end, the way Act 1 ends
      // at the parking lot. A short transition zone smooths the rise so
      // the shore doesn't appear as a wall.
      if(sY<RIVER_FAR_SHORE_SY){
        const past=RIVER_FAR_SHORE_SY-sY;              // grows further past the shore
        // 0 → 1 over ~0.7 sY of past-distance; a flat sandy beach.
        const beachRise=Math.min(1,past*1.4);
        const sandHeight=0.04+beachRise*0.30;
        const tex=fbm(nx*5+33,sY*4+33)*0.05*beachRise;
        // Treeline backdrop a bit further back. Capped so it reads as
        // distant hills, not a wall right at the kayak's bow.
        const cliffRise=Math.min(1.8,Math.max(0,past-0.5)*0.55);
        return -(sandHeight+tex+cliffRise);
      }
      const cx=getRiverX(sY);
      const hw=getRiverHW(sY);
      const dist=Math.abs(nx-cx);
      if(dist>=hw){
        // Canyon walls — steep exponential rise from the river bank.
        // (1 - exp(-distOut * steepness)) climbs to ~75% of canyonHeight
        // within ~1/steepness of normalized distance, then plateaus to
        // the canyon rim. Texture noise fades in past the bank so the
        // edge stays clean while the cliff face has irregular bumps.
        //
        // Macro height variation: the wall isn't uniform along the river.
        // Some sections rise high (towering canyon), others drop low
        // (open bank). Independent left/right via a side-keyed offset on
        // the noise lookup, scaled by canyonAsymmetry — at 0 both walls
        // match, at 1 they vary independently.
        //
        // Rapids convergence: walls grow taller as the kayak approaches
        // the rapids hotspot, visibly squeezing the canyon. Same Gaussian
        // falloff getRiverHW uses for the rapids-narrowing, so the height
        // boost lines up with the width pinch.
        const distOut=dist-hw;
        const sideKey=(nx>cx)?91:0;
        const macroN=fbm(sY*0.45+33+sideKey*act2Tune.canyonAsymmetry,0.5);
        const heightMod=1+(macroN-0.5)*2*act2Tune.canyonHeightVar;
        const rapidsD=sY-RIVER_RAPIDS_SY;
        const rapidsBlend=Math.exp(-rapidsD*rapidsD/1.5);
        const rapidsMul=1+rapidsBlend*act2Tune.canyonRapidsBoost;
        const wall=act2Tune.canyonHeight*Math.max(0.1,heightMod)*rapidsMul*(1-Math.exp(-distOut*act2Tune.canyonSteepness));
        const tex=fbm(nx*4+77,sY*3+77)*act2Tune.canyonNoise*Math.min(1,distOut*8);
        return -(wall+tex)-0.02;
      }
      const t=dist/hw;                                  // 0 center → 1 bank
      const parabola=1-t*t;
      const baseDepth=parabola*0.40;
      const tex=(fbm(nx*8+200,sY*6+200)-0.5)*0.06;
      return baseDepth+tex;
    }

    // Shared rapids scalar for Act 2: depth gradient + channel narrowness +
    // bank proximity + nearby rocks. Returns ~0 in calm deep channel, higher
    // in shallow / chutes / rock gardens. Used for spray, stability, water SFX.
    function sampleAct2RapidsAtKayak(nx,sY){
      const d0=sampleRiverDepth(nx,sY);
      if(d0<=0.02)return 0;
      const e=0.016;
      const gx=(sampleRiverDepth(nx+e,sY)-sampleRiverDepth(nx-e,sY))/(2*e);
      const gy=(sampleRiverDepth(nx,sY+e)-sampleRiverDepth(nx,sY-e))/(2*e);
      const grad=Math.hypot(gx,gy);
      const hw=getRiverHW(sY);
      const cx=getRiverX(sY);
      const dist=Math.abs(nx-cx);
      const t=hw>1e-4?dist/hw:0;
      const edgeBoost=Math.pow(Math.max(0,t-0.32),2)*2.1;
      const narrowBoost=0.38/(hw*11+0.03);
      let rockN=0;
      for(const rock of ROCK_SLOTS){
        if(Math.abs(rock.sY-sY)>0.095)continue;
        const rdx=rock.nx-nx;
        if(Math.abs(rdx)>0.14)continue;
        const dz=(rock.sY-sY)*6;
        rockN+=rock.size*0.22*(1-Math.min(1,Math.hypot(rdx*7,dz)));
      }
      rockN=Math.min(1.15,rockN);
      const shallowBoost=Math.max(0,d0-0.22)*2.2;
      const gradientTerm=Math.min(2.4,grad*1.65);
      const raw=shallowBoost*0.35+gradientTerm*0.38+edgeBoost+narrowBoost*0.42+rockN*0.48;
      return Math.max(0,Math.min(1.15,raw));
    }

    // Rocks — deterministic from a fixed seed (ACT-2 / boat), clumped near
    // the rapids, a handful decorating the pool, rest scattered. Frozen
    // positions in (nx, sY) so the streaming + collision paths added later
    // can just read them the same way trees / hazards work in Act 1.
    const ROCK_COUNT=70;
    const ROCK_SLOTS=(()=>{
      const slots=[];
      const r=mulberry32(0xA704B0A7);                   // Act-2 Boat
      for(let i=0;i<ROCK_COUNT;i++){
        const bucket=r();
        let routePos;
        if(bucket<0.55){
          // 55% in the rapids (Gaussian around scroll=1.0, ~±0.35)
          routePos=1.0+(r()+r()-1)*0.35;
        }else if(bucket<0.70){
          // 15% in the pool — bigger, more decorative
          routePos=2.0+(r()-0.5)*0.20;
        }else{
          // 30% uniformly scattered across the river
          routePos=r()*ACT2_FINISH_DIST;
        }
        // Keep rocks clear of the terminal lake (~scroll 2.2 onward) so the
        // basin reads as calm pool with no obstacles.
        routePos=Math.max(0.05,Math.min(ACT2_FINISH_DIST-0.30,routePos));
        const sY=0.7-routePos*5;
        const hw=getRiverHW(sY);
        // Lateral placement: ~60% near banks (decorative), ~40% in
        // channel (genuine obstacles the kayak has to steer around).
        const channelRoll=r();
        let lateral;
        if(channelRoll<0.60){
          lateral=(r()<0.5?-1:1)*hw*(0.65+r()*0.30);
        }else{
          lateral=(r()-0.5)*hw*1.2;
        }
        const nx=Math.max(0.02,Math.min(0.98,getRiverX(sY)+lateral));
        slots.push({
          sY,nx,
          size:0.30+r()*0.80,                   // world units
          rotY:r()*Math.PI*2,
          type:Math.floor(r()*3),               // 3 stone material variants
          isChannel:channelRoll>=0.60,          // collision hazard?
          // ── Per-rock visual variation ──
          // Color jitter applied per-instance via setColorAt — each rock
          // tints slightly differently from its base material so the
          // rapids cluster doesn't read as 30 identical boulders.
          colorJitter:{
            r:(r()-0.5)*0.22,
            g:(r()-0.5)*0.20,
            b:(r()-0.5)*0.18,
          },
          // Tilt — small rotation around X and Z so rocks don't all sit
          // perfectly upright. Looks natural-weathered.
          tiltX:(r()-0.5)*0.32,                  // ±~9°
          tiltZ:(r()-0.5)*0.32,
          // Non-uniform scale — squish/stretch per axis so the same base
          // geometry produces varied silhouettes.
          scaleX:0.82+r()*0.36,                  // 0.82–1.18
          scaleY:0.78+r()*0.50,                  // 0.78–1.28 (more vertical variance)
          scaleZ:0.82+r()*0.36,
        });
      }
      return slots;
    })();

    // ─── Act 2: Water mesh + banks ──────────────────────────
    // Same PlaneGeometry dimensions as the terrain mesh — streaming window
    // slides with the kayak (carSY → kayakSY). Positive sampleRiverDepth
    // means water (vertex Y clamped to water surface level), negative means
    // land (vertex Y rises with the bank). Vertex colors are depth-banded
    // via WATER_PAL so shallow water reads brighter and deep water darker.
    const waterGeo=new THREE.PlaneGeometry(WORLD_SCALE,WORLD_SCALE*SY_VISIBLE,TERRAIN_SEGS,TERRAIN_SEGS);
    waterGeo.rotateX(-Math.PI/2);
    waterGeo.setAttribute('color',new THREE.BufferAttribute(new Float32Array((TERRAIN_SEGS+1)*(TERRAIN_SEGS+1)*3),3));
    // Smooth-shaded so the steep cliff faces don't read as a wall of
    // discrete flat triangles. Trees/rocks/kayak stay flat-shaded, so the
    // low-poly aesthetic is preserved on the foreground objects while the
    // water surface + canyon walls flow continuously.
    const waterMat=new THREE.MeshStandardMaterial({
      vertexColors:true,roughness:0.28,metalness:0.15,flatShading:false
    });
    const waterMesh=new THREE.Mesh(waterGeo,waterMat);
    waterMesh.visible=false;  // setAct(2) flips this on
    scene3d.add(waterMesh);

    // Depth-band palette: land (dark) → sand → shallow → mid → deep (dark).
    // Covers signed depth roughly in [-0.30, 0.45]; sampleDepthColor lerps
    // between adjacent bands so transitions are smooth, not banded.
    const WATER_PAL=[
      [52, 82, 55],    // dense grass / moss  (depth ≤ -0.15)
      [96,130, 78],    // grassy bank
      [152,146,112],   // sandy shore
      [178,208,196],   // waterline shimmer
      [108,176,192],   // shallow cyan
      [ 68,138,178],   // mid blue
      [ 40, 96,142],   // deep blue
      [ 26, 58,102],   // very deep
    ];
    const WATER_PAL_LO=-0.30, WATER_PAL_HI=0.45;
    function sampleDepthColor(depth,out){
      const t=Math.max(0,Math.min(1,(depth-WATER_PAL_LO)/(WATER_PAL_HI-WATER_PAL_LO)));
      const idx=t*(WATER_PAL.length-1);
      const lo=idx|0, hi=Math.min(WATER_PAL.length-1,lo+1), f=idx-lo;
      out[0]=(WATER_PAL[lo][0]+(WATER_PAL[hi][0]-WATER_PAL[lo][0])*f)/255;
      out[1]=(WATER_PAL[lo][1]+(WATER_PAL[hi][1]-WATER_PAL[lo][1])*f)/255;
      out[2]=(WATER_PAL[lo][2]+(WATER_PAL[hi][2]-WATER_PAL[lo][2])*f)/255;
    }

    // Per-frame mesh rewrite — same streaming trick as updateTerrainMesh.
    // Y: water vertices clamp to 0 (surface), land vertices rise with
    //    |depth| * HEIGHT_SCALE. Surface gets a tiny sin-noise wobble so
    //    the water isn't frozen glass. Also caches the depth field into
    //    wCache for the depth-contour pass to consume.
    const _waterCol=[0,0,0];
    const wCache=new Float32Array((TERRAIN_SEGS+1)*(TERRAIN_SEGS+1));
    function updateWaterMesh(scroll,t){
      const kayakSY=0.7-scroll*5;
      const sYMin=kayakSY-SY_VISIBLE*TERRAIN_AHEAD;
      const sYMax=kayakSY+SY_VISIBLE*(1-TERRAIN_AHEAD);
      const pos=waterGeo.attributes.position;
      const col=waterGeo.attributes.color;
      for(let j=0;j<=TERRAIN_SEGS;j++){
        for(let i=0;i<=TERRAIN_SEGS;i++){
          const vIdx=j*(TERRAIN_SEGS+1)+i;
          const nx=i/TERRAIN_SEGS;
          const sY=sYMin+(j/TERRAIN_SEGS)*(sYMax-sYMin);
          const depth=sampleRiverDepth(nx,sY);
          wCache[vIdx]=depth;
          let wy;
          if(depth>0){
            // Water surface: flat with subtle wobble so it reads as liquid.
            // Rapids zone adds high-frequency chop (chaotic short waves)
            // scaled by the same Gaussian falloff getRiverHW uses, so the
            // surface actively churns when you enter the rapids and calms
            // back as you exit.
            const rough=Math.max(0.05,act2Tune.waterRoughness||1);
            const rapidsD=sY-RIVER_RAPIDS_SY;
            const rapidsBlend=Math.exp(-rapidsD*rapidsD/1.5);
            const chopMul=1+rapidsBlend*(act2Tune.rapidsChop-1);
            const baseWobble=(Math.sin(t*1.6+nx*14+sY*9)*0.015
                            +Math.sin(t*0.9+nx*7 -sY*11)*0.010)*rough;
            const chop=rapidsBlend>0.05
              ?(Math.sin(t*7.2+nx*36+sY*22)*0.022
              +Math.sin(t*5.5+nx*52-sY*30)*0.015)*rapidsBlend*Math.max(0,act2Tune.rapidsChop-1)*0.7
              :0;
            wy=(baseWobble*chopMul+chop)*HEIGHT_SCALE;
          }else{
            wy=-depth*HEIGHT_SCALE;        // land rises above water
          }
          const wx=(nx-0.5)*WORLD_SCALE;
          const wz=(sY-kayakSY)*WORLD_SCALE;
          pos.setXYZ(vIdx,wx,wy,wz);
          sampleDepthColor(depth,_waterCol);
          // Water-surface overlays — flow streaks (calm water current
          // visualization) and rapids foam (whitecaps near the rapids
          // hotspot). They share rapidsBlend and trade off: streaks fade
          // OUT as you enter rapids; foam fades IN.
          if(depth>0.01){
            const rapidsD=sY-RIVER_RAPIDS_SY;
            const rapidsB=Math.exp(-rapidsD*rapidsD/1.5);
            // Flow streaks — anisotropic noise stretched along sY (long
            // narrow streaks pointing downstream) drifting with t. Subtle
            // lighter patches that visualize current direction. Targets a
            // cyan-tinted highlight (a brightened version of the water's
            // own color, slightly biased toward blue) instead of pure
            // white, so streaks read as light reflecting off a moving
            // surface rather than paint blobs.
            if(act2Tune.flowStreaks>0){
              const sStrength=Math.max(0,1-rapidsB)*act2Tune.flowStreaks;
              if(sStrength>0.02){
                const flow=fbm3(nx*7,sY*22+t*act2Tune.flowSpeed);
                const sm=Math.min(0.40,Math.max(0,flow-0.50)*2.5*sStrength);
                if(sm>0.02){
                  // Cyan-tinted highlight target: lift current color toward
                  // a brighter, slightly bluer version of itself.
                  const tgtR=Math.min(1,_waterCol[0]+0.16);
                  const tgtG=Math.min(1,_waterCol[1]+0.22);
                  const tgtB=Math.min(1,_waterCol[2]+0.28);
                  _waterCol[0]+=(tgtR-_waterCol[0])*sm;
                  _waterCol[1]+=(tgtG-_waterCol[1])*sm;
                  _waterCol[2]+=(tgtB-_waterCol[2])*sm;
                }
              }
            }
            // Rapids whitecaps — irregular foam patches threshold-applied
            // from a turbulence noise field. Concentrated at the rapids
            // hotspot, drifts downstream over time.
            if(act2Tune.rapidsFoamGain>0&&rapidsB>0.12){
              const turb=fbm3(nx*8+t*0.4,sY*5-t*0.3);
              const foamRaw=Math.max(0,turb-0.55)*4.5*rapidsB*act2Tune.rapidsFoamGain;
              const fm=Math.min(1,foamRaw);
              if(fm>0.01){
                _waterCol[0]+=(0.92-_waterCol[0])*fm;
                _waterCol[1]+=(0.96-_waterCol[1])*fm;
                _waterCol[2]+=(1.00-_waterCol[2])*fm;
              }
            }
          }
          // Canyon walls — overlay rock-tone variation so the cliff isn't a
          // uniform wash of moss-green. Two-octave noise: macroN paints
